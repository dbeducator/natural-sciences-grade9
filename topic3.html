<script>
const STORAGE_PREFIX = 'coachG9_CIR_';
const TOTAL_WEEKS = 1;
const COURSE_NAME = 'The Circulatory System';
const GOOGLE_SHEET_URL = 'https://script.google.com/macros/s/REPLACE_WITH_YOUR_SCRIPT_ID/exec';
const SECRET_KEY = 'CoachG9SecureKey';
const BASE_URL = 'https://dbeducator.github.io/natural-sciences-grade9/';

// ── One entry per week. Each week has 5 days (Mon-Thu teaching, Fri = assessment day). ──
const weekData = {
  1: {
    videos: { t: 'PLACEHOLDER', tTitle: 'The Circulatory System — Tutorial', b: 'PLACEHOLDER', bTitle: 'The Heart — Explained Simply' },
    days: [
      { label: 'Monday', content: `<h2>&#10084;&#65039; The Heart — Your Body's Pump</h2>
<div class="block block-objectives"><h3>&#127919; Learning Objectives</h3><ul>
<li>Explain why multicellular organisms need a circulatory system</li>
<li>Name the four chambers of the heart</li>
<li>Explain the role of heart valves</li>
</ul></div>
<div class="block block-intro"><h3>&#128214; Introduction</h3>
<p>A single-celled organism can absorb oxygen and nutrients directly from its surroundings by diffusion — there's nowhere far to travel. But you are made of trillions of cells, many of them centimetres or even a metre from the nearest air or food source. Diffusion alone is far too slow to keep a cell in your toe supplied with oxygen from your lungs.</p>
<p>The circulatory system solves this problem: a muscular pump (the heart) pushes blood through a network of vessels reaching almost every cell in the body, delivering oxygen and nutrients and carrying away waste — all within seconds.</p></div>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/Diagram_of_the_human_heart.svg" alt="Labelled diagram of the human heart showing chambers, valves and blood vessels" loading="lazy"/>
<div class="caption">The human heart — chambers, valves and major blood vessels. Wikimedia Commons (CC BY-SA)</div>
</div>
<div class="block block-concept"><h3>&#128300; Key Concept: Four Chambers, One Pump</h3>
<p>The heart has four chambers working as two separate pumps side by side:</p>
<ul>
<li><strong>Right atrium</strong> &amp; <strong>right ventricle</strong> — receive deoxygenated blood from the body and pump it to the lungs</li>
<li><strong>Left atrium</strong> &amp; <strong>left ventricle</strong> — receive oxygenated blood from the lungs and pump it to the rest of the body</li>
</ul>
<p><strong>Valves</strong> between the chambers (and at the exits of the heart) act as one-way doors, snapping shut to stop blood flowing backwards — this is what produces the "lub-dub" sound of a heartbeat.</p></div>
<div class="block block-analogy"><h3>&#127961; Analogy: Two Buses at One Depot</h3>
<p>Think of the heart as a depot running two separate bus routes at once. The right side runs a short local route to the lungs and back. The left side runs the long-distance route out to the entire body and back. Both routes share the same depot (the heart), but the blood on each route never mixes — thanks to the wall (septum) dividing the heart's left and right sides.</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: Why do heart valves matter?</summary>
<div class="answer">Valves stop blood from flowing backwards between beats, forcing it to move in one direction only — through the heart and out into the body — making circulation efficient.</div>
</details>` },

      { label: 'Tuesday', content: `<h2>&#129706; Blood Vessels: Arteries, Veins & Capillaries</h2>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/Blood_vessels-en.svg" alt="Diagram comparing the structure of arteries, veins, and capillaries" loading="lazy"/>
<div class="caption">Arteries, veins and capillaries compared. Wikimedia Commons (CC BY-SA 3.0)</div>
</div>
<div class="block block-concept"><h3>&#128300; Three Types of Vessels, Three Jobs</h3>
<h4>Arteries</h4>
<p>Carry blood <strong>away</strong> from the heart, at high pressure. Their walls are thick and muscular to withstand that pressure.</p>
<h4>Veins</h4>
<p>Carry blood <strong>back towards</strong> the heart, at low pressure. Their walls are thinner, and they contain valves to stop blood pooling backwards, especially in the legs.</p>
<h4>Capillaries</h4>
<p>The smallest vessels, connecting arteries to veins. Their walls are only one cell thick, allowing oxygen, nutrients and waste to diffuse directly between the blood and body tissues.</p></div>
<div class="block block-mnemonic"><h3>&#129504; Memory Trick</h3>
<p class="trick">Arteries Away &middot; Veins Visit (home to the heart)</p></div>
<div class="block block-dyk"><h3>&#11088; Did You Know?</h3>
<p>The aorta — the artery leaving the left ventricle — is the widest blood vessel in the body, roughly as wide as a garden hose, because it has to handle the full force of every heartbeat before the blood branches out to smaller arteries.</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: Why do capillary walls need to be only one cell thick?</summary>
<div class="answer">A thin wall means a very short diffusion distance, allowing oxygen, nutrients, and waste products to pass quickly between the blood and surrounding body cells.</div>
</details>` },

      { label: 'Wednesday', content: `<h2>&#128257; Double Circulation</h2>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/Blood_oxygenation_to_the_pulmonary_and_systemic_circulation.svg" alt="Diagram of pulmonary and systemic circulation" loading="lazy"/>
<div class="caption">Pulmonary circulation (heart &harr; lungs) and systemic circulation (heart &harr; body). Wikimedia Commons (CC BY-SA 4.0)</div>
</div>
<div class="block block-concept"><h3>&#128300; Two Circuits, One Heartbeat</h3>
<p>Humans have <strong>double circulation</strong> — blood passes through the heart twice for every full lap of the body:</p>
<ul>
<li><strong>Pulmonary circulation:</strong> right ventricle &rarr; lungs (picks up oxygen, drops off carbon dioxide) &rarr; left atrium</li>
<li><strong>Systemic circulation:</strong> left ventricle &rarr; rest of the body (drops off oxygen, picks up carbon dioxide) &rarr; right atrium</li>
</ul>
<p>This keeps oxygenated and deoxygenated blood almost completely separate, so the blood reaching your body's cells is as oxygen-rich as possible.</p></div>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/Christiaan_Barnard_1969.jpg" alt="Portrait of South African cardiac surgeon Christiaan Barnard, 1969" loading="lazy"/>
<div class="caption">Christiaan Barnard, 1969 — Wikimedia Commons (public domain)</div>
</div>
<div class="block block-sa"><h3>&#127487; South African Connection</h3>
<p>On 3 December 1967, South African surgeon Christiaan Barnard performed the world's <strong>first human-to-human heart transplant</strong> at Groote Schuur Hospital in Cape Town — a landmark moment in the history of the circulatory system's medicine. The surgery relied on a detailed understanding of exactly how the heart's chambers and major vessels connect to the rest of the circulatory system, the same structures you're learning this week.</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: Which circuit — pulmonary or systemic — is responsible for picking up oxygen?</summary>
<div class="answer">Pulmonary circulation. It carries deoxygenated blood from the right ventricle to the lungs, where it picks up oxygen, before returning oxygenated blood to the left atrium.</div>
</details>` },

      { label: 'Thursday', content: `<h2>&#129666; Blood & Practical Activity</h2>
<div class="block block-concept"><h3>&#128300; What's in Blood?</h3>
<ul>
<li><strong>Plasma</strong> — the pale yellow liquid that carries everything else; mostly water</li>
<li><strong>Red blood cells</strong> — carry oxygen using haemoglobin; no nucleus, giving more room to carry oxygen</li>
<li><strong>White blood cells</strong> — part of the immune system, fight infection</li>
<li><strong>Platelets</strong> — cell fragments that help blood clot at a wound</li>
</ul></div>
<div class="block block-dyk"><h3>&#11088; Did You Know?</h3>
<p>An adult heart beats roughly 100,000 times a day, pumping around 7,500 litres of blood — without ever stopping to rest, for an entire lifetime.</p></div>
<div class="block block-activity"><h3>&#128300; Practical Activity: Measure Your Pulse</h3>
<div class="what-to-do"><strong>What to do:</strong> Find your pulse at your wrist (below your thumb) or neck. Count the beats for 15 seconds while resting, then multiply by 4 to get beats per minute. Record this as your resting heart rate. Now do 1 minute of star jumps or running on the spot, then immediately measure your pulse again the same way. Compare the two numbers and explain, in your own words, why your heart rate increased during exercise.</div></div>
<details class="quick-check"><summary>&#10067; Quick Check: Why does heart rate increase during exercise?</summary>
<div class="answer">Working muscles need more oxygen and glucose to release energy, and produce more carbon dioxide waste. The heart beats faster to circulate blood more quickly, delivering oxygen and removing waste at a higher rate.</div>
</details>` },

      { label: 'Friday', content: `<h2>&#128203; Summary & Key Vocabulary</h2>
<div class="block block-summary"><h3>&#128203; Week Summary</h3><ul>
<li>The heart has four chambers (right/left atrium and ventricle) working as two pumps; valves stop blood flowing backwards.</li>
<li>Arteries carry blood away from the heart under high pressure; veins carry blood back under low pressure with valves; capillaries are one cell thick for exchange.</li>
<li>Double circulation: pulmonary circulation (heart &harr; lungs) and systemic circulation (heart &harr; body) keep oxygenated and deoxygenated blood separate.</li>
<li>Blood is made of plasma, red blood cells (oxygen), white blood cells (immunity), and platelets (clotting).</li>
</ul></div>
<div class="block block-mistakes"><h3>&#9888; Common Mistakes (from past exam reports)</h3>
<div class="mistake-item"><div class="wrong">&#10060; "Veins always carry deoxygenated blood."</div><div class="right">&#10004; The pulmonary vein is an exception — it carries OXYGENATED blood from the lungs to the heart. "Vein" refers to direction (towards the heart), not oxygen content.</div></div>
<div class="mistake-item"><div class="wrong">&#10060; "Blood is blue inside veins — that's why they look blue through skin."</div><div class="right">&#10004; Human blood is always some shade of red. Veins appear bluish through skin due to how skin absorbs and reflects light, not because the blood itself is blue.</div></div>
<div class="mistake-item"><div class="wrong">&#10060; "The heart only pumps blood to the body."</div><div class="right">&#10004; The right side of the heart pumps blood to the LUNGS (pulmonary circulation) — only the left side pumps blood to the rest of the body (systemic circulation).</div></div></div>
<div class="block block-vocab"><h3>&#128273; Key Vocabulary</h3>
<div class="vocab-term"><b>Artery</b> — a blood vessel that carries blood away from the heart, under high pressure</div>
<div class="vocab-term"><b>Vein</b> — a blood vessel that carries blood back towards the heart, under low pressure</div>
<div class="vocab-term"><b>Capillary</b> — a tiny, one-cell-thick vessel where substances are exchanged with body tissue</div>
<div class="vocab-term"><b>Atrium</b> — one of the two upper chambers of the heart that receives blood</div>
<div class="vocab-term"><b>Ventricle</b> — one of the two lower chambers of the heart that pumps blood out</div>
<div class="vocab-term"><b>Double circulation</b> — blood passing through the heart twice per full circuit (pulmonary and systemic)</div>

let currentWeek = 1;
let currentDay = 0;
let completedWeeks = new Set(JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'completedWeeks') || '[]'));

Object.keys(weekData).forEach(function(w) {
  localStorage.setItem(STORAGE_PREFIX + 'correct_' + w, JSON.stringify(weekData[w].assessment.map(function(q){ return q.correct; })));
});

function toggleTheme() {
  const isLight = document.getElementById('body').classList.toggle('light-mode');
  localStorage.setItem('cl_theme', isLight ? 'light' : 'dark');
  document.getElementById('themeBtn').innerHTML = isLight ? '&#9790; Dark' : '&#9728; Light';
}

function saveAnswer(week, q, val) {
  var k = STORAGE_PREFIX + 'answers_' + week;
  var saved = JSON.parse(localStorage.getItem(k) || '{}');
  saved['q' + q] = val;
  localStorage.setItem(k, JSON.stringify(saved));
}

function buildModuleSelector() {
  var el = document.getElementById('moduleSelector');
  el.innerHTML = '';
  for (var w = 1; w <= TOTAL_WEEKS; w++) {
    var btn = document.createElement('button');
    btn.className = 'module-btn' + (completedWeeks.has(w) ? ' completed' : '');
    btn.textContent = 'Week ' + w + (completedWeeks.has(w) ? ' \u2713' : '');
    btn.onclick = (function(week){ return function(){ selectModule(week); }; })(w);
    el.appendChild(btn);
  }
  refreshModuleButtons();
}
function refreshModuleButtons() {
  document.querySelectorAll('.module-btn').forEach(function(btn, i) { btn.classList.toggle('active', i + 1 === currentWeek); });
}

function selectModule(week) { currentWeek = week; currentDay = 0; refreshModuleButtons(); updateWeekContent(); }

function buildDayTabs() {
  var week = weekData[currentWeek];
  var el = document.getElementById('dayTabs');
  el.innerHTML = '';
  week.days.forEach(function(day, i) {
    var btn = document.createElement('button');
    btn.className = 'day-btn' + (day.label === 'Friday' ? ' friday' : '') + (i === currentDay ? ' active' : '');
    btn.textContent = day.label;
    btn.onclick = function(){ currentDay = i; buildDayTabs(); renderDayContent(); };
    el.appendChild(btn);
  });
}
function renderDayContent() {
  var day = weekData[currentWeek].days[currentDay];
  document.getElementById('lessonContent').innerHTML =
    '<div class="day-label">&#128197; ' + day.label + ' &middot; Week ' + currentWeek + '</div>' + day.content;
}

function showTab(tabName, tabBtn) {
  document.querySelectorAll('.content-section').forEach(function(s){ s.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.getElementById(tabName).classList.add('active');
  if (tabBtn) tabBtn.classList.add('active');
}

function updateVideoSection() {
  const v = weekData[currentWeek].videos;
  const CS = '<div style="position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#1a1a2e,#16213e);display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;"><div style="font-size:2.2rem;">&#127916;</div><p style="color:#fff;font-weight:700;margin-top:8px;font-size:0.85rem;">Video Coming Soon</p></div>';
  const iframe = function(id) {
    return '<iframe src="https://www.youtube.com/embed/'+id+'?rel=0&modestbranding=1&iv_load_policy=3" frameborder="0" allowfullscreen style="position:absolute;top:0;left:0;width:100%;height:100%;border-radius:10px;"></iframe>';
  };
  document.getElementById('tutorialVideo').innerHTML = (v.t && v.t !== 'PLACEHOLDER') ? iframe(v.t) : CS;
  document.getElementById('basicVideo').innerHTML = (v.b && v.b !== 'PLACEHOLDER') ? iframe(v.b) : CS;
  document.getElementById('tutorialTitle').textContent = v.tTitle;
  document.getElementById('basicTitle').textContent = v.bTitle;
  document.getElementById('weekTitle').textContent = 'Videos \u2014 Week ' + currentWeek;
}

function renderResources() {
  var week = weekData[currentWeek];
  document.getElementById('resourcesTitle').textContent = 'Resources \u2014 Week ' + currentWeek;
  var html = '<div class="resources-grid">';
  week.resources.forEach(function(r) {
    var pdfUrl = 'https://mozilla.github.io/pdf.js/web/viewer.html?file=' + BASE_URL + r.file;
    html += '<a href="'+pdfUrl+'" class="resource-card" target="_blank"><div class="resource-icon">'+r.icon+'</div><h4>'+r.title+'</h4><p>'+r.desc+'</p><span class="download-badge">View PDF</span></a>';
  });
  html += '</div>';
  document.getElementById('resourcesBody').innerHTML = html;
}

function renderAssessment() {
  var week = weekData[currentWeek];
  var html = '<h2 style="font-size:1.1rem;margin-bottom:6px;">Week ' + currentWeek + ' Assessment</h2>';
  html += '<p style="color:#888;margin-bottom:16px;font-size:0.85rem;">'+week.assessment.length+' questions. You need 70% to pass. Available from Friday.</p>';
  week.assessment.forEach(function(q, qi) {
    html += '<div class="quiz-question"><h4>Q'+(qi+1)+': '+q.question+'</h4><div class="quiz-options">';
    q.options.forEach(function(opt, oi) {
      html += '<label class="quiz-option"><input type="radio" name="w'+currentWeek+'q'+qi+'" value="'+oi+'" onchange="saveAnswer('+currentWeek+','+qi+','+oi+')"> '+opt+'</label>';
    });
    html += '</div></div>';
  });
  html += '<a href="submit_CIR_'+currentWeek+'.html" onclick="localStorage.setItem(\'cl_submit_course\',\'CIR\');localStorage.setItem(\'cl_submit_week\',\''+currentWeek+'\');" class="submit-btn">Submit Assessment</a>';

  if (week.shortAnswers && week.shortAnswers.length) {
    html += '<h3 style="margin-top:26px;margin-bottom:6px;font-size:1rem;color:#4caf50;">&#9997; Short Answer Practice</h3>';
    html += '<p style="color:#888;margin-bottom:14px;font-size:0.8rem;">Exam-style questions, marked out of the total shown. These are for practice only and don\'t affect your pass/fail score — write your answer, then reveal the model answer to check yourself.</p>';
    week.shortAnswers.forEach(function(sa, si) {
      var id = 'sa_' + currentWeek + '_' + si;
      html += '<div class="sa-practice">' +
        '<h4>Q'+(si+1)+': '+sa.question+'</h4>' +
        '<div class="sa-marks">['+sa.marks+' marks]</div>' +
        '<textarea placeholder="Type your answer here..." id="'+id+'_input"></textarea>' +
        '<div><button class="sa-reveal-btn" onclick="revealModelAnswer(\''+id+'\')">Reveal Model Answer</button></div>' +
        '<div class="sa-model-answer" id="'+id+'_answer"><strong>Model Answer:</strong> '+sa.modelAnswer+'</div>' +
        '</div>';
    });
  }

  document.getElementById('assessmentContent').innerHTML = html;
}

function revealModelAnswer(id) {
  document.getElementById(id + '_answer').classList.add('shown');
}

function updateWeekContent() {
  updateVideoSection();
  buildDayTabs();
  renderDayContent();
  renderResources();
  renderAssessment();
}

function updateProgress() {
  const done = completedWeeks.size;
  const pct = Math.round(done / TOTAL_WEEKS * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '% complete';
  document.getElementById('weeksComplete').textContent = done + '/' + TOTAL_WEEKS;
  document.getElementById('videosWatched').textContent = (done*2) + '/' + (TOTAL_WEEKS*2);
  document.getElementById('assessmentsPassed').textContent = done + '/' + TOTAL_WEEKS;
}

// ── Lightbox: tap any illustration to zoom, with a scale+fade animation ──
function openLightbox(src, caption) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightboxCaption').textContent = caption || '';
  var overlay = document.getElementById('lightboxOverlay');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox(e) {
  if (e) e.stopPropagation();
  document.getElementById('lightboxOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeLightbox();
});
document.getElementById('lessonContent').addEventListener('click', function(e) {
  if (e.target.tagName === 'IMG' && e.target.closest('.illustration')) {
    var captionEl = e.target.closest('.illustration').querySelector('.caption');
    openLightbox(e.target.src, captionEl ? captionEl.textContent : '');
  }
});

window.onload = function() {
  const isLight = localStorage.getItem('cl_theme') === 'light';
  if (isLight) { document.getElementById('body').classList.add('light-mode'); document.getElementById('themeBtn').innerHTML = '&#9790; Dark'; }
  buildModuleSelector();
  updateProgress();
  selectModule(1);
};
</script>
