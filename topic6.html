<script>
const STORAGE_PREFIX = 'coachG9_EXC_';
const TOTAL_WEEKS = 1;
const COURSE_NAME = 'The Excretory System';
const GOOGLE_SHEET_URL = 'https://script.google.com/macros/s/REPLACE_WITH_YOUR_SCRIPT_ID/exec';
const SECRET_KEY = 'CoachG9SecureKey';
const BASE_URL = 'https://dbeducator.github.io/natural-sciences-grade9/';

// ── One entry per week. Each week has 5 days (Mon-Thu teaching, Fri = assessment day). ──
const weekData = {
  1: {
    videos: { t: 'q5qaGHfdmYM', tTitle: 'The Excretory System — Tutorial', b: 'W1fw2qQ9Syo', bTitle: 'How Your Body Removes Waste — Explained Simply' },
    days: [
      { label: 'Monday', content: `<h2>&#128167; Taking Out the Body's Trash</h2>
<div class="block block-objectives"><h3>&#127919; Learning Objectives</h3><ul>
<li>Define excretion and explain why the body needs it</li>
<li>Name the main organs of the excretory system</li>
<li>Understand that excretion involves more than just the kidneys</li>
</ul></div>
<div class="block block-intro"><h3>&#128214; Introduction</h3>
<p>Every chemical reaction inside your cells — respiration, protein breakdown, and more — produces waste products. If these built up unchecked, they would quickly become toxic. <strong>Excretion</strong> is the removal of these metabolic waste products (substances made by the body's own cells) from the body.</p>
<p>This week we'll meet the organs responsible for excretion, follow how the kidneys filter your blood, and clear up a mix-up that trips up almost every learner: the difference between excretion and egestion.</p></div>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/Urinary_system.svg" alt="Labelled diagram of the human urinary system" loading="lazy"/>
<div class="caption">The human urinary system: kidneys, ureters, bladder and urethra. Wikimedia Commons (CC BY-SA 3.0)</div>
</div>
<div class="block block-concept"><h3>&#128300; Key Concept: The Excretory Organs</h3>
<p>Excretion isn't only about the urinary tract — several organs remove different waste products:</p>
<ul>
<li><strong>Kidneys</strong> — filter the blood and remove urea (a nitrogen-containing waste from protein breakdown) as urine</li>
<li><strong>Lungs</strong> — remove carbon dioxide, a waste product of respiration, every time you exhale</li>
<li><strong>Skin</strong> — sweat glands remove water, salts, and small amounts of urea</li>
</ul></div>
<div class="block block-mnemonic"><h3>&#129504; Memory Trick</h3>
<p class="trick">K.L.S. &rarr; Kidneys, Lungs, Skin — all three excrete waste, not just the kidneys</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: Name one excretory organ besides the kidneys, and what it removes.</summary>
<div class="answer">The lungs remove carbon dioxide (waste from respiration), or the skin removes water, salts, and small amounts of urea through sweat.</div>
</details>` },

      { label: 'Tuesday', content: `<h2>&#129440; Inside the Kidney</h2>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/Nephron_illustration.svg" alt="Diagram of a nephron, the filtering unit of the kidney" loading="lazy"/>
<div class="caption">A nephron — the microscopic filtering unit of the kidney. Each kidney contains over a million of them. Wikimedia Commons</div>
</div>
<div class="block block-concept"><h3>&#128300; The Nephron: A Microscopic Filter</h3>
<p>Each kidney contains over a million tiny filtering units called <strong>nephrons</strong>. Blood flows through a knot of capillaries inside each nephron under high pressure, forcing water, salts, glucose, and urea out of the blood and into a long tubule. As this filtered fluid travels along the tubule, useful substances — most of the water, all the glucose, and needed salts — are reabsorbed back into the blood. What's left, mostly water, urea, and excess salts, continues on as urine.</p></div>
<div class="block block-analogy"><h3>&#127961; Analogy: A Water Treatment Plant</h3>
<p>Think of the kidney like a water treatment plant for your blood. First, everything gets filtered out in bulk — the good and the bad together. Then, in a careful second stage, the plant pulls back out everything still useful (water, glucose, salts) and returns it to the clean-water supply (your blood), while what's left over — genuine waste — gets sent away as urine.</p></div>
<div class="block block-dyk"><h3>&#11088; Did You Know?</h3>
<p>Your kidneys filter your entire blood supply roughly 40 times a day — about 180 litres of fluid — yet you typically only produce 1 to 2 litres of actual urine, because well over 99% of what's filtered gets reabsorbed.</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: If 180 litres are filtered but only 1&ndash;2 litres become urine, what happened to the rest?</summary>
<div class="answer">Almost all of it — water, glucose, and useful salts — is reabsorbed back into the blood as the filtered fluid travels along the nephron's tubule. Only the genuine waste and excess fluid remain as urine.</div>
</details>` },

      { label: 'Wednesday', content: `<h2>&#128167; Water Balance & the Urinary Tract</h2>
<div class="block block-concept"><h3>&#128300; The Pathway of Urine</h3>
<p>Once formed in the kidneys, urine follows a simple pathway out of the body:</p>
<ul>
<li><strong>Kidneys</strong> — where urine is produced</li>
<li><strong>Ureters</strong> — one tube per kidney, carrying urine down to the bladder</li>
<li><strong>Bladder</strong> — a muscular bag that stores urine until it's convenient to release it</li>
<li><strong>Urethra</strong> — the tube through which urine finally leaves the body</li>
</ul>
<p>Crucially, the kidneys don't just remove waste — they also finely control how much water stays in your body. When you're dehydrated, the kidneys reabsorb more water and produce small amounts of concentrated, dark urine. When you're well hydrated, they reabsorb less and produce larger amounts of pale, dilute urine.</p></div>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/Theewaterskloof_Dam_2018_02_10_(28425520089).jpg" alt="Theewaterskloof Dam at critically low water levels during the 2018 Cape Town drought" loading="lazy"/>
<div class="caption">Theewaterskloof Dam, Cape Town's largest reservoir, at critically low levels during the 2018 drought. Wikimedia Commons (CC BY)</div>
</div>
<div class="block block-sa"><h3>&#127487; South African Connection</h3>
<p>In 2018, Cape Town came within weeks of "Day Zero" — the point at which the city's dams, including the badly depleted Theewaterskloof Dam pictured above, would have fallen too low to keep supplying municipal water. Residents were restricted to around 50 litres of water a day. On a much smaller scale, your own kidneys respond to water shortage the same way a city does: by conserving what little water is available and cutting back on what gets released, producing darker, more concentrated urine when you haven't had enough to drink.</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: Why is urine darker and more concentrated when someone is dehydrated?</summary>
<div class="answer">The kidneys reabsorb more water back into the blood to conserve it when the body is short on water, leaving less water to dilute the waste products in the urine — making it darker and more concentrated.</div>
</details>` },

      { label: 'Thursday', content: `<h2>&#9878;&#65039; Excretion vs Egestion & Practical Activity</h2>
<div class="block block-concept"><h3>&#128300; Two Very Different "Removals"</h3>
<h4>Excretion</h4>
<p>The removal of <strong>metabolic waste</strong> — substances made by the body's own cells, such as urea (from the kidneys) or carbon dioxide (from the lungs). These substances were once part of the body's internal chemistry.</p>
<h4>Egestion</h4>
<p>The removal of <strong>undigested food</strong> (faeces) from the digestive tract. Crucially, this material never actually entered the blood or any body cell — it simply passed through the gut and never became part of the body's internal chemistry at all.</p></div>
<div class="block block-mnemonic"><h3>&#129504; Memory Trick</h3>
<p class="trick">EXcretion = EXtra chemical waste from cells &middot; EGestion = wastE Going straight through the gut, never absorbed</p></div>
<div class="block block-dyk"><h3>&#11088; Did You Know?</h3>
<p>Sweating is a genuine (if minor) form of excretion — sweat contains small amounts of urea, meaning your skin is quietly helping your kidneys do their job every time you exercise or feel hot.</p></div>
<div class="block block-activity"><h3>&#128300; Practical Activity: Track Your Fluid Balance</h3>
<div class="what-to-do"><strong>What to do:</strong> Over one full day, keep a simple log of every drink you have and roughly how much (in millilitres or cups). Separately, note in general terms whether your urine appeared pale or dark each time you noticed (no need for exact measurements). At the end of the day, compare your total fluid intake to the general pattern you observed, and write a short paragraph explaining the link between hydration and urine concentration, using what you learned this week about the kidneys.</div></div>
<details class="quick-check"><summary>&#10067; Quick Check: Undigested maize kernels are egested in faeces. Why is this NOT an example of excretion?</summary>
<div class="answer">The undigested kernels never entered the blood or any body cell — they simply passed through the digestive tract without being absorbed. Excretion only refers to waste actually produced by the body's own metabolism.</div>
</details>` },

<div class="block block-summary"><h3>&#128203; Week Summary</h3><ul>
<li>Excretion removes metabolic waste made by the body's own cells; the kidneys, lungs, and skin are all excretory organs.</li>
<li>Nephrons filter the blood, then reabsorb useful substances, leaving urea, excess salts, and water as urine.</li>

let currentWeek = 1;
let currentDay = 0;
let completedWeeks = new Set(JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'completedWeeks') || '[]'));

Object.keys(weekData).forEach(function(w) {
  localStorage.setItem(STORAGE_PREFIX + 'correct_' + w, JSON.stringify(weekData[w].assessment.map(function(q){ return q.correct; })));
});

function toggleTheme() {
  const isLight = document.getElementById('body').classList.toggle('light-mode');
  localStorage.setItem('cl_theme', isLight ? 'light' : 'dark');
  document.getElementById('themeBtn').innerHTML = isLight ? '&#9790; Dark' : '&#9728; Light';
}

function saveAnswer(week, q, val) {
  var k = STORAGE_PREFIX + 'answers_' + week;
  var saved = JSON.parse(localStorage.getItem(k) || '{}');
  saved['q' + q] = val;
  localStorage.setItem(k, JSON.stringify(saved));
}

function buildModuleSelector() {
  var el = document.getElementById('moduleSelector');
  el.innerHTML = '';
  for (var w = 1; w <= TOTAL_WEEKS; w++) {
    var btn = document.createElement('button');
    btn.className = 'module-btn' + (completedWeeks.has(w) ? ' completed' : '');
    btn.textContent = 'Week ' + w + (completedWeeks.has(w) ? ' \u2713' : '');
    btn.onclick = (function(week){ return function(){ selectModule(week); }; })(w);
    el.appendChild(btn);
  }
  refreshModuleButtons();
}
function refreshModuleButtons() {
  document.querySelectorAll('.module-btn').forEach(function(btn, i) { btn.classList.toggle('active', i + 1 === currentWeek); });
}

function selectModule(week) { currentWeek = week; currentDay = 0; refreshModuleButtons(); updateWeekContent(); }

function buildDayTabs() {
  var week = weekData[currentWeek];
  var el = document.getElementById('dayTabs');
  el.innerHTML = '';
  week.days.forEach(function(day, i) {
    var btn = document.createElement('button');
    btn.className = 'day-btn' + (day.label === 'Friday' ? ' friday' : '') + (i === currentDay ? ' active' : '');
    btn.textContent = day.label;
    btn.onclick = function(){ currentDay = i; buildDayTabs(); renderDayContent(); };
    el.appendChild(btn);
  });
}
function renderDayContent() {
  var day = weekData[currentWeek].days[currentDay];
  document.getElementById('lessonContent').innerHTML =
    '<div class="day-label">&#128197; ' + day.label + ' &middot; Week ' + currentWeek + '</div>' + day.content;
}

function showTab(tabName, tabBtn) {
  document.querySelectorAll('.content-section').forEach(function(s){ s.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.getElementById(tabName).classList.add('active');
  if (tabBtn) tabBtn.classList.add('active');
}

function updateVideoSection() {
  const v = weekData[currentWeek].videos;
  const CS = '<div style="position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#1a1a2e,#16213e);display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;"><div style="font-size:2.2rem;">&#127916;</div><p style="color:#fff;font-weight:700;margin-top:8px;font-size:0.85rem;">Video Coming Soon</p></div>';
  const iframe = function(id) {
    return '<iframe src="https://www.youtube.com/embed/'+id+'?rel=0&modestbranding=1&iv_load_policy=3" frameborder="0" allowfullscreen style="position:absolute;top:0;left:0;width:100%;height:100%;border-radius:10px;"></iframe>';
  };
  document.getElementById('tutorialVideo').innerHTML = (v.t && v.t !== 'PLACEHOLDER') ? iframe(v.t) : CS;
  document.getElementById('basicVideo').innerHTML = (v.b && v.b !== 'PLACEHOLDER') ? iframe(v.b) : CS;
  document.getElementById('tutorialTitle').textContent = v.tTitle;
  document.getElementById('basicTitle').textContent = v.bTitle;
  document.getElementById('weekTitle').textContent = 'Videos \u2014 Week ' + currentWeek;
}

function renderResources() {
  var week = weekData[currentWeek];
  document.getElementById('resourcesTitle').textContent = 'Resources \u2014 Week ' + currentWeek;
  var html = '<div class="resources-grid">';
  week.resources.forEach(function(r) {
    var pdfUrl = 'https://mozilla.github.io/pdf.js/web/viewer.html?file=' + BASE_URL + r.file;
    html += '<a href="'+pdfUrl+'" class="resource-card" target="_blank"><div class="resource-icon">'+r.icon+'</div><h4>'+r.title+'</h4><p>'+r.desc+'</p><span class="download-badge">View PDF</span></a>';
  });
  html += '</div>';
  document.getElementById('resourcesBody').innerHTML = html;
}

function renderAssessment() {
  var week = weekData[currentWeek];
  var html = '<h2 style="font-size:1.1rem;margin-bottom:6px;">Week ' + currentWeek + ' Assessment</h2>';
  html += '<p style="color:#888;margin-bottom:16px;font-size:0.85rem;">'+week.assessment.length+' questions. You need 70% to pass. Available from Friday.</p>';
  week.assessment.forEach(function(q, qi) {
    html += '<div class="quiz-question"><h4>Q'+(qi+1)+': '+q.question+'</h4><div class="quiz-options">';
    q.options.forEach(function(opt, oi) {
      html += '<label class="quiz-option"><input type="radio" name="w'+currentWeek+'q'+qi+'" value="'+oi+'" onchange="saveAnswer('+currentWeek+','+qi+','+oi+')"> '+opt+'</label>';
    });
    html += '</div></div>';
  });
  html += '<a href="submit_EXC_'+currentWeek+'.html" onclick="localStorage.setItem(\'cl_submit_course\',\'EXC\');localStorage.setItem(\'cl_submit_week\',\''+currentWeek+'\');" class="submit-btn">Submit Assessment</a>';

  if (week.shortAnswers && week.shortAnswers.length) {
    html += '<h3 style="margin-top:26px;margin-bottom:6px;font-size:1rem;color:#4caf50;">&#9997; Short Answer Practice</h3>';
    html += '<p style="color:#888;margin-bottom:14px;font-size:0.8rem;">Exam-style questions, marked out of the total shown. These are for practice only and don\'t affect your pass/fail score — write your answer, then reveal the model answer to check yourself.</p>';
    week.shortAnswers.forEach(function(sa, si) {
      var id = 'sa_' + currentWeek + '_' + si;
      html += '<div class="sa-practice">' +
        '<h4>Q'+(si+1)+': '+sa.question+'</h4>' +
        '<div class="sa-marks">['+sa.marks+' marks]</div>' +
        '<textarea placeholder="Type your answer here..." id="'+id+'_input"></textarea>' +
        '<div><button class="sa-reveal-btn" onclick="revealModelAnswer(\''+id+'\')">Reveal Model Answer</button></div>' +
        '<div class="sa-model-answer" id="'+id+'_answer"><strong>Model Answer:</strong> '+sa.modelAnswer+'</div>' +
        '</div>';
    });
  }

  document.getElementById('assessmentContent').innerHTML = html;
}

function revealModelAnswer(id) {
  document.getElementById(id + '_answer').classList.add('shown');
}

function updateWeekContent() {
  updateVideoSection();
  buildDayTabs();
  renderDayContent();
  renderResources();
  renderAssessment();
}

function updateProgress() {
  const done = completedWeeks.size;
  const pct = Math.round(done / TOTAL_WEEKS * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '% complete';
  document.getElementById('weeksComplete').textContent = done + '/' + TOTAL_WEEKS;
  document.getElementById('videosWatched').textContent = (done*2) + '/' + (TOTAL_WEEKS*2);
  document.getElementById('assessmentsPassed').textContent = done + '/' + TOTAL_WEEKS;
}

// ── Lightbox: tap any illustration to zoom, with a scale+fade animation ──
function openLightbox(src, caption) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightboxCaption').textContent = caption || '';
  var overlay = document.getElementById('lightboxOverlay');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox(e) {
  if (e) e.stopPropagation();
  document.getElementById('lightboxOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeLightbox();
});
document.getElementById('lessonContent').addEventListener('click', function(e) {
  if (e.target.tagName === 'IMG' && e.target.closest('.illustration')) {
    var captionEl = e.target.closest('.illustration').querySelector('.caption');
    openLightbox(e.target.src, captionEl ? captionEl.textContent : '');
  }
});

window.onload = function() {
  const isLight = localStorage.getItem('cl_theme') === 'light';
  if (isLight) { document.getElementById('body').classList.add('light-mode'); document.getElementById('themeBtn').innerHTML = '&#9790; Dark'; }
  buildModuleSelector();
  updateProgress();
  selectModule(1);
};
</script>
