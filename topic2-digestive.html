const STORAGE_PREFIX = 'coachG9_DIG_';
const TOTAL_WEEKS = 1;
const COURSE_NAME = 'The Digestive System';
const GOOGLE_SHEET_URL = 'https://script.google.com/macros/s/REPLACE_WITH_YOUR_SCRIPT_ID/exec';
const SECRET_KEY = 'CoachG9SecureKey';
const BASE_URL = 'https://dbeducator.github.io/natural-sciences-grade9/';

// ── One entry per week. Each week has 5 days (Mon-Thu teaching, Fri = assessment day). ──
const weekData = {
  1: {
    videos: { t: 'PLACEHOLDER', tTitle: 'The Digestive System — Tutorial', b: 'PLACEHOLDER', bTitle: 'Digestion — Explained Simply' },
    days: [
      { label: 'Monday', content: `<h2>&#127869; The Journey of Food</h2>
<div class="block block-objectives"><h3>&#127919; Learning Objectives</h3><ul>
<li>Name the main organs of the digestive system in order</li>
<li>Explain why the body needs to digest food</li>
<li>Describe the digestive system as a long tube (the alimentary canal) plus accessory organs</li>
</ul></div>
<div class="block block-intro"><h3>&#128214; Introduction</h3>
<p>The food you eat — pap, rice, chicken, vegetables — is far too large and complex for your cells to use directly. A muscle cell can't absorb a whole chicken breast! Digestion is the process of breaking food down, step by step, into molecules small enough for your body to absorb into the blood and use for energy, growth, and repair.</p>
<p>This week we'll follow a mouthful of food on its entire journey — from the moment you bite down, to the nutrients reaching your bloodstream, to what's left leaving your body.</p></div>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/Digestive_system_diagram_en.svg" alt="Labelled diagram of the human digestive system" loading="lazy"/>
<div class="caption">The human digestive system — Mariana Ruiz (LadyofHats), Wikimedia Commons (public domain)</div>
</div>
<div class="block block-concept"><h3>&#128300; Key Concept: The Alimentary Canal</h3>
<p>The digestive system is essentially one long, continuous tube — the <strong>alimentary canal</strong> — running from your mouth to your anus, plus several organs that add substances to help digestion along the way:</p>
<ul>
<li><strong>Mouth</strong> &rarr; <strong>Oesophagus</strong> &rarr; <strong>Stomach</strong> &rarr; <strong>Small intestine</strong> &rarr; <strong>Large intestine</strong> &rarr; anus</li>
<li><strong>Accessory organs</strong> (attached, not part of the tube itself): salivary glands, liver, gallbladder, pancreas</li>
</ul></div>
<div class="block block-mnemonic"><h3>&#129504; Memory Trick</h3>
<p>Remember the order of the main tract with this sentence:</p>
<p class="trick">"My Every Sunday, Slowly, Leave" &rarr; Mouth, (o)Esophagus, Stomach, Small intestine, Large intestine</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: Why can't your body just absorb a piece of chicken directly?</summary>
<div class="answer">The molecules that make up food (proteins, starches, fats) are far too large to pass through cell membranes or into the blood. Digestion breaks them down into small molecules — amino acids, simple sugars, fatty acids — that are small enough to be absorbed and used by cells.</div>
</details>` },

      { label: 'Tuesday', content: `<h2>&#129698; Mechanical vs Chemical Digestion</h2>
<div class="block block-concept"><h3>&#128300; Two Types of Digestion</h3>
<h4>Mechanical Digestion</h4>
<p>The physical breaking up of food into smaller pieces — <strong>no chemical change</strong> happens. Examples: chewing (mastication) in the mouth, and the churning of the stomach walls.</p>
<h4>Chemical Digestion</h4>
<p>Enzymes break the chemical bonds in large food molecules, turning them into smaller molecules. This starts in the mouth and continues through the stomach and small intestine.</p>
<h3 style="margin-top:14px;">Key Digestive Enzymes</h3>
<table style="width:100%;font-size:0.85rem;border-collapse:collapse;margin-top:8px;">
<tr><th style="text-align:left;padding:5px;color:#4caf50;">Enzyme</th><th style="text-align:left;padding:5px;color:#4caf50;">Breaks Down</th><th style="text-align:left;padding:5px;color:#4caf50;">Produced In</th></tr>
<tr><td style="padding:5px;">Amylase</td><td style="padding:5px;">Starch &rarr; sugars</td><td style="padding:5px;">Salivary glands, pancreas</td></tr>
<tr><td style="padding:5px;">Protease</td><td style="padding:5px;">Protein &rarr; amino acids</td><td style="padding:5px;">Stomach, pancreas</td></tr>
<tr><td style="padding:5px;">Lipase</td><td style="padding:5px;">Fat &rarr; fatty acids</td><td style="padding:5px;">Pancreas</td></tr>
</table></div>
<div class="block block-analogy"><h3>&#127961; Analogy: Enzymes as Scissors</h3>
<p>Think of a large food molecule as a long piece of string. An enzyme acts like a tiny pair of scissors shaped to fit only that specific string — it cuts it into short pieces (small molecules) that can be absorbed. Each enzyme "scissors" only fits one type of molecule: amylase only cuts starch, protease only cuts protein, lipase only cuts fat.</p></div>
<div class="block block-dyk"><h3>&#11088; Did You Know?</h3>
<p>Chemical digestion actually begins in your mouth — saliva contains amylase, which starts breaking down starch the moment you start chewing. That's why bread can start to taste slightly sweet if you chew it for a long time!</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: Chewing and stomach churning are examples of which type of digestion?</summary>
<div class="answer">Mechanical digestion — food is physically broken into smaller pieces, but no chemical bonds are broken and no enzymes are involved in the churning/chewing action itself.</div>
</details>` },

      { label: 'Wednesday', content: `<h2>&#129365; The Stomach & Small Intestine</h2>
<div class="block block-concept"><h3>&#128300; The Stomach</h3>
<p>The stomach is a muscular bag that churns food (mechanical digestion) and bathes it in gastric juice, which contains hydrochloric acid and the enzyme pepsin (a protease). The acid kills most bacteria in food and creates the right conditions for pepsin to begin digesting proteins. Food leaves the stomach as a thick liquid called chyme.</p>
<h3>The Small Intestine</h3>
<p>Most chemical digestion finishes here, and this is also where <strong>absorption</strong> — nutrients passing into the blood — happens. The inner wall is covered in millions of finger-like projections called <strong>villi</strong>, which dramatically increase the surface area available for absorption.</p></div>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/Intestinal_villus_simplified.svg" alt="Diagram of an intestinal villus showing blood vessels for absorption" loading="lazy"/>
<div class="caption">A single intestinal villus — its rich blood supply carries away absorbed nutrients. Wikimedia Commons (CC BY-SA)</div>
</div>
<div class="block block-analogy"><h3>&#127961; Analogy: Villi as a Bath Towel</h3>
<p>A flat bath towel and a fluffy bath towel use the same amount of fabric, but the fluffy one — with all its tiny loops — soaks up far more water because it has much more surface area in contact with the water. Villi (and their even tinier microvilli) work the same way: folding the intestine's lining into millions of tiny bumps massively increases the surface area available to absorb nutrients.</p></div>
<div class="block block-sa"><h3>&#127487; South African Connection</h3>
<p>Long before pharmacies existed, the indigenous Khoisan people of the Cederberg region in the Western Cape used the fynbos plant <em>Aspalathus linearis</em> — what we now call <strong>rooibos</strong> — as a traditional remedy to soothe an upset stomach. Today rooibos tea (caffeine-free and rich in antioxidants) is still a common home remedy in many South African households for settling digestive discomfort, and it's South Africa's most famous herbal export.</p></div>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/Rooibos_(Aspalathus_linearis).jpg" alt="Rooibos plant, Aspalathus linearis, growing in the Western Cape" loading="lazy"/>
<div class="caption">Rooibos (Aspalathus linearis) growing in the Western Cape — Wikimedia Commons (CC BY-SA 2.5)</div>
</div>
<details class="quick-check"><summary>&#10067; Quick Check: Why does the small intestine have villi instead of a smooth inner wall?</summary>
<div class="answer">Villi (and microvilli on their surface) massively increase the surface area of the small intestine's lining, allowing far more nutrients to be absorbed into the blood in the same length of intestine.</div>
</details>` },

      { label: 'Thursday', content: `<h2>&#129294; Accessory Organs & Practical Activity</h2>
<div class="block block-concept"><h3>&#128300; The Liver, Pancreas and Gallbladder</h3>
<h4>Liver</h4>
<p>Produces <strong>bile</strong>, a fluid that physically breaks large fat globules into smaller droplets (emulsification) — this is mechanical, not chemical, since bile contains no enzymes. Smaller fat droplets give lipase more surface area to work on.</p>
<h4>Gallbladder</h4>
<p>Stores and concentrates bile made by the liver, releasing it into the small intestine when fatty food arrives.</p>
<h4>Pancreas</h4>
<p>Produces a cocktail of digestive enzymes — amylase, protease, and lipase — released into the small intestine, plus the hormone insulin (unrelated to digestion, but produced by the same organ).</p></div>
<div class="block block-dyk"><h3>&#11088; Did You Know?</h3>
<p>Bile is often mistaken for an enzyme, but it isn't one — it doesn't break any chemical bonds. It works purely mechanically, the same way dish soap breaks a layer of oil into smaller droplets in water.</p></div>
<div class="block block-activity"><h3>&#128300; Practical Activity: Model Digestion in a Bag</h3>
<div class="what-to-do"><strong>What to do:</strong> Place a few crackers and a small splash of water into a sealed sandwich bag. Squeeze and knead the bag firmly with your hands for two minutes (this models mechanical digestion in the stomach). Add a spoon of vinegar (models stomach acid) and continue kneading. Cut a tiny corner off the bag and squeeze the mixture through — the paste passing through represents nutrients being absorbed through the small intestine wall, while anything too solid to pass through represents indigestible material.</div></div>
<details class="quick-check"><summary>&#10067; Quick Check: A learner has gallstones blocking bile from reaching the small intestine. Which food type will they struggle to digest most?</summary>
<div class="answer">Fats. Without bile to emulsify fat into smaller droplets, lipase has far less surface area to work on, making fat digestion much less efficient.</div>
</details>` },

      { label: 'Friday', content: `<h2>&#128203; Summary & Key Vocabulary</h2>
<div class="block block-summary"><h3>&#128203; Week Summary</h3><ul>
<li>The digestive system is a long tube (mouth &rarr; oesophagus &rarr; stomach &rarr; small intestine &rarr; large intestine) plus accessory organs (salivary glands, liver, gallbladder, pancreas).</li>
<li>Mechanical digestion physically breaks food up (chewing, churning); chemical digestion uses enzymes to break chemical bonds (amylase, protease, lipase).</li>
<li>The stomach churns food and adds acid + pepsin; the small intestine finishes digestion and absorbs nutrients through villi.</li>
<li>The liver makes bile (emulsifies fat — not an enzyme); the gallbladder stores bile; the pancreas makes digestive enzymes.</li>
</ul></div>
<div class="block block-mistakes"><h3>&#9888; Common Mistakes (from past exam reports)</h3>
<div class="mistake-item"><div class="wrong">&#10060; "Bile is an enzyme that digests fat."</div><div class="right">&#10004; Bile is NOT an enzyme — it physically emulsifies (breaks up) fat into smaller droplets. The enzyme that chemically digests fat is lipase.</div></div>
<div class="mistake-item"><div class="wrong">&#10060; "Food moves down the oesophagus because of gravity."</div><div class="right">&#10004; Food is pushed along by peristalsis — rhythmic muscle contractions — which is why you can still swallow while lying down or upside down.</div></div>
<div class="mistake-item"><div class="wrong">&#10060; "Digestion only happens in the stomach."</div><div class="right">&#10004; Digestion begins in the mouth (amylase in saliva) and continues through the stomach and small intestine, where most chemical digestion and all absorption actually occur.</div></div></div>
<div class="block block-vocab"><h3>&#128273; Key Vocabulary</h3>
<div class="vocab-term"><b>Digestion</b> — the breakdown of food into molecules small enough to be absorbed</div>
<div class="vocab-term"><b>Enzyme</b> — a biological molecule that speeds up a specific chemical reaction, such as breaking down food</div>
<div class="vocab-term"><b>Peristalsis</b> — rhythmic muscle contractions that push food along the digestive tract</div>
<div class="vocab-term"><b>Villi</b> — finger-like projections in the small intestine that increase surface area for absorption</div>
<div class="vocab-term"><b>Bile</b> — a fluid made by the liver that emulsifies (physically breaks up) fat</div>
<div class="vocab-term"><b>Absorption</b> — nutrients passing from the digestive tract into the bloodstream</div>
</div>
<details class="quick-check"><summary>&#10067; Final Check: Without looking back, can you name the 5 main parts of the alimentary canal in order?</summary>
<div class="answer">Mouth &rarr; Oesophagus &rarr; Stomach &rarr; Small intestine &rarr; Large intestine. If you got all five in order, you're ready for the quiz!</div>
</details>
<p style="margin-top:16px;color:#4caf50;font-weight:600;">&#9989; Ready? Head to the <strong>Assessment</strong> tab above to complete this week's quiz. You need 70% to pass and unlock next week.</p>` }
    ],

let currentWeek = 1;
let currentDay = 0;
let completedWeeks = new Set(JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'completedWeeks') || '[]'));

Object.keys(weekData).forEach(function(w) {
  localStorage.setItem(STORAGE_PREFIX + 'correct_' + w, JSON.stringify(weekData[w].assessment.map(function(q){ return q.correct; })));
});

function toggleTheme() {
  const isLight = document.getElementById('body').classList.toggle('light-mode');
  localStorage.setItem('cl_theme', isLight ? 'light' : 'dark');
  document.getElementById('themeBtn').innerHTML = isLight ? '&#9790; Dark' : '&#9728; Light';
}

function saveAnswer(week, q, val) {
  var k = STORAGE_PREFIX + 'answers_' + week;
  var saved = JSON.parse(localStorage.getItem(k) || '{}');
  saved['q' + q] = val;
  localStorage.setItem(k, JSON.stringify(saved));
}

function buildModuleSelector() {
  var el = document.getElementById('moduleSelector');
  el.innerHTML = '';
  for (var w = 1; w <= TOTAL_WEEKS; w++) {
    var btn = document.createElement('button');
    btn.className = 'module-btn' + (completedWeeks.has(w) ? ' completed' : '');
    btn.textContent = 'Week ' + w + (completedWeeks.has(w) ? ' \u2713' : '');
    btn.onclick = (function(week){ return function(){ selectModule(week); }; })(w);
    el.appendChild(btn);
  }
  refreshModuleButtons();
}
function refreshModuleButtons() {
  document.querySelectorAll('.module-btn').forEach(function(btn, i) { btn.classList.toggle('active', i + 1 === currentWeek); });
}

function selectModule(week) { currentWeek = week; currentDay = 0; refreshModuleButtons(); updateWeekContent(); }

function buildDayTabs() {
  var week = weekData[currentWeek];
  var el = document.getElementById('dayTabs');
  el.innerHTML = '';
  week.days.forEach(function(day, i) {
    var btn = document.createElement('button');
    btn.className = 'day-btn' + (day.label === 'Friday' ? ' friday' : '') + (i === currentDay ? ' active' : '');
    btn.textContent = day.label;
    btn.onclick = function(){ currentDay = i; buildDayTabs(); renderDayContent(); };
    el.appendChild(btn);
  });
}
function renderDayContent() {
  var day = weekData[currentWeek].days[currentDay];
  document.getElementById('lessonContent').innerHTML =
    '<div class="day-label">&#128197; ' + day.label + ' &middot; Week ' + currentWeek + '</div>' + day.content;
}

function showTab(tabName, tabBtn) {
  document.querySelectorAll('.content-section').forEach(function(s){ s.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.getElementById(tabName).classList.add('active');
  if (tabBtn) tabBtn.classList.add('active');
}

function updateVideoSection() {
  const v = weekData[currentWeek].videos;
  const CS = '<div style="position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#1a1a2e,#16213e);display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;"><div style="font-size:2.2rem;">&#127916;</div><p style="color:#fff;font-weight:700;margin-top:8px;font-size:0.85rem;">Video Coming Soon</p></div>';
  const iframe = function(id) {
    return '<iframe src="https://www.youtube.com/embed/'+id+'?rel=0&modestbranding=1&iv_load_policy=3" frameborder="0" allowfullscreen style="position:absolute;top:0;left:0;width:100%;height:100%;border-radius:10px;"></iframe>';
  };
  document.getElementById('tutorialVideo').innerHTML = (v.t && v.t !== 'PLACEHOLDER') ? iframe(v.t) : CS;
  document.getElementById('basicVideo').innerHTML = (v.b && v.b !== 'PLACEHOLDER') ? iframe(v.b) : CS;
  document.getElementById('tutorialTitle').textContent = v.tTitle;
  document.getElementById('basicTitle').textContent = v.bTitle;
  document.getElementById('weekTitle').textContent = 'Videos \u2014 Week ' + currentWeek;
}

function renderResources() {
  var week = weekData[currentWeek];
  document.getElementById('resourcesTitle').textContent = 'Resources \u2014 Week ' + currentWeek;
  var html = '<div class="resources-grid">';
  week.resources.forEach(function(r) {
    var pdfUrl = 'https://mozilla.github.io/pdf.js/web/viewer.html?file=' + BASE_URL + r.file;
    html += '<a href="'+pdfUrl+'" class="resource-card" target="_blank"><div class="resource-icon">'+r.icon+'</div><h4>'+r.title+'</h4><p>'+r.desc+'</p><span class="download-badge">View PDF</span></a>';
  });
  html += '</div>';
  document.getElementById('resourcesBody').innerHTML = html;
}

function renderAssessment() {
  var week = weekData[currentWeek];
  var html = '<h2 style="font-size:1.1rem;margin-bottom:6px;">Week ' + currentWeek + ' Assessment</h2>';
  html += '<p style="color:#888;margin-bottom:16px;font-size:0.85rem;">'+week.assessment.length+' questions. You need 70% to pass. Available from Friday.</p>';
  week.assessment.forEach(function(q, qi) {
    html += '<div class="quiz-question"><h4>Q'+(qi+1)+': '+q.question+'</h4><div class="quiz-options">';
    q.options.forEach(function(opt, oi) {
      html += '<label class="quiz-option"><input type="radio" name="w'+currentWeek+'q'+qi+'" value="'+oi+'" onchange="saveAnswer('+currentWeek+','+qi+','+oi+')"> '+opt+'</label>';
    });
    html += '</div></div>';
  });
  html += '<a href="submit_DIG_'+currentWeek+'.html" onclick="localStorage.setItem(\'cl_submit_course\',\'DIG\');localStorage.setItem(\'cl_submit_week\',\''+currentWeek+'\');" class="submit-btn">Submit Assessment</a>';

  if (week.shortAnswers && week.shortAnswers.length) {
    html += '<h3 style="margin-top:26px;margin-bottom:6px;font-size:1rem;color:#4caf50;">&#9997; Short Answer Practice</h3>';
    html += '<p style="color:#888;margin-bottom:14px;font-size:0.8rem;">Exam-style questions, marked out of the total shown. These are for practice only and don\'t affect your pass/fail score — write your answer, then reveal the model answer to check yourself.</p>';
    week.shortAnswers.forEach(function(sa, si) {
      var id = 'sa_' + currentWeek + '_' + si;
      html += '<div class="sa-practice">' +
        '<h4>Q'+(si+1)+': '+sa.question+'</h4>' +
        '<div class="sa-marks">['+sa.marks+' marks]</div>' +
        '<textarea placeholder="Type your answer here..." id="'+id+'_input"></textarea>' +
        '<div><button class="sa-reveal-btn" onclick="revealModelAnswer(\''+id+'\')">Reveal Model Answer</button></div>' +
        '<div class="sa-model-answer" id="'+id+'_answer"><strong>Model Answer:</strong> '+sa.modelAnswer+'</div>' +
        '</div>';
    });
  }

  document.getElementById('assessmentContent').innerHTML = html;
}

function revealModelAnswer(id) {
  document.getElementById(id + '_answer').classList.add('shown');
}

function updateWeekContent() {
  updateVideoSection();
  buildDayTabs();
  renderDayContent();
  renderResources();
  renderAssessment();
}

function updateProgress() {
  const done = completedWeeks.size;
  const pct = Math.round(done / TOTAL_WEEKS * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '% complete';
  document.getElementById('weeksComplete').textContent = done + '/' + TOTAL_WEEKS;
  document.getElementById('videosWatched').textContent = (done*2) + '/' + (TOTAL_WEEKS*2);
  document.getElementById('assessmentsPassed').textContent = done + '/' + TOTAL_WEEKS;
}

window.onload = function() {
  const isLight = localStorage.getItem('cl_theme') === 'light';
  if (isLight) { document.getElementById('body').classList.add('light-mode'); document.getElementById('themeBtn').innerHTML = '&#9790; Dark'; }
  buildModuleSelector();
  updateProgress();
  selectModule(1);
};
</script>
