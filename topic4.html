<script>
const STORAGE_PREFIX = 'coachG9_RES_';
const TOTAL_WEEKS = 1;
const COURSE_NAME = 'The Respiratory System';
const GOOGLE_SHEET_URL = 'https://script.google.com/macros/s/REPLACE_WITH_YOUR_SCRIPT_ID/exec';
const SECRET_KEY = 'CoachG9SecureKey';
const BASE_URL = 'https://dbeducator.github.io/natural-sciences-grade9/';

// ── One entry per week. Each week has 5 days (Mon-Thu teaching, Fri = assessment day). ──
const weekData = {
  1: {
    videos: { t: 'v_j-LD2YEqg', tTitle: 'The Respiratory System — Tutorial', b: 'ZB7uA5o0mS4', bTitle: 'Breathing — Explained Simply' },
    days: [
      { label: 'Monday', content: `<h2>&#128168; Breathing In, Breathing Out</h2>
<div class="block block-objectives"><h3>&#127919; Learning Objectives</h3><ul>
<li>Name the main organs of the respiratory system in order</li>
<li>Explain why the body needs a constant supply of oxygen</li>
<li>Describe the pathway air takes from the nose to the lungs</li>
</ul></div>
<div class="block block-intro"><h3>&#128214; Introduction</h3>
<p>Every cell in your body needs a steady supply of oxygen to release energy from glucose — and every cell produces carbon dioxide as waste that must be removed. The respiratory system is the body's gas-exchange system: it brings oxygen from the air into the blood, and removes carbon dioxide from the blood back into the air.</p>
<p>This week we'll trace the path air takes into your body, discover how your chest actually moves air in and out, and clear up one of the most commonly confused pairs of words in all of biology: breathing and respiration.</p></div>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/Respiratory_system_complete_en.svg" alt="Labelled diagram of the human respiratory system" loading="lazy"/>
<div class="caption">The human respiratory system — Mariana Ruiz (LadyofHats), Wikimedia Commons (public domain)</div>
</div>
<div class="block block-concept"><h3>&#128300; Key Concept: The Airway</h3>
<p>Air travels through a branching pathway that gets progressively narrower, like an upside-down tree:</p>
<ul>
<li><strong>Nose/nasal cavity</strong> — warms, moistens and filters incoming air</li>
<li><strong>Trachea</strong> (windpipe) — a tube reinforced with cartilage rings, carrying air to the chest</li>
<li><strong>Bronchi</strong> — the trachea splits into two bronchi, one per lung</li>
<li><strong>Bronchioles</strong> — bronchi branch into thousands of ever-smaller tubes</li>
<li><strong>Alveoli</strong> — tiny air sacs at the very end of the bronchioles, where gas exchange happens</li>
</ul></div>
<div class="block block-mnemonic"><h3>&#129504; Memory Trick</h3>
<p class="trick">Never Trust Big Bad Alligators &rarr; Nose, Trachea, Bronchi, Bronchioles, Alveoli</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: Why does air need to pass through the nose before reaching the lungs?</summary>
<div class="answer">The nose warms, moistens, and filters the incoming air — removing dust and pathogens and protecting the delicate tissue deeper in the airway, including the alveoli.</div>
</details>` },

      { label: 'Tuesday', content: `<h2>&#127991;&#65039; How You Actually Breathe</h2>
<div class="block block-concept"><h3>&#128300; The Mechanics of Breathing</h3>
<p>Lungs have no muscle of their own — they're passive bags of tissue. Breathing happens because of two sets of muscles changing the volume of your chest cavity:</p>
<h4>Inhaling</h4>
<p>The <strong>diaphragm</strong> (a dome-shaped muscle below the lungs) contracts and flattens, while the intercostal muscles between your ribs contract, lifting the rib cage up and out. This increases the volume of the chest cavity, dropping the pressure inside — air rushes in from outside to equalise the pressure.</p>
<h4>Exhaling</h4>
<p>The diaphragm relaxes and domes upward again, the rib cage drops, chest volume decreases, pressure increases — and air is pushed back out.</p></div>
<div class="block block-analogy"><h3>&#127961; Analogy: The Bell Jar Model</h3>
<p>Picture a jar with a stretchy rubber sheet sealed across the open bottom, and two balloons inside connected to a tube through the lid (a classic science-class lung model). Pulling the rubber sheet down increases the space inside the jar, dropping the pressure — air rushes in and inflates the balloons. Releasing the sheet does the opposite, pushing air back out. The rubber sheet plays the role of your diaphragm; the balloons are your lungs.</p></div>
<div class="block block-dyk"><h3>&#11088; Did You Know?</h3>
<p>At rest, you breathe around 12&ndash;16 times a minute — over 20,000 breaths a day — almost entirely without thinking about it, controlled automatically by your brainstem.</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: What happens to chest volume and pressure when you inhale?</summary>
<div class="answer">Chest volume increases (diaphragm flattens, ribs lift), which decreases the pressure inside the chest relative to outside air. Air then flows in from the higher-pressure outside to the lower-pressure inside, down the pressure gradient.</div>
</details>` },

      { label: 'Wednesday', content: `<h2>&#129717; Gas Exchange at the Alveoli</h2>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/Cross_section_of_an_alveolus_and_capillaries_showing_diffusion_of_gases.svg" alt="Diagram showing gas exchange between an alveolus and surrounding capillaries" loading="lazy"/>
<div class="caption">Gas exchange between an alveolus and its surrounding capillary network. Wikimedia Commons (CC BY-SA)</div>
</div>
<div class="block block-concept"><h3>&#128300; Why Alveoli Are So Efficient</h3>
<p>Each lung contains hundreds of millions of alveoli, giving the lungs an enormous total surface area for gas exchange — roughly the size of a tennis court, folded into your chest. Several features make gas exchange here highly efficient:</p>
<ul>
<li><strong>Huge surface area</strong> — millions of tiny alveoli instead of one large sac</li>
<li><strong>Thin walls</strong> — both alveoli and the surrounding capillaries are only one cell thick, minimising diffusion distance</li>
<li><strong>Moist surface</strong> — gases dissolve into the moisture before diffusing across</li>
<li><strong>Rich blood supply</strong> — a dense capillary network keeps a constant concentration gradient for diffusion</li>
</ul>
<p>Oxygen diffuses from the alveoli (high concentration) into the blood (low concentration); carbon dioxide diffuses the opposite way, from blood into the alveoli to be exhaled.</p></div>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/Johannesburg_CBD.jpg" alt="Johannesburg city skyline" loading="lazy"/>
<div class="caption">Johannesburg — at roughly 1,750 m above sea level, one of the highest major cities in the world. Wikimedia Commons (CC BY 2.0)</div>
</div>
<div class="block block-sa"><h3>&#127487; South African Connection</h3>
<p>Johannesburg sits at around 1,750 metres above sea level — high enough that the air contains noticeably less oxygen per breath than at the coast. Athletes who live and train at this altitude gradually adapt: their bodies produce more red blood cells to carry oxygen more efficiently, which is one reason high-altitude South African cities are popular training bases for endurance athletes preparing for sea-level competitions, where the extra oxygen-carrying capacity becomes a real advantage.</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: Name two structural features of alveoli that make gas exchange efficient.</summary>
<div class="answer">Any two of: huge surface area (millions of alveoli), extremely thin walls (one cell thick), a moist inner surface, or a rich surrounding capillary network.</div>
</details>` },

      { label: 'Thursday', content: `<h2>&#127939; Breathing vs Respiration & Practical Activity</h2>
<div class="block block-concept"><h3>&#128300; Two Different Things With Confusingly Similar Names</h3>
<h4>Breathing (Ventilation)</h4>
<p>The physical, mechanical movement of air into and out of the lungs — inhaling and exhaling. It happens in your chest and airway.</p>
<h4>Respiration</h4>
<p>The <strong>chemical</strong> process inside every cell that releases energy from glucose, using oxygen (and producing carbon dioxide as waste). It happens inside mitochondria, in every cell of your body — not just in the lungs.</p>
<p>Breathing simply supplies and removes the gases that respiration needs. You could say breathing is the delivery service, and respiration is what actually happens once the delivery arrives at each cell.</p></div>
<div class="block block-dyk"><h3>&#11088; Did You Know?</h3>
<p>Plants also carry out respiration in every living cell, all the time — the common idea that "plants only do photosynthesis" is a misconception. Photosynthesis and respiration are two separate, simultaneous processes in plant cells.</p></div>
<div class="block block-activity"><h3>&#128300; Practical Activity: Measure Your Breathing Rate</h3>
<div class="what-to-do"><strong>What to do:</strong> While sitting quietly, count how many breaths you take in one minute (one inhale + one exhale = one breath) without changing your breathing pattern on purpose. Record this as your resting breathing rate. Now do 1 minute of star jumps or running on the spot, then immediately count your breathing rate for another minute. Compare the two numbers, and explain in your own words why your breathing rate increased — linking your answer to what your muscles needed during exercise.</div></div>
<details class="quick-check"><summary>&#10067; Quick Check: Which of these happens in the mitochondria — breathing or respiration?</summary>
<div class="answer">Respiration. Breathing is the mechanical movement of air in the chest and airway; respiration is the chemical release of energy from glucose, which happens in the mitochondria of every cell.</div>
</details>` },

      { label: 'Friday', content: `<h2>&#128203; Summary & Key Vocabulary</h2>
<div class="block block-summary"><h3>&#128203; Week Summary</h3><ul>
<li>Air travels: nose &rarr; trachea &rarr; bronchi &rarr; bronchioles &rarr; alveoli.</li>
<li>Breathing is driven by the diaphragm and rib muscles changing the volume (and therefore pressure) of the chest cavity.</li>
<li>Gas exchange happens at the alveoli, which are efficient due to huge surface area, thin walls, moisture, and a rich blood supply.</li>
<li>Breathing (ventilation) is the mechanical movement of air; respiration is the chemical release of energy from glucose inside cells — they are NOT the same thing.</li>

<div class="block block-mistakes"><h3>&#9888; Common Mistakes (from past exam reports)</h3>
<div class="mistake-item"><div class="wrong">&#10060; "Breathing and respiration are the same thing."</div><div class="right">&#10004; Breathing is the physical movement of air in and out of the lungs. Respiration is the chemical release of energy from glucose inside cells. Breathing supplies the gases respiration needs — they're related but not the same process.</div></div>
<div class="mistake-item"><div class="wrong">&#10060; "The lungs do the muscular work of breathing."</div><div class="right">&#10004; Lungs contain no muscle of their own — they are passive. The diaphragm and intercostal (rib) muscles do the actual work, changing chest volume to move air in and out.</div></div>
<div class="mistake-item"><div class="wrong">&#10060; "You breathe in pure oxygen and breathe out pure carbon dioxide."</div><div class="right">&#10004; Inhaled air is a mixture (about 21% oxygen, mostly nitrogen). Exhaled air still contains oxygen too — just less of it (about 16%) — plus more carbon dioxide than inhaled air.</div></div></div>

let currentWeek = 1;
let currentDay = 0;
let completedWeeks = new Set(JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'completedWeeks') || '[]'));

Object.keys(weekData).forEach(function(w) {
  localStorage.setItem(STORAGE_PREFIX + 'correct_' + w, JSON.stringify(weekData[w].assessment.map(function(q){ return q.correct; })));
});

function toggleTheme() {
  const isLight = document.getElementById('body').classList.toggle('light-mode');
  localStorage.setItem('cl_theme', isLight ? 'light' : 'dark');
  document.getElementById('themeBtn').innerHTML = isLight ? '&#9790; Dark' : '&#9728; Light';
}

function saveAnswer(week, q, val) {
  var k = STORAGE_PREFIX + 'answers_' + week;
  var saved = JSON.parse(localStorage.getItem(k) || '{}');
  saved['q' + q] = val;
  localStorage.setItem(k, JSON.stringify(saved));
}

function buildModuleSelector() {
  var el = document.getElementById('moduleSelector');
  el.innerHTML = '';
  for (var w = 1; w <= TOTAL_WEEKS; w++) {
    var btn = document.createElement('button');
    btn.className = 'module-btn' + (completedWeeks.has(w) ? ' completed' : '');
    btn.textContent = 'Week ' + w + (completedWeeks.has(w) ? ' \u2713' : '');
    btn.onclick = (function(week){ return function(){ selectModule(week); }; })(w);
    el.appendChild(btn);
  }
  refreshModuleButtons();
}
function refreshModuleButtons() {
  document.querySelectorAll('.module-btn').forEach(function(btn, i) { btn.classList.toggle('active', i + 1 === currentWeek); });
}

function selectModule(week) { currentWeek = week; currentDay = 0; refreshModuleButtons(); updateWeekContent(); }

function buildDayTabs() {
  var week = weekData[currentWeek];
  var el = document.getElementById('dayTabs');
  el.innerHTML = '';
  week.days.forEach(function(day, i) {
    var btn = document.createElement('button');
    btn.className = 'day-btn' + (day.label === 'Friday' ? ' friday' : '') + (i === currentDay ? ' active' : '');
    btn.textContent = day.label;
    btn.onclick = function(){ currentDay = i; buildDayTabs(); renderDayContent(); };
    el.appendChild(btn);
  });
}
function renderDayContent() {
  var day = weekData[currentWeek].days[currentDay];
  document.getElementById('lessonContent').innerHTML =
    '<div class="day-label">&#128197; ' + day.label + ' &middot; Week ' + currentWeek + '</div>' + day.content;
}

function showTab(tabName, tabBtn) {
  document.querySelectorAll('.content-section').forEach(function(s){ s.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.getElementById(tabName).classList.add('active');
  if (tabBtn) tabBtn.classList.add('active');
}

function updateVideoSection() {
  const v = weekData[currentWeek].videos;
  const CS = '<div style="position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#1a1a2e,#16213e);display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;"><div style="font-size:2.2rem;">&#127916;</div><p style="color:#fff;font-weight:700;margin-top:8px;font-size:0.85rem;">Video Coming Soon</p></div>';
  const iframe = function(id) {
    return '<iframe src="https://www.youtube.com/embed/'+id+'?rel=0&modestbranding=1&iv_load_policy=3" frameborder="0" allowfullscreen style="position:absolute;top:0;left:0;width:100%;height:100%;border-radius:10px;"></iframe>';
  };
  document.getElementById('tutorialVideo').innerHTML = (v.t && v.t !== 'PLACEHOLDER') ? iframe(v.t) : CS;
  document.getElementById('basicVideo').innerHTML = (v.b && v.b !== 'PLACEHOLDER') ? iframe(v.b) : CS;
  document.getElementById('tutorialTitle').textContent = v.tTitle;
  document.getElementById('basicTitle').textContent = v.bTitle;
  document.getElementById('weekTitle').textContent = 'Videos \u2014 Week ' + currentWeek;
}

function renderResources() {
  var week = weekData[currentWeek];
  document.getElementById('resourcesTitle').textContent = 'Resources \u2014 Week ' + currentWeek;
  var html = '<div class="resources-grid">';
  week.resources.forEach(function(r) {
    var pdfUrl = 'https://mozilla.github.io/pdf.js/web/viewer.html?file=' + BASE_URL + r.file;
    html += '<a href="'+pdfUrl+'" class="resource-card" target="_blank"><div class="resource-icon">'+r.icon+'</div><h4>'+r.title+'</h4><p>'+r.desc+'</p><span class="download-badge">View PDF</span></a>';
  });
  html += '</div>';
  document.getElementById('resourcesBody').innerHTML = html;
}

function renderAssessment() {
  var week = weekData[currentWeek];
  var html = '<h2 style="font-size:1.1rem;margin-bottom:6px;">Week ' + currentWeek + ' Assessment</h2>';
  html += '<p style="color:#888;margin-bottom:16px;font-size:0.85rem;">'+week.assessment.length+' questions. You need 70% to pass. Available from Friday.</p>';
  week.assessment.forEach(function(q, qi) {
    html += '<div class="quiz-question"><h4>Q'+(qi+1)+': '+q.question+'</h4><div class="quiz-options">';
    q.options.forEach(function(opt, oi) {
      html += '<label class="quiz-option"><input type="radio" name="w'+currentWeek+'q'+qi+'" value="'+oi+'" onchange="saveAnswer('+currentWeek+','+qi+','+oi+')"> '+opt+'</label>';
    });
    html += '</div></div>';
  });
  html += '<a href="submit_RES_'+currentWeek+'.html" onclick="localStorage.setItem(\'cl_submit_course\',\'RES\');localStorage.setItem(\'cl_submit_week\',\''+currentWeek+'\');" class="submit-btn">Submit Assessment</a>';

  if (week.shortAnswers && week.shortAnswers.length) {
    html += '<h3 style="margin-top:26px;margin-bottom:6px;font-size:1rem;color:#4caf50;">&#9997; Short Answer Practice</h3>';
    html += '<p style="color:#888;margin-bottom:14px;font-size:0.8rem;">Exam-style questions, marked out of the total shown. These are for practice only and don\'t affect your pass/fail score — write your answer, then reveal the model answer to check yourself.</p>';
    week.shortAnswers.forEach(function(sa, si) {
      var id = 'sa_' + currentWeek + '_' + si;
      html += '<div class="sa-practice">' +
        '<h4>Q'+(si+1)+': '+sa.question+'</h4>' +
        '<div class="sa-marks">['+sa.marks+' marks]</div>' +
        '<textarea placeholder="Type your answer here..." id="'+id+'_input"></textarea>' +
        '<div><button class="sa-reveal-btn" onclick="revealModelAnswer(\''+id+'\')">Reveal Model Answer</button></div>' +
        '<div class="sa-model-answer" id="'+id+'_answer"><strong>Model Answer:</strong> '+sa.modelAnswer+'</div>' +
        '</div>';
    });
  }

  document.getElementById('assessmentContent').innerHTML = html;
}

function revealModelAnswer(id) {
  document.getElementById(id + '_answer').classList.add('shown');
}

function updateWeekContent() {
  updateVideoSection();
  buildDayTabs();
  renderDayContent();
  renderResources();
  renderAssessment();
}

function updateProgress() {
  const done = completedWeeks.size;
  const pct = Math.round(done / TOTAL_WEEKS * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '% complete';
  document.getElementById('weeksComplete').textContent = done + '/' + TOTAL_WEEKS;
  document.getElementById('videosWatched').textContent = (done*2) + '/' + (TOTAL_WEEKS*2);
  document.getElementById('assessmentsPassed').textContent = done + '/' + TOTAL_WEEKS;
}

// ── Lightbox: tap any illustration to zoom, with a scale+fade animation ──
function openLightbox(src, caption) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightboxCaption').textContent = caption || '';
  var overlay = document.getElementById('lightboxOverlay');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox(e) {
  if (e) e.stopPropagation();
  document.getElementById('lightboxOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeLightbox();
});
document.getElementById('lessonContent').addEventListener('click', function(e) {
  if (e.target.tagName === 'IMG' && e.target.closest('.illustration')) {
    var captionEl = e.target.closest('.illustration').querySelector('.caption');
    openLightbox(e.target.src, captionEl ? captionEl.textContent : '');
  }
});

window.onload = function() {
  const isLight = localStorage.getItem('cl_theme') === 'light';
  if (isLight) { document.getElementById('body').classList.add('light-mode'); document.getElementById('themeBtn').innerHTML = '&#9790; Dark'; }
  buildModuleSelector();
  updateProgress();
  selectModule(1);
};
</script>
