<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Revise — Grade 9 Natural Sciences</title>
<link rel="icon" type="image/png" href="https://dbeducator.github.io/natural-sciences-grade9/favicon.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #07070c; color: #fff; min-height: 100vh; }
  body.light-mode { background: #f0f2f5; color: #222; }

  .header { background: linear-gradient(135deg, #4caf50 0%, #4caf50cc 100%); color: white; padding: 18px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
  .header-content { max-width: 700px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  .header h1 { font-size: 1.1rem; }
  .header p { font-size: 0.75rem; opacity: 0.9; }
  .theme-toggle { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 6px 12px; border-radius: 18px; cursor: pointer; font-size: 0.8rem; font-family: inherit; }
  body.light-mode .theme-toggle { background: rgba(0,0,0,0.1); border-color: rgba(0,0,0,0.2); color: #333; }

  .container { max-width: 700px; margin: 0 auto; padding: 20px 16px 60px; }

  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 18px; }
  .stat { background: #12121f; border-radius: 12px; padding: 12px; text-align: center; }
  body.light-mode .stat { background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .stat h3 { font-size: 1.4rem; color: #4caf50; }
  .stat p { font-size: 0.68rem; color: #999; margin-top: 2px; }

  .filter-row { display: flex; gap: 8px; margin-bottom: 18px; overflow-x: auto; padding-bottom: 4px; }
  .filter-btn { padding: 7px 15px; background: #12121f; border: 1px solid rgba(76,175,80,0.4); border-radius: 18px; color: #aaa; font-size: 0.78rem; cursor: pointer; white-space: nowrap; font-family: inherit; }
  body.light-mode .filter-btn { background: #fff; }
  .filter-btn.active { background: #4caf50; color: #fff; border-color: #4caf50; font-weight: 700; }

  .deck-empty { text-align: center; padding: 60px 20px; color: #666; }
  .deck-empty .icon { font-size: 3rem; margin-bottom: 14px; }

  .card-wrap { perspective: 1200px; margin-bottom: 20px; }
  .flashcard { position: relative; height: 240px; border-radius: 18px; cursor: pointer; transform-style: preserve-3d; transition: transform 0.5s; }
  .flashcard.flipped { transform: rotateY(180deg); }
  .face { position: absolute; inset: 0; border-radius: 18px; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; text-align: center; }
  .face-front { background: linear-gradient(135deg, #12121f, #1a1a2e); border: 1px solid rgba(76,175,80,0.3); }
  body.light-mode .face-front { background: #fff; box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
  .face-back { background: linear-gradient(135deg, #1b4d2e, #256d3f); transform: rotateY(180deg); }
  .card-topic-tag { font-size: 0.65rem; color: #4caf50; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 12px; font-weight: 700; }
  .face-back .card-topic-tag { color: rgba(255,255,255,0.75); }
  .card-term { font-size: 1.5rem; font-weight: 700; }
  .card-def { font-size: 0.92rem; line-height: 1.5; color: #fff; }
  .card-hint { font-size: 0.7rem; color: #666; margin-top: 14px; }
  .face-back .card-hint { color: rgba(255,255,255,0.65); }

  .card-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .card-btn { padding: 14px; border-radius: 12px; border: none; font-weight: 700; font-size: 0.9rem; cursor: pointer; font-family: inherit; }
  .btn-still { background: rgba(244,67,54,0.15); border: 1px solid rgba(244,67,54,0.4); color: #ef5350; }
  .btn-got { background: rgba(76,175,80,0.15); border: 1px solid #4caf50; color: #4caf50; }
  .card-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .progress-track { height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
  body.light-mode .progress-track { background: #e0e0e0; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #4caf50, #66bb6a); transition: width 0.3s; }

  .restart-btn { display: block; width: 100%; margin-top: 20px; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); color: #aaa; border-radius: 12px; font-size: 0.85rem; cursor: pointer; font-family: inherit; }

  .mastered-banner { background: rgba(76,175,80,0.1); border: 1px solid rgba(76,175,80,0.4); border-radius: 14px; padding: 24px; text-align: center; margin-bottom: 18px; }
  .mastered-banner .icon { font-size: 2.5rem; margin-bottom: 8px; }
</style>
</head>
<body id="body">
<script>if(localStorage.getItem('cl_theme')==='light')document.getElementById('body').classList.add('light-mode');</script>

<div class="header">
  <div class="header-content">
    <div>
      <h1>&#128218; Revise</h1>
      <p>Grade 9 Natural Sciences &middot; Spaced Vocabulary Review</p>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">&#9728;</button>
  </div>
</div>

<div class="container">
  <div class="stats-row">
    <div class="stat"><h3 id="statTotal">0</h3><p>Total Terms</p></div>
    <div class="stat"><h3 id="statMastered">0</h3><p>Mastered</p></div>
    <div class="stat"><h3 id="statLearning">0</h3><p>Still Learning</p></div>
  </div>

  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

  <div class="filter-row" id="filterRow"></div>

  <div id="deckArea"></div>

  <button class="restart-btn" onclick="resetProgress()">&#8635; Reset All Progress for This Filter</button>

  <div style="text-align:center;margin-top:24px;">
    <a href="index.html" style="color:#4caf50;text-decoration:none;font-size:0.85rem;">&#8592; Back to Topics</a>
  </div>
</div>

<script>
// ── VOCAB BANK ──
// Each topic's Friday "Key Vocabulary" block feeds this array.
// Add a new object here whenever a new topic page is built.
const VOCAB_BANK = [
  { id: 'cel_cell', term: 'Cell', def: 'The basic structural and functional unit of all living things.', strand: 'Life and Living', topic: 'Cells as the Basic Unit of Life' },
  { id: 'cel_nucleus', term: 'Nucleus', def: "The organelle that contains DNA and controls the cell's activities.", strand: 'Life and Living', topic: 'Cells as the Basic Unit of Life' },
  { id: 'cel_mitochondria', term: 'Mitochondria', def: 'Organelle where aerobic respiration releases energy for the cell.', strand: 'Life and Living', topic: 'Cells as the Basic Unit of Life' },
  { id: 'cel_chloroplast', term: 'Chloroplast', def: 'Plant organelle containing chlorophyll — site of photosynthesis.', strand: 'Life and Living', topic: 'Cells as the Basic Unit of Life' },
  { id: 'cel_turgid', term: 'Turgid', def: 'Firm and swollen — describes a plant cell full of water.', strand: 'Life and Living', topic: 'Cells as the Basic Unit of Life' },
  { id: 'cel_tissue', term: 'Tissue', def: 'A group of similar cells performing the same function.', strand: 'Life and Living', topic: 'Cells as the Basic Unit of Life' },
  { id: 'dig_digestion', term: 'Digestion', def: 'The breakdown of food into molecules small enough to be absorbed.', strand: 'Life and Living', topic: 'The Digestive System' },
  { id: 'dig_enzyme', term: 'Enzyme', def: 'A biological molecule that speeds up a specific chemical reaction, such as breaking down food.', strand: 'Life and Living', topic: 'The Digestive System' },
  { id: 'dig_peristalsis', term: 'Peristalsis', def: 'Rhythmic muscle contractions that push food along the digestive tract.', strand: 'Life and Living', topic: 'The Digestive System' },
  { id: 'dig_villi', term: 'Villi', def: 'Finger-like projections in the small intestine that increase surface area for absorption.', strand: 'Life and Living', topic: 'The Digestive System' },
  { id: 'dig_bile', term: 'Bile', def: 'A fluid made by the liver that emulsifies (physically breaks up) fat.', strand: 'Life and Living', topic: 'The Digestive System' },
  { id: 'dig_absorption', term: 'Absorption', def: 'Nutrients passing from the digestive tract into the bloodstream.', strand: 'Life and Living', topic: 'The Digestive System' },
  { id: 'cir_artery', term: 'Artery', def: 'A blood vessel that carries blood away from the heart, under high pressure.', strand: 'Life and Living', topic: 'The Circulatory System' },
  { id: 'cir_vein', term: 'Vein', def: 'A blood vessel that carries blood back towards the heart, under low pressure.', strand: 'Life and Living', topic: 'The Circulatory System' },
  { id: 'cir_capillary', term: 'Capillary', def: 'A tiny, one-cell-thick vessel where substances are exchanged with body tissue.', strand: 'Life and Living', topic: 'The Circulatory System' },
  { id: 'cir_atrium', term: 'Atrium', def: 'One of the two upper chambers of the heart that receives blood.', strand: 'Life and Living', topic: 'The Circulatory System' },
  { id: 'cir_ventricle', term: 'Ventricle', def: 'One of the two lower chambers of the heart that pumps blood out.', strand: 'Life and Living', topic: 'The Circulatory System' },
  { id: 'cir_doublecirc', term: 'Double circulation', def: 'Blood passing through the heart twice per full circuit (pulmonary and systemic).', strand: 'Life and Living', topic: 'The Circulatory System' },
  { id: 'res_alveoli', term: 'Alveoli', def: 'Tiny air sacs in the lungs where gas exchange with the blood occurs.', strand: 'Life and Living', topic: 'The Respiratory System' },
  { id: 'res_diaphragm', term: 'Diaphragm', def: 'The dome-shaped muscle below the lungs that drives breathing.', strand: 'Life and Living', topic: 'The Respiratory System' },
  { id: 'res_trachea', term: 'Trachea', def: 'The windpipe; the tube carrying air from the throat towards the lungs.', strand: 'Life and Living', topic: 'The Respiratory System' },
  { id: 'res_bronchi', term: 'Bronchi', def: 'The two main branches of the trachea, one leading to each lung.', strand: 'Life and Living', topic: 'The Respiratory System' },
  { id: 'res_ventilation', term: 'Ventilation (breathing)', def: 'The mechanical movement of air into and out of the lungs.', strand: 'Life and Living', topic: 'The Respiratory System' },
  { id: 'res_respiration', term: 'Respiration', def: 'The chemical release of energy from glucose inside cells, using oxygen.', strand: 'Life and Living', topic: 'The Respiratory System' },
  { id: 'msk_skeleton', term: 'Skeleton', def: 'The internal framework of bones supporting and protecting the body.', strand: 'Life and Living', topic: 'The Musculo-Skeletal System' },
  { id: 'msk_joint', term: 'Joint', def: 'A point where two or more bones meet, allowing movement.', strand: 'Life and Living', topic: 'The Musculo-Skeletal System' },
  { id: 'msk_ligament', term: 'Ligament', def: 'Tough tissue connecting bone to bone at a joint.', strand: 'Life and Living', topic: 'The Musculo-Skeletal System' },
  { id: 'msk_tendon', term: 'Tendon', def: 'Tough tissue connecting muscle to bone.', strand: 'Life and Living', topic: 'The Musculo-Skeletal System' },
  { id: 'msk_cartilage', term: 'Cartilage', def: 'Smooth connective tissue that cushions joints and reduces friction.', strand: 'Life and Living', topic: 'The Musculo-Skeletal System' },
  { id: 'msk_antagonistic', term: 'Antagonistic muscles', def: 'A pair of muscles that produce opposite movements at a joint.', strand: 'Life and Living', topic: 'The Musculo-Skeletal System' },
  { id: 'exc_excretion', term: 'Excretion', def: "The removal of metabolic waste produced by the body's own cells.", strand: 'Life and Living', topic: 'The Excretory System' },
  { id: 'exc_kidney', term: 'Kidney', def: 'The organ that filters blood and produces urine.', strand: 'Life and Living', topic: 'The Excretory System' },
  { id: 'exc_nephron', term: 'Nephron', def: 'The microscopic filtering unit inside the kidney.', strand: 'Life and Living', topic: 'The Excretory System' },
  { id: 'exc_urea', term: 'Urea', def: 'A nitrogen-containing waste product formed from the breakdown of proteins.', strand: 'Life and Living', topic: 'The Excretory System' },
  { id: 'exc_ureter', term: 'Ureter', def: 'The tube carrying urine from a kidney to the bladder.', strand: 'Life and Living', topic: 'The Excretory System' },
  { id: 'exc_egestion', term: 'Egestion', def: "The removal of undigested food (faeces) that never entered the body's cells.", strand: 'Life and Living', topic: 'The Excretory System' },
  { id: 'ner_neuron', term: 'Neuron', def: 'A nerve cell that transmits electrical and chemical signals.', strand: 'Life and Living', topic: 'The Nervous System' },
  { id: 'ner_synapse', term: 'Synapse', def: 'The tiny gap between two neurons where a signal is passed chemically.', strand: 'Life and Living', topic: 'The Nervous System' },
  { id: 'ner_reflex', term: 'Reflex', def: 'A fast, automatic, involuntary response to a stimulus.', strand: 'Life and Living', topic: 'The Nervous System' },
  { id: 'ner_reflexarc', term: 'Reflex arc', def: 'The pathway a reflex signal follows, from receptor to effector, via the spinal cord.', strand: 'Life and Living', topic: 'The Nervous System' },
  { id: 'ner_cerebrum', term: 'Cerebrum', def: 'The largest part of the brain; controls conscious thought and voluntary movement.', strand: 'Life and Living', topic: 'The Nervous System' },
  { id: 'ner_cerebellum', term: 'Cerebellum', def: 'The part of the brain that controls balance and coordination.', strand: 'Life and Living', topic: 'The Nervous System' },
  { id: 'rep_puberty', term: 'Puberty', def: 'The hormonally-triggered stage of development when the body becomes sexually mature.', strand: 'Life and Living', topic: 'The Reproductive System' },
  { id: 'rep_testis', term: 'Testis', def: 'The male organ that produces sperm cells and testosterone.', strand: 'Life and Living', topic: 'The Reproductive System' },
  { id: 'rep_ovary', term: 'Ovary', def: 'The female organ that produces egg cells and oestrogen.', strand: 'Life and Living', topic: 'The Reproductive System' },
  { id: 'rep_uterus', term: 'Uterus', def: 'The organ where a fertilised egg implants and develops during pregnancy.', strand: 'Life and Living', topic: 'The Reproductive System' },
  { id: 'rep_gamete', term: 'Gamete', def: 'A sex cell (sperm or egg) involved in reproduction.', strand: 'Life and Living', topic: 'The Reproductive System' },
  { id: 'rep_zygote', term: 'Zygote', def: 'The single fertilised cell formed when a sperm and egg cell fuse.', strand: 'Life and Living', topic: 'The Reproductive System' },
  { id: 'rep_fertilisation', term: 'Fertilisation', def: 'The fusing of a sperm cell and an egg cell.', strand: 'Life and Living', topic: 'The Reproductive System' },
  { id: 'pcc_physical', term: 'Physical change', def: 'A change in form, size, or state where no new substance is formed.', strand: 'Matter and Materials', topic: 'Physical and Chemical Change' },
  { id: 'pcc_chemical', term: 'Chemical change', def: 'A change where one or more new substances form, with different properties.', strand: 'Matter and Materials', topic: 'Physical and Chemical Change' },
  { id: 'pcc_reversible', term: 'Reversible', def: 'A change that can be undone, returning the original substance(s).', strand: 'Matter and Materials', topic: 'Physical and Chemical Change' },
  { id: 'pcc_irreversible', term: 'Irreversible', def: 'A change that cannot easily be undone.', strand: 'Matter and Materials', topic: 'Physical and Chemical Change' },
  { id: 'pcc_precipitate', term: 'Precipitate', def: 'A solid that forms and separates out of a liquid during a chemical reaction.', strand: 'Matter and Materials', topic: 'Physical and Chemical Change' },
  { id: 'ato_proton', term: 'Proton', def: 'A positively charged particle found in the nucleus.', strand: 'Matter and Materials', topic: 'Atoms — Structure & Bonding' },
  { id: 'ato_neutron', term: 'Neutron', def: 'A neutral (uncharged) particle found in the nucleus.', strand: 'Matter and Materials', topic: 'Atoms — Structure & Bonding' },
  { id: 'ato_electron', term: 'Electron', def: 'A negatively charged particle found in shells around the nucleus.', strand: 'Matter and Materials', topic: 'Atoms — Structure & Bonding' },
  { id: 'ato_ionicbond', term: 'Ionic bond', def: 'A bond formed by the transfer of electrons, typically between a metal and a non-metal.', strand: 'Matter and Materials', topic: 'Atoms — Structure & Bonding' },
  { id: 'ato_covalentbond', term: 'Covalent bond', def: 'A bond formed by the sharing of electrons, typically between two non-metals.', strand: 'Matter and Materials', topic: 'Atoms — Structure & Bonding' },
  { id: 'ato_compound', term: 'Compound', def: 'Two or more elements chemically bonded together in a fixed ratio.', strand: 'Matter and Materials', topic: 'Atoms — Structure & Bonding' },
  { id: 'per_period', term: 'Period', def: 'A horizontal row of the periodic table.', strand: 'Matter and Materials', topic: 'The Periodic Table' },
  { id: 'per_group', term: 'Group', def: 'A vertical column of the periodic table.', strand: 'Matter and Materials', topic: 'The Periodic Table' },
  { id: 'per_metalloid', term: 'Metalloid', def: 'An element with properties between metals and non-metals.', strand: 'Matter and Materials', topic: 'The Periodic Table' },
  { id: 'per_valency', term: 'Valency', def: 'A number representing how many bonds an atom typically forms.', strand: 'Matter and Materials', topic: 'The Periodic Table' },
  { id: 'per_reactivity', term: 'Reactivity', def: 'How readily an element undergoes chemical reactions.', strand: 'Matter and Materials', topic: 'The Periodic Table' },
  { id: 'per_noblegas', term: 'Noble gas', def: 'An extremely unreactive gas from Group 18, with a full outer shell.', strand: 'Matter and Materials', topic: 'The Periodic Table' },
  { id: 'cre_reactant', term: 'Reactant', def: 'A starting substance in a chemical reaction.', strand: 'Matter and Materials', topic: 'Chemical Reactions & Equations' },
  { id: 'cre_product', term: 'Product', def: 'A substance formed by a chemical reaction.', strand: 'Matter and Materials', topic: 'Chemical Reactions & Equations' },
  { id: 'cre_coefficient', term: 'Coefficient', def: 'A number in front of a formula showing quantity; can be changed when balancing.', strand: 'Matter and Materials', topic: 'Chemical Reactions & Equations' },
  { id: 'cre_synthesis', term: 'Synthesis reaction', def: 'Simple substances combining to form one more complex product (A + B → AB).', strand: 'Matter and Materials', topic: 'Chemical Reactions & Equations' },
  { id: 'cre_decomposition', term: 'Decomposition reaction', def: 'One substance breaking down into simpler products (AB → A + B).', strand: 'Matter and Materials', topic: 'Chemical Reactions & Equations' },
  { id: 'cre_displacement', term: 'Displacement reaction', def: 'A more reactive element replacing a less reactive one in a compound.', strand: 'Matter and Materials', topic: 'Chemical Reactions & Equations' },
  { id: 'rma_salt', term: 'Salt', def: 'An ionic compound formed when a metal reacts with an acid (or in neutralisation).', strand: 'Matter and Materials', topic: 'Reactions of Metals & Acids' },
  { id: 'rma_poptest', term: 'Pop test', def: 'The standard test for hydrogen gas, using a lit splint.', strand: 'Matter and Materials', topic: 'Reactions of Metals & Acids' },
  { id: 'rma_chloride', term: 'Chloride', def: 'The salt type formed when a metal reacts with hydrochloric acid.', strand: 'Matter and Materials', topic: 'Reactions of Metals & Acids' },
  { id: 'rma_sulfate', term: 'Sulfate', def: 'The salt type formed when a metal reacts with sulfuric acid.', strand: 'Matter and Materials', topic: 'Reactions of Metals & Acids' },
  { id: 'rma_nitrate', term: 'Nitrate', def: 'The salt type formed when a metal reacts with nitric acid.', strand: 'Matter and Materials', topic: 'Reactions of Metals & Acids' }
];

const STORAGE_KEY = 'gr9_vocab_progress';
let progress = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
let currentFilter = 'all';
let queue = [];
let currentCard = null;
let isFlipped = false;

function saveProgress() { localStorage.setItem(STORAGE_KEY, JSON.stringify(progress)); }
function getStreak(id) { return progress[id] || 0; }

function toggleTheme() {
  const isLight = document.getElementById('body').classList.toggle('light-mode');
  localStorage.setItem('cl_theme', isLight ? 'light' : 'dark');
  document.getElementById('themeBtn').innerHTML = isLight ? '&#127761;' : '&#9728;';
}

function buildFilters() {
  var strands = ['all'].concat([...new Set(VOCAB_BANK.map(function(v){ return v.strand; }))]);
  var el = document.getElementById('filterRow');
  el.innerHTML = '';
  strands.forEach(function(s) {
    var btn = document.createElement('button');
    btn.className = 'filter-btn' + (s === currentFilter ? ' active' : '');
    btn.textContent = s === 'all' ? 'All Terms' : s;
    btn.onclick = function() { currentFilter = s; buildFilters(); buildQueue(); };
    el.appendChild(btn);
  });
}

function activeCards() {
  return currentFilter === 'all' ? VOCAB_BANK : VOCAB_BANK.filter(function(v){ return v.strand === currentFilter; });
}

function buildQueue() {
  var cards = activeCards().filter(function(v){ return getStreak(v.id) < 2; });
  queue = shuffle(cards.slice());
  nextCard();
  updateStats();
}

function shuffle(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  return arr;
}

function updateStats() {
  var cards = activeCards();
  var total = cards.length;
  var mastered = cards.filter(function(v){ return getStreak(v.id) >= 2; }).length;
  var learning = total - mastered;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statMastered').textContent = mastered;
  document.getElementById('statLearning').textContent = learning;
  document.getElementById('progressFill').style.width = (total ? Math.round(mastered/total*100) : 0) + '%';
}

function nextCard() {
  isFlipped = false;
  if (queue.length === 0) {
    renderMasteredOrEmpty();
    return;
  }
  currentCard = queue[0];
  renderCard();
}

function renderMasteredOrEmpty() {
  var cards = activeCards();
  var deckArea = document.getElementById('deckArea');
  if (cards.length === 0) {
    deckArea.innerHTML = '<div class="deck-empty"><div class="icon">&#128218;</div><h3>No vocabulary yet</h3><p style="margin-top:6px;font-size:0.85rem;">Complete a topic to add terms here.</p></div>';
    return;
  }
  deckArea.innerHTML = '<div class="mastered-banner"><div class="icon">&#127881;</div><h3>All caught up!</h3><p style="margin-top:6px;font-size:0.85rem;color:#aaa;">You\'ve mastered every term in this set. Come back after your next topic, or reset below to review again.</p></div>';
}

function renderCard() {
  var v = currentCard;
  var deckArea = document.getElementById('deckArea');
  deckArea.innerHTML =
    '<div class="card-wrap"><div class="flashcard" id="flashcard" onclick="flipCard()">' +
      '<div class="face face-front"><div class="card-topic-tag">'+v.strand+'</div><div class="card-term">'+v.term+'</div><div class="card-hint">Tap to reveal definition</div></div>' +
      '<div class="face face-back"><div class="card-topic-tag">'+v.topic+'</div><div class="card-def">'+v.def+'</div><div class="card-hint">Tap to flip back</div></div>' +
    '</div></div>' +
    '<div class="card-actions">' +
      '<button class="card-btn btn-still" onclick="answerCard(false)" id="btnStill" disabled>&#128260; Still Learning</button>' +
      '<button class="card-btn btn-got" onclick="answerCard(true)" id="btnGot" disabled>&#9989; Got It</button>' +
    '</div>';
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('flashcard').classList.toggle('flipped', isFlipped);
  if (isFlipped) {
    document.getElementById('btnStill').disabled = false;
    document.getElementById('btnGot').disabled = false;
  }
}

function answerCard(gotIt) {
  var v = currentCard;
  if (gotIt) {
    progress[v.id] = getStreak(v.id) + 1;
    queue.shift();
    if (getStreak(v.id) < 2) {
      // requeue further back so it's reviewed again before mastery
      var pos = Math.min(queue.length, 3);
      queue.splice(pos, 0, v);
    }
  } else {
    progress[v.id] = 0;
    queue.shift();
    var pos2 = Math.min(queue.length, 2);
    queue.splice(pos2, 0, v);
  }
  saveProgress();
  updateStats();
  nextCard();
}

function resetProgress() {
  if (!confirm('Reset progress for "' + (currentFilter === 'all' ? 'All Terms' : currentFilter) + '"? This cannot be undone.')) return;
  activeCards().forEach(function(v) { delete progress[v.id]; });
  saveProgress();
  buildQueue();
}

window.onload = function() {
  const isLight = localStorage.getItem('cl_theme') === 'light';
  if (isLight) { document.getElementById('body').classList.add('light-mode'); document.getElementById('themeBtn').innerHTML = '&#127761;'; }
  buildFilters();
  buildQueue();
};
</script>
</body>
</html>
