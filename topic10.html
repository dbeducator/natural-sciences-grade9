<script>
const STORAGE_PREFIX = 'coachG9_ATO_';
const TOTAL_WEEKS = 2;
const COURSE_NAME = 'Atoms — Structure & Bonding';
const GOOGLE_SHEET_URL = 'https://script.google.com/macros/s/REPLACE_WITH_YOUR_SCRIPT_ID/exec';
const SECRET_KEY = 'CoachG9SecureKey';
const BASE_URL = 'https://dbeducator.github.io/natural-sciences-grade9/';

// ── One entry per week. Each week has 5 days (Mon-Thu teaching, Fri = assessment day). ──
const weekData = {
  1: {
    videos: { t: 'NgD9yHSJ29I', tTitle: 'Atomic Structure — Tutorial', b: 'OH-aSu-rWgk', bTitle: 'Atoms — Explained Simply' },
    days: [
      { label: 'Monday', content: `<h2>&#9883; The Building Blocks of Everything</h2>
<div class="block block-objectives"><h3>&#127919; Learning Objectives</h3><ul>
<li>Name the three subatomic particles and their charges</li>
<li>Describe where each particle is found within an atom</li>
<li>Explain what makes atoms of different elements different</li>
</ul></div>
<div class="block block-intro"><h3>&#128214; Introduction</h3>
<p>Everything you touched today — your desk, your phone, the air you're breathing — is built from atoms. An atom is the smallest unit of an element that still has the properties of that element. Yet atoms themselves are made of even smaller particles, and understanding these particles unlocks almost everything else in chemistry.</p></div>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/Atom_Diagram.svg" alt="Diagram of an atom showing the nucleus with protons and neutrons, and electrons orbiting" loading="lazy"/>
<div class="caption">A basic model of an atom: a central nucleus surrounded by orbiting electrons. Wikimedia Commons</div>
</div>
<div class="block block-concept"><h3>&#128300; Key Concept: Three Subatomic Particles</h3>
<table style="width:100%;font-size:0.85rem;border-collapse:collapse;margin-top:8px;">
<tr><th style="text-align:left;padding:5px;color:#4caf50;">Particle</th><th style="text-align:left;padding:5px;color:#4caf50;">Charge</th><th style="text-align:left;padding:5px;color:#4caf50;">Location</th></tr>
<tr><td style="padding:5px;">Proton</td><td style="padding:5px;">Positive (+)</td><td style="padding:5px;">Nucleus</td></tr>
<tr><td style="padding:5px;">Neutron</td><td style="padding:5px;">None (neutral)</td><td style="padding:5px;">Nucleus</td></tr>
<tr><td style="padding:5px;">Electron</td><td style="padding:5px;">Negative (&minus;)</td><td style="padding:5px;">Orbiting the nucleus</td></tr>
</table>
<p style="margin-top:8px;">In a neutral atom, the number of protons always equals the number of electrons, so the positive and negative charges balance out to zero overall.</p></div>
<div class="block block-mnemonic"><h3>&#129504; Memory Trick</h3>
<p class="trick">PN in the centre (Proton, Neutron in the Nucleus) &middot; E for Edges (Electrons on the outside)</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: An atom has 6 protons. How many electrons must it have to be neutral?</summary>
<div class="answer">6 electrons — in a neutral atom, the number of electrons always equals the number of protons, so the positive and negative charges cancel out.</div>
</details>` },

      { label: 'Tuesday', content: `<h2>&#128290; Atomic Number & Mass Number</h2>
<div class="block block-concept"><h3>&#128300; Key Concept: Two Important Numbers</h3>
<ul>
<li><strong>Atomic number</strong> — the number of protons in an atom. This defines which element it is; every atom of a given element has the same atomic number.</li>
<li><strong>Mass number</strong> — the total number of protons PLUS neutrons in an atom's nucleus (electrons are so light they barely count towards mass).</li>
</ul>
<p>Number of neutrons = mass number &minus; atomic number.</p>
<h4>Example: Carbon</h4>
<p>Carbon has an atomic number of 6 (6 protons) and a typical mass number of 12. That means it has 12 &minus; 6 = 6 neutrons, and (being neutral) 6 electrons too.</p></div>
<div class="block block-dyk"><h3>&#11088; Did You Know?</h3>
<p>Atoms of the same element can have different numbers of neutrons — these variants are called isotopes. Carbon-12 and carbon-14 are both carbon (6 protons each), but carbon-14 has 2 extra neutrons, and is famously used to date ancient fossils and artefacts.</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: An atom has an atomic number of 8 and a mass number of 16. How many neutrons does it have?</summary>
<div class="answer">8 neutrons (16 &minus; 8 = 8). This happens to be oxygen.</div>
</details>` },

      { label: 'Wednesday', content: `<h2>&#128302; Electron Arrangement</h2>
<div class="illustration">
<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:280px;height:auto;background:#fff;border-radius:10px;padding:10px;">
<circle cx="150" cy="150" r="18" fill="#4caf50"/>
<text x="150" y="155" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Na</text>
<circle cx="150" cy="150" r="50" fill="none" stroke="#ccc" stroke-width="1.5" stroke-dasharray="3,3"/>
<circle cx="150" cy="150" r="90" fill="none" stroke="#ccc" stroke-width="1.5" stroke-dasharray="3,3"/>
<circle cx="150" cy="150" r="130" fill="none" stroke="#ccc" stroke-width="1.5" stroke-dasharray="3,3"/>
<circle cx="200" cy="150" r="6" fill="#1565c0"/>
<circle cx="100" cy="150" r="6" fill="#1565c0"/>
<circle cx="150" cy="60" r="6" fill="#1565c0"/><circle cx="203" cy="82" r="6" fill="#1565c0"/><circle cx="228" cy="150" r="6" fill="#1565c0"/><circle cx="203" cy="218" r="6" fill="#1565c0"/><circle cx="150" cy="240" r="6" fill="#1565c0"/><circle cx="97" cy="218" r="6" fill="#1565c0"/>
<circle cx="150" cy="20" r="6" fill="#1565c0"/>
<text x="150" y="285" text-anchor="middle" font-size="10" font-weight="700" fill="#222">Sodium: 2, 8, 1 (11 electrons total)</text>
</svg>
<div class="caption">Electron shells for a sodium atom — 2 in the first shell, 8 in the second, 1 in the third.</div>
</div>
<div class="block block-concept"><h3>&#128300; Key Concept: Energy Levels (Shells)</h3>
<p>Electrons don't orbit randomly — they occupy specific <strong>energy levels</strong>, often called shells, around the nucleus. Each shell can only hold a certain maximum number of electrons before the next shell starts filling:</p>
<ul>
<li>1st shell (closest to nucleus): up to 2 electrons</li>
<li>2nd shell: up to 8 electrons</li>
<li>3rd shell: up to 8 electrons (for the elements you'll meet at this level)</li>
</ul>
<p>Electrons fill the innermost shell first, then move outward once it's full. Sodium (11 electrons) fills as 2, 8, 1 — two full inner shells, and a single electron alone in the third shell.</p></div>
<div class="block block-mnemonic"><h3>&#129504; Memory Trick</h3>
<p class="trick">Shells fill like a stadium: fill the front rows (inner shells) before the back rows (outer shells)</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: An atom has 8 electrons. How would they be arranged across shells?</summary>
<div class="answer">2, 6 — the first shell fills with 2, leaving 6 electrons for the second shell (which could hold up to 8, but only 6 are left to place). This happens to be oxygen.</div>
</details>` },

      { label: 'Thursday', content: `<h2>&#128300; Practical Activity</h2>

<div class="block block-activity"><h3>&#128300; Practical Activity: Build an Atom Model</h3>
<div class="what-to-do"><strong>What to do:</strong> Choose any element with an atomic number from 1 to 20 (use a periodic table for reference if you have one). Using beads, dried beans, or coloured dots of paper (one colour for protons, one for neutrons, one for electrons), build a labelled model showing the nucleus with the correct number of protons and neutrons, and the correct number of electrons arranged in shells around it (remember: 2, then 8, then 8). Label your model with the element's name, atomic number, and mass number.</div></div>
<details class="quick-check"><summary>&#10067; Quick Check: Why do protons and neutrons contribute to mass number, but electrons essentially don't?</summary>
<div class="answer">Protons and neutrons have approximately the same, much larger mass. Electrons are roughly 1800 times lighter, so their contribution to the atom's total mass is small enough to be considered negligible.</div>
</details>` },

    days: [
      { label: 'Monday', content: `<h2>&#129504; Why Atoms Bond</h2>
<div class="block block-objectives"><h3>&#127919; Learning Objectives</h3><ul>
<li>Explain why atoms form chemical bonds</li>
<li>Describe how ionic bonds form</li>
<li>Identify which types of elements typically form ionic bonds</li>
</ul></div>
<div class="block block-concept"><h3>&#128300; Key Concept: Chasing Stability</h3>
<p>Atoms are most stable when their outer shell is full. Most atoms don't naturally have a full outer shell, so they bond with other atoms — gaining, losing, or sharing electrons — to reach that stable, full-shell arrangement. This drive towards stability is the reason chemical bonds form at all.</p>
<h3>Ionic Bonding</h3>
<p>An <strong>ionic bond</strong> forms when one atom transfers an electron (or electrons) to another atom — typically between a metal and a non-metal. The atom that loses electrons becomes a positively charged ion (cation); the atom that gains electrons becomes a negatively charged ion (anion). The oppositely charged ions then attract each other strongly, forming the bond.</p></div>
<div class="illustration">
<svg viewBox="0 0 340 200" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:340px;height:auto;background:#fff;border-radius:10px;padding:10px;">
<circle cx="80" cy="100" r="35" fill="#4caf50" opacity="0.85"/>
<text x="80" y="95" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Na</text>
<text x="80" y="112" text-anchor="middle" font-size="10" fill="#fff">2,8,1</text>
<circle cx="260" cy="100" r="35" fill="#1565c0" opacity="0.85"/>
<text x="260" y="95" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Cl</text>
<text x="260" y="112" text-anchor="middle" font-size="10" fill="#fff">2,8,7</text>
<path d="M118 90 Q170 60 222 90" stroke="#e0a100" stroke-width="2.5" fill="none" marker-end="url(#arrow2)"/>
<text x="170" y="55" text-anchor="middle" font-size="10" font-weight="700" fill="#7a5c00">1 electron transferred</text>
<defs><marker id="arrow2" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#e0a100"/></marker></defs>
<text x="80" y="160" text-anchor="middle" font-size="11" font-weight="700" fill="#222">Na&#8314; (2,8)</text>
<text x="260" y="160" text-anchor="middle" font-size="11" font-weight="700" fill="#222">Cl&#8315; (2,8,8)</text>
</svg>
<div class="caption">Ionic bonding: sodium transfers one electron to chlorine, forming Na&#8314; and Cl&#8315; ions — both now with full outer shells.</div>
</div>
<div class="block block-mnemonic"><h3>&#129504; Memory Trick</h3>
<p class="trick">Ionic = I-Owe-Nic (one atom "owes" / gives away an electron to the other)</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: When sodium loses one electron to become Na&#8314;, why does it become MORE stable, not less?</summary>
<div class="answer">Losing that one outer electron leaves sodium with a full outer shell underneath (2, 8) — the same stable arrangement as a noble gas — which is more stable than having a single lonely electron in a mostly-empty third shell.</div>
</details>` },

      { label: 'Tuesday', content: `<h2>&#129309; Covalent Bonding</h2>
<div class="illustration">
<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:320px;height:auto;background:#fff;border-radius:10px;padding:10px;">
<circle cx="115" cy="90" r="42" fill="#4caf50" opacity="0.35"/>
<circle cx="205" cy="90" r="42" fill="#4caf50" opacity="0.35"/>
<circle cx="90" cy="90" r="28" fill="#2e7d32" opacity="0.9"/>
<text x="90" y="95" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">H</text>
<circle cx="230" cy="90" r="28" fill="#2e7d32" opacity="0.9"/>
<text x="230" y="95" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">H</text>
<circle cx="152" cy="82" r="5" fill="#1565c0"/>
<circle cx="168" cy="82" r="5" fill="#1565c0"/>
<text x="160" y="140" text-anchor="middle" font-size="10" font-weight="700" fill="#222">Shared pair of electrons</text>
</svg>
<div class="caption">Covalent bonding: two hydrogen atoms share a pair of electrons, both achieving a stable outer shell.</div>
</div>
<div class="block block-concept"><h3>&#128300; Key Concept: Sharing Instead of Transferring</h3>
<p>A <strong>covalent bond</strong> forms when two atoms — typically two non-metals — <strong>share</strong> a pair of electrons instead of transferring them completely. Both atoms count the shared pair towards their own outer shell, letting both reach a stable, full-shell arrangement at once.</p>
<p>Water (H&#8322;O), carbon dioxide (CO&#8322;), and oxygen gas (O&#8322;) are all held together by covalent bonds.</p></div>
<div class="block block-mnemonic"><h3>&#129504; Memory Trick</h3>
<p class="trick">Covalent = CO-valent = COoperating, sharing electrons rather than giving them away</p></div>
<div class="block block-dyk"><h3>&#11088; Did You Know?</h3>
<p>Ionic compounds tend to form hard, brittle crystals with high melting points (like table salt), while covalent compounds are often gases, liquids, or softer solids at room temperature (like water or sugar) — a direct, testable consequence of how differently the two types of bonds hold particles together.</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: Would you expect the bond between two oxygen atoms (both non-metals) to be ionic or covalent?</summary>
<div class="answer">Covalent. Ionic bonds typically form between a metal and a non-metal; when two non-metals bond, they share electrons covalently instead.</div>
</details>` },

      { label: 'Wednesday', content: `<h2>&#128142; Bonding in the Real World</h2>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/Kimberley_Big_Hole.jpg" alt="The Big Hole diamond mine in Kimberley, South Africa" loading="lazy"/>
<div class="caption">The Big Hole, Kimberley — the largest hand-dug excavation in the world, mined for diamonds from 1871 to 1914. Wikimedia Commons (public domain)</div>
</div>
<div class="block block-sa"><h3>&#127487; South African Connection</h3>
<p>Diamonds — famously mined at Kimberley's Big Hole, once the richest diamond mine on Earth — are made of pure carbon, with every carbon atom covalently bonded to four neighbouring carbon atoms in a rigid, repeating 3D lattice. This exceptionally strong, extensive network of covalent bonds is exactly why diamond is the hardest naturally occurring material known. It's a striking real-world example of how the type of bonding between atoms directly determines the physical properties of a material.</p></div>
<div class="block block-concept"><h3>&#128300; Key Concept: Elements, Compounds & Mixtures</h3>
<ul>
<li><strong>Element</strong> — a pure substance made of only one type of atom (e.g. pure carbon, pure oxygen)</li>
<li><strong>Compound</strong> — two or more different elements chemically bonded together in a fixed ratio (e.g. water, H&#8322;O)</li>
<li><strong>Mixture</strong> — two or more substances physically combined, in no fixed ratio, and not chemically bonded (e.g. air, salt water)</li>
</ul></div>
<details class="quick-check"><summary>&#10067; Quick Check: Is diamond an element, a compound, or a mixture?</summary>
<div class="answer">An element — diamond is made of only one type of atom, carbon, just arranged in a particular repeating covalently-bonded structure.</div>
</details>` },

      { label: 'Thursday', content: `<h2>&#128300; Practical Activity</h2>
<div class="block block-dyk"><h3>&#11088; Did You Know?</h3>
<p>Graphite — the "lead" in a pencil — is also pure carbon, just like diamond. The difference is entirely in the bonding pattern: graphite's carbon atoms form flat, covalently-bonded sheets that can slide over each other, which is exactly why it's soft enough to write with, unlike diamond.</p></div>
<div class="block block-activity"><h3>&#128300; Practical Activity: Classify the Bond</h3>
<div class="what-to-do"><strong>What to do:</strong> For each of the following substances, decide whether the bonding is most likely ionic or covalent, and explain your reasoning using the metal/non-metal rule: table salt (sodium chloride, NaCl), water (H&#8322;O), magnesium oxide (MgO, used in some antacids), carbon dioxide (CO&#8322;), potassium bromide (KBr). For each one, identify which elements are metals and which are non-metals to justify your answer.</div></div>
<details class="quick-check"><summary>&#10067; Quick Check: Magnesium oxide (MgO) — magnesium is a metal, oxygen is a non-metal. Ionic or covalent?</summary>
<div class="answer">Ionic — magnesium (a metal) transfers electrons to oxygen (a non-metal), forming Mg&#178;&#8314; and O&#178;&#8315; ions that attract each other.</div>
</details>` },

      { label: 'Friday', content: `<h2>&#128203; Summary & Key Vocabulary</h2>

function showTab(tabName, tabBtn) {
  document.querySelectorAll('.content-section').forEach(function(s){ s.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.getElementById(tabName).classList.add('active');
  if (tabBtn) tabBtn.classList.add('active');
}

function updateVideoSection() {
  const v = weekData[currentWeek].videos;
  const CS = '<div style="position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#1a1a2e,#16213e);display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;"><div style="font-size:2.2rem;">&#127916;</div><p style="color:#fff;font-weight:700;margin-top:8px;font-size:0.85rem;">Video Coming Soon</p></div>';
  const iframe = function(id) {
    return '<iframe src="https://www.youtube.com/embed/'+id+'?rel=0&modestbranding=1&iv_load_policy=3" frameborder="0" allowfullscreen style="position:absolute;top:0;left:0;width:100%;height:100%;border-radius:10px;"></iframe>';
  };
  document.getElementById('tutorialVideo').innerHTML = (v.t && v.t !== 'PLACEHOLDER') ? iframe(v.t) : CS;
  document.getElementById('basicVideo').innerHTML = (v.b && v.b !== 'PLACEHOLDER') ? iframe(v.b) : CS;
  document.getElementById('tutorialTitle').textContent = v.tTitle;
  document.getElementById('basicTitle').textContent = v.bTitle;
  document.getElementById('weekTitle').textContent = 'Videos \u2014 Week ' + currentWeek;
}

function renderResources() {
  var week = weekData[currentWeek];
  document.getElementById('resourcesTitle').textContent = 'Resources \u2014 Week ' + currentWeek;
  var html = '<div class="resources-grid">';
  week.resources.forEach(function(r) {
    var pdfUrl = 'https://mozilla.github.io/pdf.js/web/viewer.html?file=' + BASE_URL + r.file;
    html += '<a href="'+pdfUrl+'" class="resource-card" target="_blank"><div class="resource-icon">'+r.icon+'</div><h4>'+r.title+'</h4><p>'+r.desc+'</p><span class="download-badge">View PDF</span></a>';
  });
  html += '</div>';
  document.getElementById('resourcesBody').innerHTML = html;
}

function renderAssessment() {
  var week = weekData[currentWeek];
  var html = '<h2 style="font-size:1.1rem;margin-bottom:6px;">Week ' + currentWeek + ' Assessment</h2>';
  html += '<p style="color:#888;margin-bottom:16px;font-size:0.85rem;">'+week.assessment.length+' questions. You need 70% to pass. Available from Friday.</p>';
  week.assessment.forEach(function(q, qi) {
    html += '<div class="quiz-question"><h4>Q'+(qi+1)+': '+q.question+'</h4><div class="quiz-options">';
    q.options.forEach(function(opt, oi) {
      html += '<label class="quiz-option"><input type="radio" name="w'+currentWeek+'q'+qi+'" value="'+oi+'" onchange="saveAnswer('+currentWeek+','+qi+','+oi+')"> '+opt+'</label>';
    });
    html += '</div></div>';
  });
  html += '<a href="submit_ATO_'+currentWeek+'.html" onclick="localStorage.setItem(\'cl_submit_course\',\'ATO\');localStorage.setItem(\'cl_submit_week\',\''+currentWeek+'\');" class="submit-btn">Submit Assessment</a>';

  if (week.shortAnswers && week.shortAnswers.length) {
    html += '<h3 style="margin-top:26px;margin-bottom:6px;font-size:1rem;color:#4caf50;">&#9997; Short Answer Practice</h3>';
    html += '<p style="color:#888;margin-bottom:14px;font-size:0.8rem;">Exam-style questions, marked out of the total shown. These are for practice only and don\'t affect your pass/fail score — write your answer, then reveal the model answer to check yourself.</p>';
    week.shortAnswers.forEach(function(sa, si) {
      var id = 'sa_' + currentWeek + '_' + si;
      html += '<div class="sa-practice">' +
        '<h4>Q'+(si+1)+': '+sa.question+'</h4>' +
        '<div class="sa-marks">['+sa.marks+' marks]</div>' +
        '<textarea placeholder="Type your answer here..." id="'+id+'_input"></textarea>' +
        '<div><button class="sa-reveal-btn" onclick="revealModelAnswer(\''+id+'\')">Reveal Model Answer</button></div>' +
        '<div class="sa-model-answer" id="'+id+'_answer"><strong>Model Answer:</strong> '+sa.modelAnswer+'</div>' +
        '</div>';
    });
  }

  document.getElementById('assessmentContent').innerHTML = html;
}

function revealModelAnswer(id) {
  document.getElementById(id + '_answer').classList.add('shown');
}

function updateWeekContent() {
  updateVideoSection();
  buildDayTabs();
  renderDayContent();
  renderResources();
  renderAssessment();
}

function updateProgress() {
  const done = completedWeeks.size;
  const pct = Math.round(done / TOTAL_WEEKS * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '% complete';
  document.getElementById('weeksComplete').textContent = done + '/' + TOTAL_WEEKS;
  document.getElementById('videosWatched').textContent = (done*2) + '/' + (TOTAL_WEEKS*2);
  document.getElementById('assessmentsPassed').textContent = done + '/' + TOTAL_WEEKS;
}

// ── Lightbox: tap any illustration to zoom, with a scale+fade animation ──
function openLightbox(src, caption) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightboxCaption').textContent = caption || '';
  var overlay = document.getElementById('lightboxOverlay');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox(e) {
  if (e) e.stopPropagation();
  document.getElementById('lightboxOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeLightbox();
});
document.getElementById('lessonContent').addEventListener('click', function(e) {
  if (e.target.tagName === 'IMG' && e.target.closest('.illustration')) {
    var captionEl = e.target.closest('.illustration').querySelector('.caption');
    openLightbox(e.target.src, captionEl ? captionEl.textContent : '');
  }
});

window.onload = function() {
  const isLight = localStorage.getItem('cl_theme') === 'light';
  if (isLight) { document.getElementById('body').classList.add('light-mode'); document.getElementById('themeBtn').innerHTML = '&#9790; Dark'; }
  buildModuleSelector();
  updateProgress();
  selectModule(1);
};
</script>
