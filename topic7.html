<script>
const STORAGE_PREFIX = 'coachG9_NER_';
const TOTAL_WEEKS = 1;
const COURSE_NAME = 'The Nervous System';
const GOOGLE_SHEET_URL = 'https://script.google.com/macros/s/REPLACE_WITH_YOUR_SCRIPT_ID/exec';
const SECRET_KEY = 'CoachG9SecureKey';
const BASE_URL = 'https://dbeducator.github.io/natural-sciences-grade9/';

// ── One entry per week. Each week has 5 days (Mon-Thu teaching, Fri = assessment day). ──
const weekData = {
  1: {
    videos: { t: 'RNLceVI8jcc', tTitle: 'The Nervous System — Tutorial', b: '44B0ms3XPKU', bTitle: 'The Nervous System — Explained Simply' },
    days: [
      { label: 'Monday', content: `<h2>&#129504; Your Body's Control Centre</h2>
<div class="block block-objectives"><h3>&#127919; Learning Objectives</h3><ul>
<li>Explain the role of the nervous system in coordinating the body</li>
<li>Distinguish between the central and peripheral nervous systems</li>
<li>Name the main regions of the brain and their general functions</li>
</ul></div>
<div class="block block-intro"><h3>&#128214; Introduction</h3>
<p>Right now, your nervous system is doing thousands of things at once: keeping your heart beating, reading these words, and remembering what you had for breakfast. It's the body's communication and control network — constantly gathering information from the world (and from inside your own body), deciding what to do about it, and sending out instructions.</p>
<p>This week we'll look at how the nervous system is organised, what a single nerve cell looks like, and how your body can react to danger faster than you can consciously think.</p></div>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/Nervous_system_diagram-en.svg" alt="Diagram of the human nervous system showing the central and peripheral nervous systems" loading="lazy"/>
<div class="caption">The human nervous system — central nervous system (brain and spinal cord) and peripheral nervous system (nerves). Wikimedia Commons (CC BY-SA 4.0)</div>
</div>
<div class="block block-concept"><h3>&#128300; Key Concept: Central vs Peripheral</h3>
<ul>
<li><strong>Central Nervous System (CNS)</strong> — the brain and spinal cord; the body's decision-making centre</li>
<li><strong>Peripheral Nervous System (PNS)</strong> — every nerve outside the brain and spinal cord, carrying messages to and from the CNS</li>
</ul></div>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/Blausen_0101_Brain_LateralView.png" alt="Diagram of the human brain showing the cerebrum, cerebellum, and brain stem" loading="lazy"/>
<div class="caption">The human brain — Blausen Medical, Wikimedia Commons (CC BY 3.0)</div>
</div>
<div class="block block-concept"><h4>Main Regions of the Brain</h4>
<ul>
<li><strong>Cerebrum</strong> — the large, wrinkled outer region; responsible for conscious thought, memory, and voluntary movement</li>
<li><strong>Cerebellum</strong> — sits below the cerebrum; controls balance and coordination of movement</li>
<li><strong>Brain stem</strong> — connects the brain to the spinal cord; controls automatic functions like breathing and heart rate</li>
</ul></div>
<div class="block block-mnemonic"><h3>&#129504; Memory Trick</h3>
<p class="trick">C.P. &rarr; Central = brain + spinal Cord &middot; Peripheral = everything else (nerves)</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: Which part of the brain controls your balance while riding a bicycle?</summary>
<div class="answer">The cerebellum — it coordinates balance and smooth, precise movement.</div>
</details>` },

      { label: 'Tuesday', content: `<h2>&#9889; The Neuron: A Single Nerve Cell</h2>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/Anatomy_of_neuron.png" alt="Labelled diagram of a neuron showing dendrites, cell body, axon, and synapse" loading="lazy"/>
<div class="caption">The structure of a neuron. Wikimedia Commons (CC BY-SA 4.0)</div>
</div>
<div class="block block-concept"><h3>&#128300; Key Concept: Neuron Structure</h3>
<ul>
<li><strong>Dendrites</strong> — branch-like extensions that receive signals from other neurons</li>
<li><strong>Cell body (soma)</strong> — contains the nucleus; processes incoming signals</li>
<li><strong>Axon</strong> — a long fibre that carries the electrical signal away from the cell body, sometimes over a metre long</li>
<li><strong>Synapse</strong> — the tiny gap between one neuron's axon and the next neuron's dendrites, where the signal is passed on chemically</li>
</ul>
<p>A signal travels through a neuron electrically, then crosses each synapse chemically, then continues electrically through the next neuron — electrical, chemical, electrical, all the way along a nerve pathway.</p></div>
<div class="block block-analogy"><h3>&#127961; Analogy: A Neuron as a Tree</h3>
<p>Picture a neuron as a tree turned on its side. The dendrites are the branches, reaching out to catch signals. The cell body is the trunk, where everything is processed. The axon is a long root, carrying the signal away to the next tree in the forest — the next neuron.</p></div>
<div class="block block-dyk"><h3>&#11088; Did You Know?</h3>
<p>Some axons in the human body — like those running from your spinal cord down to your toes — can be over a metre long, even though the neuron's cell body is microscopic.</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: What is the name of the tiny gap between two neurons, and how does the signal cross it?</summary>
<div class="answer">The synapse. The electrical signal triggers the release of chemicals (neurotransmitters) that cross the gap and trigger a new electrical signal in the next neuron.</div>
</details>` },

      { label: 'Wednesday', content: `<h2>&#129470; The Reflex Arc</h2>
<div class="illustration">
<svg viewBox="0 0 340 260" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:340px;height:auto;background:#fff;border-radius:10px;padding:10px;">

<rect x="10" y="160" width="80" height="34" rx="8" fill="#4caf50" opacity="0.15" stroke="#4caf50" stroke-width="1.5"/>
<text x="50" y="177" text-anchor="middle" font-size="10" font-weight="700" fill="#1b5e20">Sensory</text>
<text x="50" y="189" text-anchor="middle" font-size="10" font-weight="700" fill="#1b5e20">neuron</text>

<text x="170" y="184" text-anchor="middle" font-size="9" font-weight="700" fill="#7a5c00">(relay neuron)</text>
<rect x="250" y="160" width="80" height="34" rx="8" fill="#4caf50" opacity="0.15" stroke="#4caf50" stroke-width="1.5"/>
<text x="290" y="177" text-anchor="middle" font-size="10" font-weight="700" fill="#1b5e20">Motor</text>
<text x="290" y="189" text-anchor="middle" font-size="10" font-weight="700" fill="#1b5e20">neuron</text>
<rect x="250" y="90" width="80" height="34" rx="8" fill="#4caf50" opacity="0.15" stroke="#4caf50" stroke-width="1.5"/>
<text x="290" y="111" text-anchor="middle" font-size="11" font-weight="700" fill="#1b5e20">Effector</text>
<rect x="250" y="20" width="80" height="34" rx="8" fill="#4caf50" opacity="0.15" stroke="#4caf50" stroke-width="1.5"/>
<text x="290" y="41" text-anchor="middle" font-size="11" font-weight="700" fill="#1b5e20">Response</text>
<path d="M45 54 L45 90" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
<path d="M45 124 L50 160" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
<path d="M90 177 L130 177" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
<path d="M210 177 L250 177" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
<path d="M290 160 L290 124" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
<path d="M290 90 L290 54" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

</svg>
<div class="caption">The reflex arc — a fast, automatic pathway that bypasses conscious thought in the brain.</div>
</div>
<div class="block block-concept"><h3>&#128300; Key Concept: Why Reflexes Are So Fast</h3>
<p>Touch something painfully hot and you pull your hand away before you even consciously register the pain. This is a <strong>reflex</strong> — an automatic, involuntary response. The signal follows the <strong>reflex arc</strong>:</p>
<p><strong>Stimulus</strong> (heat) &rarr; <strong>Receptor</strong> (skin) &rarr; <strong>Sensory neuron</strong> &rarr; <strong>Relay neuron in the spinal cord</strong> &rarr; <strong>Motor neuron</strong> &rarr; <strong>Effector</strong> (arm muscle) &rarr; <strong>Response</strong> (hand pulls away)</p>
<p>Crucially, the decision to react happens in the <strong>spinal cord</strong>, not the brain. The brain only becomes aware of what happened milliseconds later — after the muscle has already responded. This shortcut is what makes reflexes so much faster than a voluntary decision.</p></div>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/Mrs_Ples.jpg" alt="Mrs Ples, a 2.1-million-year-old Australopithecus africanus skull found at Sterkfontein, South Africa" loading="lazy"/>
<div class="caption">"Mrs Ples" — an Australopithecus africanus skull discovered at Sterkfontein, South Africa in 1947. José Braga / Archaeodontosaurus, Wikimedia Commons (CC BY-SA 4.0)</div>
</div>
<div class="block block-sa"><h3>&#127487; South African Connection</h3>
<p>South Africa's Sterkfontein Caves, part of the Cradle of Humankind World Heritage Site near Johannesburg, have produced some of the world's most important fossils for understanding brain evolution — including "Mrs Ples," a roughly 2.1-million-year-old Australopithecus africanus skull found in 1947. By studying the internal shape of skulls like this one, scientists can estimate brain size and structure in our ancient ancestors, tracing how the human nervous system gradually evolved the much larger, more complex brain we have today.</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: Why does a reflex happen faster than a voluntary decision?</summary>
<div class="answer">The decision is made in the spinal cord (relay neuron), not the brain — this shortcut skips the extra time it would take to send the signal all the way up to the brain, process it consciously, and send a decision back down.</div>
</details>` },

      { label: 'Thursday', content: `<h2>&#128200; Voluntary vs Involuntary & Practical Activity</h2>
<div class="block block-concept"><h3>&#128300; Two Kinds of Actions</h3>
<h4>Voluntary Actions</h4>
<p>Actions you consciously choose to do, controlled by the cerebrum — like picking up a pen, or deciding to stand up.</p>
<h4>Involuntary Actions</h4>
<p>Actions that happen automatically, without conscious thought. This includes both reflexes (like pulling your hand from something hot) and ongoing automatic processes controlled by the brain stem, like your heartbeat and breathing rate.</p></div>
<div class="block block-dyk"><h3>&#11088; Did You Know?</h3>
<p>A sneeze is a reflex, not a voluntary action — which is why you can almost never fully suppress one once it starts. Your nervous system has already committed to the response before you're consciously aware of it.</p></div>
<div class="block block-activity"><h3>&#128300; Practical Activity: Test Your Reaction Time</h3>
<div class="what-to-do"><strong>What to do:</strong> Work with a partner. Have them hold a ruler vertically, with the 0 cm mark at the bottom, between your open thumb and index finger, without touching it. Without warning, they drop the ruler — you catch it as fast as you can by closing your fingers. Record the measurement where you caught it (a lower number means a faster reaction time). Repeat 5 times and calculate your average. Then try again immediately after doing 20 jumping jacks, and compare your results. Write a short paragraph explaining whether reaction time changed, and why you think that happened.</div></div>
<details class="quick-check"><summary>&#10067; Quick Check: Is catching a dropped ruler purely a spinal reflex, or does it involve the brain?</summary>
<div class="answer">It involves the brain — unlike a true reflex (such as pulling away from heat), catching a falling ruler requires conscious visual processing and a deliberate decision to close your fingers, so it's a fast voluntary reaction rather than a spinal reflex.</div>
</details>` },

      { label: 'Friday', content: `<h2>&#128203; Summary & Key Vocabulary</h2>
<div class="block block-summary"><h3>&#128203; Week Summary</h3><ul>
<li>The nervous system is divided into the CNS (brain and spinal cord) and PNS (all other nerves).</li>
<li>The brain has three main regions: cerebrum (thought, voluntary movement), cerebellum (balance), and brain stem (automatic functions).</li>
<li>A neuron has dendrites, a cell body, and an axon; signals cross the synapse between neurons chemically.</li>
<li>A reflex arc (stimulus &rarr; receptor &rarr; sensory neuron &rarr; spinal cord &rarr; motor neuron &rarr; effector &rarr; response) is faster than a voluntary decision because the spinal cord reacts before the brain gets involved.</li>
</ul></div>
<div class="block block-mistakes"><h3>&#9888; Common Mistakes (from past exam reports)</h3>
<div class="mistake-item"><div class="wrong">&#10060; "All fast reactions are reflexes."</div><div class="right">&#10004; A true reflex bypasses the brain entirely (decision made in the spinal cord). Fast reactions like catching a ball still involve the brain processing what you see — they are quick voluntary responses, not reflexes.</div></div>
<div class="mistake-item"><div class="wrong">&#10060; "The brain reacts first during a reflex."</div><div class="right">&#10004; During a true reflex, the spinal cord makes the decision and the muscle responds BEFORE the brain becomes consciously aware of what happened.</div></div>
<div class="mistake-item"><div class="wrong">&#10060; "Nerve signals travel the same way the whole distance — either all electrical or all chemical."</div><div class="right">&#10004; Signals travel electrically along each neuron, then cross each synapse chemically, then continue electrically in the next neuron — it alternates.</div></div></div>
<div class="block block-vocab"><h3>&#128273; Key Vocabulary</h3>
<div class="vocab-term"><b>Neuron</b> — a nerve cell that transmits electrical and chemical signals</div>
<div class="vocab-term"><b>Synapse</b> — the tiny gap between two neurons where a signal is passed chemically</div>
<div class="vocab-term"><b>Reflex</b> — a fast, automatic, involuntary response to a stimulus</div>
<div class="vocab-term"><b>Reflex arc</b> — the pathway a reflex signal follows, from receptor to effector, via the spinal cord</div>
<div class="vocab-term"><b>Cerebrum</b> — the largest part of the brain; controls conscious thought and voluntary movement</div>
<div class="vocab-term"><b>Cerebellum</b> — the part of the brain that controls balance and coordination</div>
</div>
<details class="quick-check"><summary>&#10067; Final Check: Without looking back, can you list the 7 steps of a reflex arc in order?</summary>
<div class="answer">Stimulus &rarr; Receptor &rarr; Sensory neuron &rarr; Spinal cord (relay neuron) &rarr; Motor neuron &rarr; Effector &rarr; Response. If you got all seven in order, you're ready for the quiz!</div>
</details>
<p style="margin-top:16px;color:#4caf50;font-weight:600;">&#9989; Ready? Head to the <strong>Assessment</strong> tab above to complete this week's quiz. You need 70% to pass and unlock next week.</p>` }

let currentWeek = 1;
let currentDay = 0;
let completedWeeks = new Set(JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'completedWeeks') || '[]'));

Object.keys(weekData).forEach(function(w) {
  localStorage.setItem(STORAGE_PREFIX + 'correct_' + w, JSON.stringify(weekData[w].assessment.map(function(q){ return q.correct; })));
});

function toggleTheme() {
  const isLight = document.getElementById('body').classList.toggle('light-mode');
  localStorage.setItem('cl_theme', isLight ? 'light' : 'dark');
  document.getElementById('themeBtn').innerHTML = isLight ? '&#9790; Dark' : '&#9728; Light';
}

function saveAnswer(week, q, val) {
  var k = STORAGE_PREFIX + 'answers_' + week;
  var saved = JSON.parse(localStorage.getItem(k) || '{}');
  saved['q' + q] = val;
  localStorage.setItem(k, JSON.stringify(saved));
}

function buildModuleSelector() {
  var el = document.getElementById('moduleSelector');
  el.innerHTML = '';
  for (var w = 1; w <= TOTAL_WEEKS; w++) {
    var btn = document.createElement('button');
    btn.className = 'module-btn' + (completedWeeks.has(w) ? ' completed' : '');
    btn.textContent = 'Week ' + w + (completedWeeks.has(w) ? ' \u2713' : '');
    btn.onclick = (function(week){ return function(){ selectModule(week); }; })(w);
    el.appendChild(btn);
  }
  refreshModuleButtons();
}
function refreshModuleButtons() {
  document.querySelectorAll('.module-btn').forEach(function(btn, i) { btn.classList.toggle('active', i + 1 === currentWeek); });
}

function selectModule(week) { currentWeek = week; currentDay = 0; refreshModuleButtons(); updateWeekContent(); }

function buildDayTabs() {
  var week = weekData[currentWeek];
  var el = document.getElementById('dayTabs');
  el.innerHTML = '';
  week.days.forEach(function(day, i) {
    var btn = document.createElement('button');
    btn.className = 'day-btn' + (day.label === 'Friday' ? ' friday' : '') + (i === currentDay ? ' active' : '');
    btn.textContent = day.label;
    btn.onclick = function(){ currentDay = i; buildDayTabs(); renderDayContent(); };
    el.appendChild(btn);
  });
}
function renderDayContent() {
  var day = weekData[currentWeek].days[currentDay];
  document.getElementById('lessonContent').innerHTML =
    '<div class="day-label">&#128197; ' + day.label + ' &middot; Week ' + currentWeek + '</div>' + day.content;
}

function showTab(tabName, tabBtn) {
  document.querySelectorAll('.content-section').forEach(function(s){ s.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.getElementById(tabName).classList.add('active');
  if (tabBtn) tabBtn.classList.add('active');
}

function updateVideoSection() {
  const v = weekData[currentWeek].videos;
  const CS = '<div style="position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#1a1a2e,#16213e);display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;"><div style="font-size:2.2rem;">&#127916;</div><p style="color:#fff;font-weight:700;margin-top:8px;font-size:0.85rem;">Video Coming Soon</p></div>';
  const iframe = function(id) {
    return '<iframe src="https://www.youtube.com/embed/'+id+'?rel=0&modestbranding=1&iv_load_policy=3" frameborder="0" allowfullscreen style="position:absolute;top:0;left:0;width:100%;height:100%;border-radius:10px;"></iframe>';
  };
  document.getElementById('tutorialVideo').innerHTML = (v.t && v.t !== 'PLACEHOLDER') ? iframe(v.t) : CS;
  document.getElementById('basicVideo').innerHTML = (v.b && v.b !== 'PLACEHOLDER') ? iframe(v.b) : CS;
  document.getElementById('tutorialTitle').textContent = v.tTitle;
  document.getElementById('basicTitle').textContent = v.bTitle;
  document.getElementById('weekTitle').textContent = 'Videos \u2014 Week ' + currentWeek;
}

function renderResources() {
  var week = weekData[currentWeek];
  document.getElementById('resourcesTitle').textContent = 'Resources \u2014 Week ' + currentWeek;
  var html = '<div class="resources-grid">';
  week.resources.forEach(function(r) {
    var pdfUrl = 'https://mozilla.github.io/pdf.js/web/viewer.html?file=' + BASE_URL + r.file;
    html += '<a href="'+pdfUrl+'" class="resource-card" target="_blank"><div class="resource-icon">'+r.icon+'</div><h4>'+r.title+'</h4><p>'+r.desc+'</p><span class="download-badge">View PDF</span></a>';
  });
  html += '</div>';
  document.getElementById('resourcesBody').innerHTML = html;
}

function renderAssessment() {
  var week = weekData[currentWeek];
  var html = '<h2 style="font-size:1.1rem;margin-bottom:6px;">Week ' + currentWeek + ' Assessment</h2>';
  html += '<p style="color:#888;margin-bottom:16px;font-size:0.85rem;">'+week.assessment.length+' questions. You need 70% to pass. Available from Friday.</p>';
  week.assessment.forEach(function(q, qi) {
    html += '<div class="quiz-question"><h4>Q'+(qi+1)+': '+q.question+'</h4><div class="quiz-options">';
    q.options.forEach(function(opt, oi) {
      html += '<label class="quiz-option"><input type="radio" name="w'+currentWeek+'q'+qi+'" value="'+oi+'" onchange="saveAnswer('+currentWeek+','+qi+','+oi+')"> '+opt+'</label>';
    });
    html += '</div></div>';
  });
  html += '<a href="submit_NER_'+currentWeek+'.html" onclick="localStorage.setItem(\'cl_submit_course\',\'NER\');localStorage.setItem(\'cl_submit_week\',\''+currentWeek+'\');" class="submit-btn">Submit Assessment</a>';

  if (week.shortAnswers && week.shortAnswers.length) {
    html += '<h3 style="margin-top:26px;margin-bottom:6px;font-size:1rem;color:#4caf50;">&#9997; Short Answer Practice</h3>';
    html += '<p style="color:#888;margin-bottom:14px;font-size:0.8rem;">Exam-style questions, marked out of the total shown. These are for practice only and don\'t affect your pass/fail score — write your answer, then reveal the model answer to check yourself.</p>';
    week.shortAnswers.forEach(function(sa, si) {
      var id = 'sa_' + currentWeek + '_' + si;
      html += '<div class="sa-practice">' +
        '<h4>Q'+(si+1)+': '+sa.question+'</h4>' +
        '<div class="sa-marks">['+sa.marks+' marks]</div>' +
        '<textarea placeholder="Type your answer here..." id="'+id+'_input"></textarea>' +
        '<div><button class="sa-reveal-btn" onclick="revealModelAnswer(\''+id+'\')">Reveal Model Answer</button></div>' +
        '<div class="sa-model-answer" id="'+id+'_answer"><strong>Model Answer:</strong> '+sa.modelAnswer+'</div>' +
        '</div>';
    });
  }

  document.getElementById('assessmentContent').innerHTML = html;
}

function revealModelAnswer(id) {
  document.getElementById(id + '_answer').classList.add('shown');
}

function updateWeekContent() {
  updateVideoSection();
  buildDayTabs();
  renderDayContent();
  renderResources();
  renderAssessment();
}

function updateProgress() {
  const done = completedWeeks.size;
  const pct = Math.round(done / TOTAL_WEEKS * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '% complete';
  document.getElementById('weeksComplete').textContent = done + '/' + TOTAL_WEEKS;
  document.getElementById('videosWatched').textContent = (done*2) + '/' + (TOTAL_WEEKS*2);
  document.getElementById('assessmentsPassed').textContent = done + '/' + TOTAL_WEEKS;
}

// ── Lightbox: tap any illustration to zoom, with a scale+fade animation ──

  document.getElementById('lightboxImg').src = src;

    var captionEl = e.target.closest('.illustration').querySelector('.caption');
    openLightbox(e.target.src, captionEl ? captionEl.textContent : '');
  }
});

  const isLight = localStorage.getItem('cl_theme') === 'light';
  if (isLight) { document.getElementById('body').classList.add('light-mode'); document.getElementById('themeBtn').innerHTML = '&#9790; Dark'; }
  buildModuleSelector();
  updateProgress();
  selectModule(1);
};
