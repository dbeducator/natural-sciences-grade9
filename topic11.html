const TOTAL_WEEKS = 2;
const COURSE_NAME = 'The Periodic Table';

// ── One entry per week. Each week has 5 days (Mon-Thu teaching, Fri = assessment day). ──
const weekData = {
  1: {
    videos: { t: 'wXRHz5ZEIK0', tTitle: 'The Periodic Table — Tutorial', b: 'okolv1y6IlE', bTitle: 'The Periodic Table — Explained Simply' },
    days: [
      { label: 'Monday', content: `<h2>&#128203; Chemistry's Master Map</h2>
<div class="block block-objectives"><h3>&#127919; Learning Objectives</h3><ul>
<li>Explain how the periodic table is organised</li>
<li>Define "period" and "group"</li>
<li>Explain why the table is arranged in order of atomic number</li>
</ul></div>
<div class="block block-intro"><h3>&#128214; Introduction</h3>
<p>In 1869, Russian chemist Dmitri Mendeleev arranged all the known elements into a table based on their properties and atomic masses — and famously left gaps for elements not yet discovered, correctly predicting their properties in advance. Today's periodic table, refined since then, is one of the most useful tools in all of science: a single chart that lets you predict how an element will behave just from its position.</p></div>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/Periodic_table_large.svg" alt="The periodic table of elements, arranged in periods and groups" loading="lazy"/>
<div class="caption">The periodic table of elements. Wikimedia Commons (CC BY 3.0)</div>
<div class="block block-vocab" style="text-align:left;margin-top:10px;"><h3 style="margin-bottom:8px;">&#128204; Element Symbol Key</h3>
<p style="font-size:0.8rem;color:#999;margin-bottom:8px;">Every box on the table is a one- or two-letter abbreviation for an element's name — usually from its English or Latin name. Here are the ones you'll meet most often this term:</p>
<p style="font-size:0.82rem;line-height:1.9;">
<b>H</b> Hydrogen &middot; <b>He</b> Helium &middot; <b>Li</b> Lithium &middot; <b>Be</b> Beryllium &middot; <b>B</b> Boron &middot; <b>C</b> Carbon &middot; <b>N</b> Nitrogen &middot; <b>O</b> Oxygen &middot; <b>F</b> Fluorine &middot; <b>Ne</b> Neon &middot; <b>Na</b> Sodium &middot; <b>Mg</b> Magnesium &middot; <b>Al</b> Aluminium &middot; <b>Si</b> Silicon &middot; <b>P</b> Phosphorus &middot; <b>S</b> Sulfur &middot; <b>Cl</b> Chlorine &middot; <b>Ar</b> Argon &middot; <b>K</b> Potassium &middot; <b>Ca</b> Calcium &middot; <b>Fe</b> Iron &middot; <b>Cu</b> Copper &middot; <b>Zn</b> Zinc &middot; <b>Ag</b> Silver &middot; <b>Pt</b> Platinum &middot; <b>Au</b> Gold &middot; <b>Cr</b> Chromium &middot; <b>I</b> Iodine
</p>
<p style="font-size:0.75rem;color:#999;margin-top:8px;">Some symbols come from Latin names, not English — that's why potassium is <b>K</b> (from <em>kalium</em>), sodium is <b>Na</b> (from <em>natrium</em>), iron is <b>Fe</b> (from <em>ferrum</em>), copper is <b>Cu</b> (from <em>cuprum</em>), silver is <b>Ag</b> (from <em>argentum</em>), and gold is <b>Au</b> (from <em>aurum</em>).</p></div>
</div>
<div class="block block-concept"><h3>&#128300; Key Concept: Periods & Groups</h3>
<ul>
<li><strong>Periods</strong> — the horizontal ROWS. Moving across a period, atomic number increases by one each step, and a new electron shell starts filling at the beginning of each new period.</li>
<li><strong>Groups</strong> — the vertical COLUMNS. Elements in the same group have the same number of electrons in their outer shell, which is why they share similar chemical properties.</li>
</ul>
<p>The table is arranged in order of increasing atomic number, left to right, top to bottom.</p></div>
<div class="block block-mnemonic"><h3>&#129504; Memory Trick</h3>
<p class="trick">PERiods go acrosss (like a paragraph) &middot; GROUPs go down (like a group standing in a line)</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: Two elements are in the same group. What do they have in common?</summary>
<div class="answer">They have the same number of electrons in their outer shell, which gives them similar chemical properties.</div>
</details>` },

      { label: 'Tuesday', content: `<h2>&#9877;&#65039; Metals, Non-Metals & Metalloids</h2>
<div class="block block-concept"><h3>&#128300; Key Concept: Three Broad Categories</h3>
<h4>Metals (most of the table, left and centre)</h4>
<ul><li>Shiny, good conductors of heat and electricity, malleable (can be hammered into shape), tend to lose electrons when bonding</li></ul>
<h4>Non-metals (upper right)</h4>
<ul><li>Dull, poor conductors, brittle if solid, tend to gain (or share) electrons when bonding</li></ul>
<h4>Metalloids (along the "staircase" border between metals and non-metals)</h4>
<ul><li>Properties in between — e.g. silicon and germanium conduct electricity only under certain conditions, which is exactly why they're used as semiconductors in electronics</li></ul></div>
<div class="block block-dyk"><h3>&#11088; Did You Know?</h3>
<p>Roughly 80% of all elements on the periodic table are metals — non-metals and metalloids only make up a small region in the upper right corner.</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: Silicon is used in computer chips as a "semiconductor." What category of element does that suggest it is?</summary>
<div class="answer">A metalloid — its ability to conduct electricity only under certain conditions is the defining, in-between property of metalloids, distinct from metals (always good conductors) and non-metals (poor conductors).</div>
</details>` },

      { label: 'Wednesday', content: `<h2>&#9878;&#65039; Groups & Real-World Elements</h2>
<div class="block block-concept"><h3>&#128300; Key Concept: Named Groups</h3>
<ul>
<li><strong>Group 1 (alkali metals)</strong> — very reactive metals, e.g. sodium, potassium</li>
<li><strong>Group 17 (halogens)</strong> — very reactive non-metals, e.g. chlorine, fluorine</li>
<li><strong>Group 18 (noble gases)</strong> — extremely unreactive gases, already have a full outer shell, e.g. helium, neon</li>
<li><strong>Transition metals</strong> — the large central block, including iron, copper, platinum, and gold</li>
</ul></div>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/Chromitite%20Bushveld%20South%20Africa.jpg" alt="Chromitite rock sample from the Bushveld Complex, South Africa" loading="lazy"/>
<div class="caption">Chromitite ore from South Africa's Bushveld Complex — rich in the transition metal chromium. Wikimedia Commons</div>
</div>
<div class="block block-sa"><h3>&#127487; South African Connection</h3>
<p>The Bushveld Complex, stretching across Limpopo, Mpumalanga and North West provinces, holds the world's largest known reserves of platinum-group metals — platinum, palladium, rhodium, and others — all transition metals from the central block of the periodic table. It also produces most of the world's chromium. These elements share the periodic table's central "transition metal" region because they have similar electron arrangements, which is exactly why they tend to occur together in the same ore deposits, and why South Africa is uniquely rich in several of them at once.</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: Why might platinum, palladium and rhodium often be found together in the same rock formations?</summary>
<div class="answer">They're all transition metals from the same region of the periodic table, sharing similar electron arrangements and chemical behaviour — properties that tend to make elements form and concentrate together during the same geological processes.</div>
</details>` },

      { label: 'Thursday', content: `<h2>&#128300; Practical Activity</h2>
<div class="block block-dyk"><h3>&#11088; Did You Know?</h3>
<p>Mendeleev's original 1869 table left deliberate gaps for undiscovered elements, and predicted their approximate properties based on the pattern around the gap. When gallium and germanium were discovered years later, their real properties matched his predictions astonishingly closely.</p></div>
<div class="block block-activity"><h3>&#128300; Practical Activity: Element Hunt</h3>
<div class="what-to-do"><strong>What to do:</strong> Using a periodic table (printed, in your textbook, or online), find 5 elements you encounter in everyday life (e.g. in your phone, food, or household items) and record for each: its symbol, atomic number, group, period, and whether it's a metal, non-metal, or metalloid. For a challenge, try to explain why each element's group might relate to why it's used the way it is (e.g. why is aluminium used for foil, or why is helium used in balloons?).</div></div>
<details class="quick-check"><summary>&#10067; Quick Check: Helium is famously unreactive, which is exactly why it's safe to put in party balloons. Which group is it in?</summary>
<div class="answer">Group 18, the noble gases — elements in this group already have a full outer electron shell, making them extremely unreactive.</div>
</details>` },

      { label: 'Monday', content: `<h2>&#128202; Valency & the Periodic Table</h2>
<div class="block block-objectives"><h3>&#127919; Learning Objectives</h3><ul>
<li>Define valency</li>
<li>Relate valency to group number</li>
<li>Use valency to predict simple compound formulas</li>
</ul></div>
<div class="block block-concept"><h3>&#128300; Key Concept: Valency</h3>
<p><strong>Valency</strong> is a number that represents how many bonds an atom of an element typically forms — essentially, how many electrons it needs to gain, lose, or share to reach a stable outer shell.</p>
<table style="width:100%;font-size:0.85rem;border-collapse:collapse;margin-top:8px;">
<tr><th style="text-align:left;padding:5px;color:#4caf50;">Group</th><th style="text-align:left;padding:5px;color:#4caf50;">Typical Valency</th><th style="text-align:left;padding:5px;color:#4caf50;">Example</th></tr>
<tr><td style="padding:5px;">Group 1</td><td style="padding:5px;">1</td><td style="padding:5px;">Na loses 1 electron &rarr; Na&#8314;</td></tr>
<tr><td style="padding:5px;">Group 2</td><td style="padding:5px;">2</td><td style="padding:5px;">Mg loses 2 electrons &rarr; Mg&#178;&#8314;</td></tr>
<tr><td style="padding:5px;">Group 16</td><td style="padding:5px;">2</td><td style="padding:5px;">O gains 2 electrons &rarr; O&#178;&#8315;</td></tr>
<tr><td style="padding:5px;">Group 17</td><td style="padding:5px;">1</td><td style="padding:5px;">Cl gains 1 electron &rarr; Cl&#8315;</td></tr>
</table></div>
<div class="block block-mnemonic"><h3>&#129504; Memory Trick</h3>
<p class="trick">For groups 1-2: valency = group number &middot; For groups 13-17: valency = 18 &minus; group number</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: What is the typical valency of an element in Group 2?</summary>
<div class="answer">2 — Group 2 elements typically lose 2 electrons to form a 2+ ion, since valency equals group number for groups 1 and 2.</div>
</details>` },

      { label: 'Tuesday', content: `<h2>&#128200; Predicting Compound Formulas</h2>
<div class="block block-concept"><h3>&#128300; Key Concept: Balancing Valencies</h3>
<p>When two elements combine, the total "bonding power" (valency) on each side must balance out. A simple way to predict a formula: swap the valency numbers to become the subscripts.</p>
<h4>Example: Sodium (valency 1) + Oxygen (valency 2)</h4>
<p>Swap the numbers: Na&#8322;O (2 sodium atoms for every 1 oxygen atom) — and this is indeed the correct formula for sodium oxide.</p>
<h4>Example: Magnesium (valency 2) + Chlorine (valency 1)</h4>
<p>Swap the numbers: MgCl&#8322; (1 magnesium atom for every 2 chlorine atoms) — the correct formula for magnesium chloride.</p></div>
<div class="block block-dyk"><h3>&#11088; Did You Know?</h3>
<p>This "swap the valency" trick works because it's really just balancing total charge — Group 1 elements need 1 electron's worth of "help," while Group 16 elements need 2, so it takes two Group 1 atoms to fully balance one Group 16 atom.</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: Predict the formula for a compound of potassium (valency 1) and sulfur (valency 2).</summary>
<div class="answer">K&#8322;S — swapping the valencies gives 2 potassium atoms for every 1 sulfur atom.</div>
</details>` },

      { label: 'Wednesday', content: `<h2>&#128200; Reactivity Trends</h2>
<div class="block block-concept"><h3>&#128300; Key Concept: Patterns Across the Table</h3>
<h4>Down a Group</h4>
<p>For metals (like Group 1), reactivity generally INCREASES going down the group — outer electrons are further from the nucleus and more easily lost. For non-metals (like Group 17), reactivity generally DECREASES going down — it becomes harder to attract an extra electron from further away.</p>
<h4>Across a Period</h4>
<p>Elements generally become less metallic and more non-metallic moving left to right across a period, matching the shift from metals to non-metals to noble gases.</p></div>
<div class="block block-dyk"><h3>&#11088; Did You Know?</h3>
<p>Francium (bottom of Group 1) is so reactive it's rarely studied directly in a school lab, while lithium (top of Group 1) is mild enough to be used safely in classroom demonstrations — a direct real-world illustration of the "reactivity increases down the group" trend for metals.</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: Would you expect fluorine (top of Group 17) or iodine (further down Group 17) to be more reactive?</summary>
<div class="answer">Fluorine. For non-metals like the halogens (Group 17), reactivity DECREASES going down the group, so the element nearer the top is more reactive.</div>
</details>` },

      { label: 'Thursday', content: `<h2>&#128300; Practical Activity</h2>
<div class="block block-dyk"><h3>&#11088; Did You Know?</h3>
<p>Newlands, an English chemist working before Mendeleev, noticed that every 8th element seemed to share similar properties, and jokingly called it the "Law of Octaves" after musical scales — an idea mocked at the time, but strikingly close to how modern periods actually work.</p></div>
<div class="block block-activity"><h3>&#128300; Practical Activity: Predict the Formula</h3>
<div class="what-to-do"><strong>What to do:</strong> Using the valency rules from this week, predict the chemical formula for compounds formed between: calcium (Group 2) and chlorine (Group 17), aluminium (Group 13) and oxygen (Group 16), potassium (Group 1) and oxygen (Group 16). Show your working for each by writing out both elements' valencies before swapping them.</div></div>
<details class="quick-check"><summary>&#10067; Quick Check: What compound formula would you predict for calcium (valency 2) and chlorine (valency 1)?</summary>
<div class="answer">CaCl&#8322; — swapping the valencies gives 1 calcium atom for every 2 chlorine atoms.</div>
</details>` },

      { label: 'Friday', content: `<h2>&#128203; Summary & Key Vocabulary</h2>

  document.getElementById('tutorialVideo').innerHTML = (v.t && v.t !== 'PLACEHOLDER') ? iframe(v.t) : CS;
  document.getElementById('basicVideo').innerHTML = (v.b && v.b !== 'PLACEHOLDER') ? iframe(v.b) : CS;
  document.getElementById('tutorialTitle').textContent = v.tTitle;
  document.getElementById('basicTitle').textContent = v.bTitle;
  document.getElementById('weekTitle').textContent = 'Videos \u2014 Week ' + currentWeek;
}

function renderResources() {
  var week = weekData[currentWeek];
  document.getElementById('resourcesTitle').textContent = 'Resources \u2014 Week ' + currentWeek;
  var html = '<div class="resources-grid">';
  week.resources.forEach(function(r) {
    var pdfUrl = 'https://mozilla.github.io/pdf.js/web/viewer.html?file=' + BASE_URL + r.file;
    html += '<a href="'+pdfUrl+'" class="resource-card" target="_blank"><div class="resource-icon">'+r.icon+'</div><h4>'+r.title+'</h4><p>'+r.desc+'</p><span class="download-badge">View PDF</span></a>';
  });
  html += '</div>';
  document.getElementById('resourcesBody').innerHTML = html;
}

function renderAssessment() {
  var week = weekData[currentWeek];
  var html = '<h2 style="font-size:1.1rem;margin-bottom:6px;">Week ' + currentWeek + ' Assessment</h2>';
  html += '<p style="color:#888;margin-bottom:16px;font-size:0.85rem;">'+week.assessment.length+' questions. You need 70% to pass. Available from Friday.</p>';
  week.assessment.forEach(function(q, qi) {
    html += '<div class="quiz-question"><h4>Q'+(qi+1)+': '+q.question+'</h4><div class="quiz-options">';
    q.options.forEach(function(opt, oi) {
      html += '<label class="quiz-option"><input type="radio" name="w'+currentWeek+'q'+qi+'" value="'+oi+'" onchange="saveAnswer('+currentWeek+','+qi+','+oi+')"> '+opt+'</label>';
    });
    html += '</div></div>';
  });
  html += '<a href="submit_PER_'+currentWeek+'.html" onclick="localStorage.setItem(\'cl_submit_course\',\'PER\');localStorage.setItem(\'cl_submit_week\',\''+currentWeek+'\');" class="submit-btn">Submit Assessment</a>';

  if (week.shortAnswers && week.shortAnswers.length) {
    html += '<h3 style="margin-top:26px;margin-bottom:6px;font-size:1rem;color:#4caf50;">&#9997; Short Answer Practice</h3>';
    html += '<p style="color:#888;margin-bottom:14px;font-size:0.8rem;">Exam-style questions, marked out of the total shown. These are for practice only and don\'t affect your pass/fail score — write your answer, then reveal the model answer to check yourself.</p>';
    week.shortAnswers.forEach(function(sa, si) {
      var id = 'sa_' + currentWeek + '_' + si;
      html += '<div class="sa-practice">' +
        '<h4>Q'+(si+1)+': '+sa.question+'</h4>' +
        '<div class="sa-marks">['+sa.marks+' marks]</div>' +
        '<textarea placeholder="Type your answer here..." id="'+id+'_input"></textarea>' +
        '<div><button class="sa-reveal-btn" onclick="revealModelAnswer(\''+id+'\')">Reveal Model Answer</button></div>' +
        '<div class="sa-model-answer" id="'+id+'_answer"><strong>Model Answer:</strong> '+sa.modelAnswer+'</div>' +
        '</div>';
    });
  }

  document.getElementById('assessmentContent').innerHTML = html;
}

function revealModelAnswer(id) {
  document.getElementById(id + '_answer').classList.add('shown');
}

function updateWeekContent() {
  updateVideoSection();
  buildDayTabs();
  renderDayContent();
  renderResources();
  renderAssessment();
}

function updateProgress() {
  const done = completedWeeks.size;
  const pct = Math.round(done / TOTAL_WEEKS * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '% complete';
  document.getElementById('weeksComplete').textContent = done + '/' + TOTAL_WEEKS;
  document.getElementById('videosWatched').textContent = (done*2) + '/' + (TOTAL_WEEKS*2);
  document.getElementById('assessmentsPassed').textContent = done + '/' + TOTAL_WEEKS;
}

// ── Lightbox: tap any illustration to zoom, with a scale+fade animation ──
function openLightbox(src, caption) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightboxCaption').textContent = caption || '';
  var overlay = document.getElementById('lightboxOverlay');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox(e) {
  if (e) e.stopPropagation();
  document.getElementById('lightboxOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeLightbox();
});
document.getElementById('lessonContent').addEventListener('click', function(e) {
  if (e.target.tagName === 'IMG' && e.target.closest('.illustration')) {
    var captionEl = e.target.closest('.illustration').querySelector('.caption');
    openLightbox(e.target.src, captionEl ? captionEl.textContent : '');
  }
});

window.onload = function() {
  const isLight = localStorage.getItem('cl_theme') === 'light';
  if (isLight) { document.getElementById('body').classList.add('light-mode'); document.getElementById('themeBtn').innerHTML = '&#9790; Dark'; }
  buildModuleSelector();
  updateProgress();
  selectModule(1);
};
</script>
</body>
</html>
