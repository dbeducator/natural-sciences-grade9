<script>
const STORAGE_PREFIX = 'coachG9_MSK_';
const TOTAL_WEEKS = 1;
const COURSE_NAME = 'The Musculo-Skeletal System';
const GOOGLE_SHEET_URL = 'https://script.google.com/macros/s/REPLACE_WITH_YOUR_SCRIPT_ID/exec';
const SECRET_KEY = 'CoachG9SecureKey';
const BASE_URL = 'https://dbeducator.github.io/natural-sciences-grade9/';

// ── One entry per week. Each week has 5 days (Mon-Thu teaching, Fri = assessment day). ──
const weekData = {
  1: {
    videos: { t: 'm26gr04HIVE', tTitle: 'The Musculo-Skeletal System — Tutorial', b: 'f-FF7Qigd3U', bTitle: 'Bones, Joints & Muscles — Explained Simply' },
    days: [
      { label: 'Monday', content: `<h2>&#129440; Your Body's Frame</h2>
<div class="block block-objectives"><h3>&#127919; Learning Objectives</h3><ul>
<li>Explain the main functions of the human skeleton</li>
<li>Name the main types of bones by shape</li>
<li>Understand why bones alone cannot move the body</li>
</ul></div>
<div class="block block-intro"><h3>&#128214; Introduction</h3>
<p>Without a skeleton, your body would be a shapeless bag of organs and skin — unable to stand, walk, or protect anything inside it. The musculo-skeletal system is really two systems working as one: bones that form a rigid, protective framework, and muscles that pull on that framework to create movement.</p>
<p>This week we'll explore what your skeleton actually does for you, how joints allow different types of movement, and why muscles always have to work in pairs.</p></div>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/Human_skeleton_front_en.svg" alt="Labelled diagram of the human skeleton" loading="lazy"/>
<div class="caption">The human skeleton — Mariana Ruiz (LadyofHats), Wikimedia Commons (public domain)</div>
</div>
<div class="block block-concept"><h3>&#128300; Key Concept: Functions of the Skeleton</h3>
<ul>
<li><strong>Support</strong> — gives the body its shape and holds it upright</li>
<li><strong>Protection</strong> — the skull protects the brain, the ribcage protects the heart and lungs</li>
<li><strong>Movement</strong> — bones act as levers that muscles pull on</li>
<li><strong>Blood cell production</strong> — soft bone marrow inside certain bones produces red and white blood cells</li>
<li><strong>Mineral storage</strong> — bones store calcium and phosphorus, releasing them into the blood when needed</li>
</ul></div>
<div class="block block-mnemonic"><h3>&#129504; Memory Trick</h3>
<p class="trick">S.P.M.B. &rarr; Support, Protection, Movement, Blood cell production (and mineral storage)</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: Which bones protect your brain and your heart?</summary>
<div class="answer">The skull protects the brain; the ribcage (ribs and sternum) protects the heart and lungs.</div>
</details>` },

      { label: 'Tuesday', content: `<h2>&#129440; Joints — Where Bones Meet</h2>
<div class="block block-concept"><h3>&#128300; Types of Joints</h3>
<p>A joint is any point where two bones meet. Different joint shapes allow different types of movement:</p>
<ul>
<li><strong>Ball-and-socket</strong> (shoulder, hip) — allows movement in almost every direction, including rotation</li>
<li><strong>Hinge</strong> (elbow, knee) — allows movement in one direction only, like a door hinge</li>
<li><strong>Pivot</strong> (top of the neck) — allows rotation around a single axis, like turning your head</li>
<li><strong>Gliding</strong> (wrist, ankle) — allows small sliding movements between flat bone surfaces</li>
</ul>
<p>At most joints, the bone ends are covered in smooth <strong>cartilage</strong>, which cushions the joint and reduces friction between the bones as they move.</p></div>
<div class="block block-analogy"><h3>&#127961; Analogy: Door Hardware</h3>
<p>Think of your joints like different types of door hardware. A hinge joint (elbow) is like a normal door hinge — it swings one way. A ball-and-socket joint (shoulder) is like one of those adjustable desk-lamp joints that can swivel in almost any direction. A pivot joint (neck) is like a rotating bar stool — it spins around one central point.</p></div>
<div class="block block-dyk"><h3>&#11088; Did You Know?</h3>
<p>Cartilage has no blood supply of its own — it gets its nutrients by diffusion from surrounding fluid, which is one reason cartilage injuries in joints like the knee tend to heal very slowly.</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: Why is the elbow described as a hinge joint but the shoulder as a ball-and-socket joint?</summary>
<div class="answer">The elbow only allows movement in one plane (like bending a door on its hinge), while the shoulder's ball-shaped bone end sits inside a rounded socket, allowing movement in almost any direction, including rotation.</div>
</details>` },

      { label: 'Wednesday', content: `<h2>&#128170; Muscles Work in Pairs</h2>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/Animation_triceps_biceps.gif" alt="Animation showing the biceps and triceps working as an antagonistic pair" loading="lazy"/>
<div class="caption">The biceps and triceps working as an antagonistic pair. Wikimedia Commons (CC BY-SA 4.0)</div>
</div>
<div class="block block-concept"><h3>&#128300; Key Concept: Antagonistic Muscle Pairs</h3>
<p>Muscle tissue has one special property: it can only <strong>contract</strong> (shorten and pull) — it can never push. This means a single muscle can only move a joint in one direction. To move a joint back the other way, a second muscle on the opposite side has to contract instead.</p>
<p>The classic example is your upper arm:</p>
<ul>
<li>The <strong>biceps</strong> contracts to bend (flex) your elbow, pulling the forearm up</li>
<li>The <strong>triceps</strong> contracts to straighten (extend) your elbow, pulling the forearm back down</li>
</ul>
<p>While one of the pair contracts, the other relaxes. Muscle pairs that work this way — opposing each other — are called <strong>antagonistic pairs</strong>.</p></div>
<div class="block block-sa"><h3>&#127487; South African Connection</h3>
<p>South African Paralympian Ntando Mahlangu, born with a condition affecting both lower legs, competes using carbon-fibre running "blades" fitted after a double amputation in 2012. He won two gold medals at the Tokyo 2020 Paralympics in the T61 200m and T63 long jump. His blades are engineered to mimic the spring-like action of tendons storing and releasing energy with each stride — the same lever-and-pull system your own bones, joints, and antagonistic muscle pairs use every time you take a step.</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: Why can't the biceps also straighten the arm after it has bent it?</summary>
<div class="answer">Muscles can only contract (pull), never push. Once the biceps has contracted to bend the arm, it can only relax — it cannot actively push the arm straight again. A separate muscle, the triceps, must contract to straighten the arm.</div>
</details>` },

      { label: 'Thursday', content: `<h2>&#128279; Ligaments, Tendons & Practical Activity</h2>
<div class="block block-concept"><h3>&#128300; Two Easily Confused Connective Tissues</h3>
<h4>Tendons</h4>
<p>Tough, fibrous cords that connect <strong>muscle to bone</strong>. When a muscle contracts, it pulls on a tendon, which pulls on the bone, creating movement.</p>
<h4>Ligaments</h4>
<p>Tough, fibrous bands that connect <strong>bone to bone</strong> at a joint, holding the joint together and limiting how far it can move (stopping it from dislocating too easily).</p></div>
<div class="block block-mnemonic"><h3>&#129504; Memory Trick</h3>
<p class="trick">Tendons = Tie muscle to bone &middot; Ligaments = Link bone to bone</p></div>
<div class="block block-dyk"><h3>&#11088; Did You Know?</h3>
<p>A sprain (stretched or torn ligament) and a strain (stretched or torn muscle or tendon) are often confused, but doctors treat them differently — which is exactly why knowing the difference between ligaments and tendons actually matters outside the classroom too.</p></div>
<div class="block block-activity"><h3>&#128300; Practical Activity: Build a Model Hand</h3>
<div class="what-to-do"><strong>What to do:</strong> Trace your hand onto a piece of card and cut it out, or use a glove. Tape a drinking straw along the back of each finger to represent bones. Thread a piece of string through each straw so it's free to slide, and tape the string firmly at the fingertip. Pull the strings from the wrist end — this is your "tendon" pulling to bend the "finger". Notice how pulling can only curl the fingers, never straighten them by itself — just like real muscles, your model can only pull, never push.</div></div>
<details class="quick-check"><summary>&#10067; Quick Check: A ligament in a learner's ankle is torn during sport. What has actually been damaged?</summary>
<div class="answer">A bone-to-bone connection at the ankle joint — ligaments connect bone to bone, so this injury affects the joint's stability, not a muscle's ability to contract.</div>
</details>` },

      { label: 'Friday', content: `<h2>&#128203; Summary & Key Vocabulary</h2>
<div class="block block-summary"><h3>&#128203; Week Summary</h3><ul>
<li>The skeleton provides support, protection, movement (as levers), blood cell production, and mineral storage.</li>
<li>Joint types (ball-and-socket, hinge, pivot, gliding) determine what movements are possible; cartilage cushions joints.</li>
<li>Muscles can only contract, never push — so they work in antagonistic pairs (e.g. biceps and triceps) to move a joint in both directions.</li>
<li>Tendons connect muscle to bone; ligaments connect bone to bone.</li>
</ul></div>
<div class="block block-mistakes"><h3>&#9888; Common Mistakes (from past exam reports)</h3>
<div class="mistake-item"><div class="wrong">&#10060; "Ligaments and tendons are the same thing."</div><div class="right">&#10004; Tendons connect MUSCLE to BONE. Ligaments connect BONE to BONE. They are different structures with different jobs.</div></div>
<div class="mistake-item"><div class="wrong">&#10060; "Muscles can push bones as well as pull them."</div><div class="right">&#10004; Muscle tissue can only contract (pull) — it can never push. This is exactly why antagonistic pairs are needed to move a joint in both directions.</div></div>
<div class="mistake-item"><div class="wrong">&#10060; "Cartilage is a type of bone."</div><div class="right">&#10004; Cartilage is a separate, softer, flexible connective tissue — not bone. It cushions joints and reduces friction where bones meet.</div></div></div>
<div class="block block-vocab"><h3>&#128273; Key Vocabulary</h3>
<div class="vocab-term"><b>Skeleton</b> — the internal framework of bones supporting and protecting the body</div>
<div class="vocab-term"><b>Joint</b> — a point where two or more bones meet, allowing movement</div>
<div class="vocab-term"><b>Ligament</b> — tough tissue connecting bone to bone at a joint</div>
<div class="vocab-term"><b>Tendon</b> — tough tissue connecting muscle to bone</div>
<div class="vocab-term"><b>Cartilage</b> — smooth connective tissue that cushions joints and reduces friction</div>
<div class="vocab-term"><b>Antagonistic muscles</b> — a pair of muscles that produce opposite movements at a joint</div>
</div>
<details class="quick-check"><summary>&#10067; Final Check: Without looking back, can you explain the difference between a tendon and a ligament in one sentence each?</summary>
<div class="answer">A tendon connects muscle to bone, allowing a contracting muscle to move a bone. A ligament connects bone to bone, holding a joint together. If you can say both without mixing them up, you're ready for the quiz!</div>
</details>
<p style="margin-top:16px;color:#4caf50;font-weight:600;">&#9989; Ready? Head to the <strong>Assessment</strong> tab above to complete this week's quiz. You need 70% to pass and unlock next week.</p>` }
    ],

let currentWeek = 1;
let currentDay = 0;
let completedWeeks = new Set(JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'completedWeeks') || '[]'));

Object.keys(weekData).forEach(function(w) {
  localStorage.setItem(STORAGE_PREFIX + 'correct_' + w, JSON.stringify(weekData[w].assessment.map(function(q){ return q.correct; })));
});

function toggleTheme() {
  const isLight = document.getElementById('body').classList.toggle('light-mode');
  localStorage.setItem('cl_theme', isLight ? 'light' : 'dark');
  document.getElementById('themeBtn').innerHTML = isLight ? '&#9790; Dark' : '&#9728; Light';
}

function saveAnswer(week, q, val) {
  var k = STORAGE_PREFIX + 'answers_' + week;
  var saved = JSON.parse(localStorage.getItem(k) || '{}');
  saved['q' + q] = val;
  localStorage.setItem(k, JSON.stringify(saved));
}

function buildModuleSelector() {
  var el = document.getElementById('moduleSelector');
  el.innerHTML = '';
  for (var w = 1; w <= TOTAL_WEEKS; w++) {
    var btn = document.createElement('button');
    btn.className = 'module-btn' + (completedWeeks.has(w) ? ' completed' : '');
    btn.textContent = 'Week ' + w + (completedWeeks.has(w) ? ' \u2713' : '');
    btn.onclick = (function(week){ return function(){ selectModule(week); }; })(w);
    el.appendChild(btn);
  }
  refreshModuleButtons();
}
function refreshModuleButtons() {
  document.querySelectorAll('.module-btn').forEach(function(btn, i) { btn.classList.toggle('active', i + 1 === currentWeek); });
}

function selectModule(week) { currentWeek = week; currentDay = 0; refreshModuleButtons(); updateWeekContent(); }

function buildDayTabs() {
  var week = weekData[currentWeek];
  var el = document.getElementById('dayTabs');
  el.innerHTML = '';
  week.days.forEach(function(day, i) {
    var btn = document.createElement('button');
    btn.className = 'day-btn' + (day.label === 'Friday' ? ' friday' : '') + (i === currentDay ? ' active' : '');
    btn.textContent = day.label;
    btn.onclick = function(){ currentDay = i; buildDayTabs(); renderDayContent(); };
    el.appendChild(btn);
  });
}
function renderDayContent() {
  var day = weekData[currentWeek].days[currentDay];
  document.getElementById('lessonContent').innerHTML =
    '<div class="day-label">&#128197; ' + day.label + ' &middot; Week ' + currentWeek + '</div>' + day.content;
}

function showTab(tabName, tabBtn) {
  document.querySelectorAll('.content-section').forEach(function(s){ s.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.getElementById(tabName).classList.add('active');
  if (tabBtn) tabBtn.classList.add('active');
}

function updateVideoSection() {
  const v = weekData[currentWeek].videos;
  const CS = '<div style="position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#1a1a2e,#16213e);display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;"><div style="font-size:2.2rem;">&#127916;</div><p style="color:#fff;font-weight:700;margin-top:8px;font-size:0.85rem;">Video Coming Soon</p></div>';
  const iframe = function(id) {
    return '<iframe src="https://www.youtube.com/embed/'+id+'?rel=0&modestbranding=1&iv_load_policy=3" frameborder="0" allowfullscreen style="position:absolute;top:0;left:0;width:100%;height:100%;border-radius:10px;"></iframe>';
  };
  document.getElementById('tutorialVideo').innerHTML = (v.t && v.t !== 'PLACEHOLDER') ? iframe(v.t) : CS;
  document.getElementById('basicVideo').innerHTML = (v.b && v.b !== 'PLACEHOLDER') ? iframe(v.b) : CS;
  document.getElementById('tutorialTitle').textContent = v.tTitle;
  document.getElementById('basicTitle').textContent = v.bTitle;
  document.getElementById('weekTitle').textContent = 'Videos \u2014 Week ' + currentWeek;
}

function renderResources() {
  var week = weekData[currentWeek];
  document.getElementById('resourcesTitle').textContent = 'Resources \u2014 Week ' + currentWeek;
  var html = '<div class="resources-grid">';
  week.resources.forEach(function(r) {
    var pdfUrl = 'https://mozilla.github.io/pdf.js/web/viewer.html?file=' + BASE_URL + r.file;
    html += '<a href="'+pdfUrl+'" class="resource-card" target="_blank"><div class="resource-icon">'+r.icon+'</div><h4>'+r.title+'</h4><p>'+r.desc+'</p><span class="download-badge">View PDF</span></a>';
  });
  html += '</div>';
  document.getElementById('resourcesBody').innerHTML = html;
}

function renderAssessment() {
  var week = weekData[currentWeek];
  var html = '<h2 style="font-size:1.1rem;margin-bottom:6px;">Week ' + currentWeek + ' Assessment</h2>';
  html += '<p style="color:#888;margin-bottom:16px;font-size:0.85rem;">'+week.assessment.length+' questions. You need 70% to pass. Available from Friday.</p>';
  week.assessment.forEach(function(q, qi) {
    html += '<div class="quiz-question"><h4>Q'+(qi+1)+': '+q.question+'</h4><div class="quiz-options">';
    q.options.forEach(function(opt, oi) {
      html += '<label class="quiz-option"><input type="radio" name="w'+currentWeek+'q'+qi+'" value="'+oi+'" onchange="saveAnswer('+currentWeek+','+qi+','+oi+')"> '+opt+'</label>';
    });
    html += '</div></div>';
  });
  html += '<a href="submit_MSK_'+currentWeek+'.html" onclick="localStorage.setItem(\'cl_submit_course\',\'MSK\');localStorage.setItem(\'cl_submit_week\',\''+currentWeek+'\');" class="submit-btn">Submit Assessment</a>';

  if (week.shortAnswers && week.shortAnswers.length) {
    html += '<h3 style="margin-top:26px;margin-bottom:6px;font-size:1rem;color:#4caf50;">&#9997; Short Answer Practice</h3>';
    html += '<p style="color:#888;margin-bottom:14px;font-size:0.8rem;">Exam-style questions, marked out of the total shown. These are for practice only and don\'t affect your pass/fail score — write your answer, then reveal the model answer to check yourself.</p>';
    week.shortAnswers.forEach(function(sa, si) {
      var id = 'sa_' + currentWeek + '_' + si;
      html += '<div class="sa-practice">' +
        '<h4>Q'+(si+1)+': '+sa.question+'</h4>' +
        '<div class="sa-marks">['+sa.marks+' marks]</div>' +
        '<textarea placeholder="Type your answer here..." id="'+id+'_input"></textarea>' +
        '<div><button class="sa-reveal-btn" onclick="revealModelAnswer(\''+id+'\')">Reveal Model Answer</button></div>' +
        '<div class="sa-model-answer" id="'+id+'_answer"><strong>Model Answer:</strong> '+sa.modelAnswer+'</div>' +
        '</div>';
    });
  }

  document.getElementById('assessmentContent').innerHTML = html;
}

function revealModelAnswer(id) {
  document.getElementById(id + '_answer').classList.add('shown');
}

function updateWeekContent() {
  updateVideoSection();
  buildDayTabs();
  renderDayContent();
  renderResources();
  renderAssessment();
}

function updateProgress() {
  const done = completedWeeks.size;
  const pct = Math.round(done / TOTAL_WEEKS * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '% complete';
  document.getElementById('weeksComplete').textContent = done + '/' + TOTAL_WEEKS;
  document.getElementById('videosWatched').textContent = (done*2) + '/' + (TOTAL_WEEKS*2);
  document.getElementById('assessmentsPassed').textContent = done + '/' + TOTAL_WEEKS;
}

// ── Lightbox: tap any illustration to zoom, with a scale+fade animation ──
function openLightbox(src, caption) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightboxCaption').textContent = caption || '';
  var overlay = document.getElementById('lightboxOverlay');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox(e) {
  if (e) e.stopPropagation();
  document.getElementById('lightboxOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeLightbox();
});
document.getElementById('lessonContent').addEventListener('click', function(e) {
  if (e.target.tagName === 'IMG' && e.target.closest('.illustration')) {
    var captionEl = e.target.closest('.illustration').querySelector('.caption');
    openLightbox(e.target.src, captionEl ? captionEl.textContent : '');
  }
});

window.onload = function() {
  const isLight = localStorage.getItem('cl_theme') === 'light';
  if (isLight) { document.getElementById('body').classList.add('light-mode'); document.getElementById('themeBtn').innerHTML = '&#9790; Dark'; }
  buildModuleSelector();
  updateProgress();
  selectModule(1);
};
</script>
</body>
