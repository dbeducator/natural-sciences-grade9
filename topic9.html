<script>
const STORAGE_PREFIX = 'coachG9_PCC_';
const TOTAL_WEEKS = 1;
const COURSE_NAME = 'Physical and Chemical Change';
const GOOGLE_SHEET_URL = 'https://script.google.com/macros/s/REPLACE_WITH_YOUR_SCRIPT_ID/exec';
const SECRET_KEY = 'CoachG9SecureKey';
const BASE_URL = 'https://dbeducator.github.io/natural-sciences-grade9/';

// ── One entry per week. Each week has 5 days (Mon-Thu teaching, Fri = assessment day). ──
const weekData = {
  1: {
    videos: { t: '7zyiW-13jzk', tTitle: 'Physical and Chemical Change — Tutorial', b: 'x49BtB5dOwg', bTitle: 'Physical and Chemical Change — Explained Simply' },
    days: [
      { label: 'Monday', content: `<h2>&#129517; Matter That Changes</h2>
<div class="block block-objectives"><h3>&#127919; Learning Objectives</h3><ul>
<li>Define a physical change and give examples</li>
<li>Explain why a physical change does not form a new substance</li>
<li>Relate physical changes to changes of state</li>
</ul></div>
<div class="block block-intro"><h3>&#128214; Introduction</h3>
<p>Welcome to Term 2 and a brand new strand: Matter and Materials! Everything around you — your desk, the air you breathe, the water you drink — is matter, and matter is constantly changing form. This term we'll dig into what matter is actually made of and how it behaves. We're starting with one of the most useful distinctions in all of chemistry: the difference between a physical change and a chemical change.</p></div>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/Melting_ice.JPG" alt="Ice melting into water" loading="lazy"/>
<div class="caption">Melting ice — a physical change. The substance is still H&#8322;O throughout. Wikimedia Commons</div>
</div>
<div class="block block-concept"><h3>&#128300; Key Concept: Physical Change</h3>
<p>A <strong>physical change</strong> alters the form, size, or state of a substance, but does <strong>not</strong> create a new substance. The chemical composition stays exactly the same before and after.</p>
<ul>
<li>Melting ice &rarr; still H&#8322;O, just a different state</li>
<li>Cutting paper into smaller pieces &rarr; still paper</li>
<li>Dissolving sugar in water &rarr; the sugar is still sugar, just spread through the water</li>
<li>Bending a piece of wire &rarr; still the same metal</li>
</ul>
<p>Physical changes are usually — though not always — reversible: you can freeze water back into ice, or evaporate the water to get the sugar back.</p></div>
<div class="block block-mnemonic"><h3>&#129504; Memory Trick</h3>
<p class="trick">Physical change = same suSTANCE, different STANCE (form/shape/state)</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: Why is dissolving sugar in tea considered a physical change?</summary>
<div class="answer">The sugar hasn't turned into a different substance — it's still sugar, just spread out (dissolved) among the water molecules. You could get the sugar back by evaporating the water, which confirms no new substance formed.</div>
</details>` },

      { label: 'Tuesday', content: `<h2>&#128293; Chemical Change</h2>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/Rust_screw.jpg" alt="A rusted screw showing iron oxide formation" loading="lazy"/>
<div class="caption">Rust (iron oxide) forming on a screw — a chemical change. Iron + oxygen has become a genuinely new substance. Wikimedia Commons</div>
</div>
<div class="block block-concept"><h3>&#128300; Key Concept: Chemical Change</h3>
<p>A <strong>chemical change</strong> occurs when substances react to form one or more brand-new substances, with different properties from what you started with. Unlike physical changes, chemical changes are usually difficult or impossible to reverse.</p>
<ul>
<li>Rusting: iron + oxygen &rarr; iron oxide (a new substance, with different properties from either iron or oxygen)</li>
<li>Burning wood &rarr; ash, smoke, and gases (very different from the original wood)</li>
<li>Cooking an egg &rarr; the proteins permanently change structure; you can't "uncook" it</li>
</ul>
<h4>Signs That a Chemical Change Has Happened</h4>
<ul>
<li>A colour change</li>
<li>Production of a gas (bubbles)</li>
<li>A temperature change (getting hotter or colder on its own)</li>
<li>A new smell</li>
<li>Formation of a precipitate (a solid appearing in a liquid mixture)</li>
<li>Light being produced</li>
</ul></div>
<div class="block block-dyk"><h3>&#11088; Did You Know?</h3>
<p>Rusting is a genuine chemical reaction between iron, oxygen, and water — which is exactly why keeping metal dry or coating it in paint (blocking oxygen and water from reaching it) is such an effective way to prevent it.</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: Name two signs that would tell you a chemical change has probably happened.</summary>
<div class="answer">Any two of: a colour change, gas bubbles forming, a temperature change, a new smell, a solid (precipitate) forming, or light being produced.</div>
</details>` },

      { label: 'Wednesday', content: `<h2>&#9995; Reversible vs Irreversible Changes</h2>
<div class="block block-concept"><h3>&#128300; Key Concept: Can You Undo It?</h3>
<table style="width:100%;font-size:0.85rem;border-collapse:collapse;margin-top:8px;">
<tr><th style="text-align:left;padding:5px;color:#4caf50;">Feature</th><th style="text-align:left;padding:5px;color:#4caf50;">Physical Change</th><th style="text-align:left;padding:5px;color:#4caf50;">Chemical Change</th></tr>
<tr><td style="padding:5px;">New substance formed?</td><td style="padding:5px;">No</td><td style="padding:5px;">Yes</td></tr>
<tr><td style="padding:5px;">Usually reversible?</td><td style="padding:5px;">Yes</td><td style="padding:5px;">Rarely / with difficulty</td></tr>
<tr><td style="padding:5px;">Examples</td><td style="padding:5px;">Melting, dissolving, cutting</td><td style="padding:5px;">Burning, rusting, cooking</td></tr>
</table>
<p>It's a useful general rule, but be careful: reversibility is a helpful clue, not the actual definition. The true test of a chemical change is always whether a genuinely new substance with different properties has formed.</p></div>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/Beef_biltong.JPG" alt="South African biltong, air-dried cured meat" loading="lazy"/>
<div class="caption">Biltong — South African air-dried, cured meat. Wiki Loves Africa 2014, Wikimedia Commons (CC BY-SA 4.0)</div>
</div>
<div class="block block-sa"><h3>&#127487; South African Connection</h3>
<p>Making biltong is a great everyday example of a physical change. Strips of meat are salted, spiced with vinegar and coriander, and air-dried — removing water through evaporation. The meat is still fundamentally the same substance (protein and fat) throughout; what's changed is its water content and texture, not its chemical identity. This is why biltong-making is classified as a physical, not chemical, process — even though the texture change feels dramatic and is, in practice, very difficult to reverse.</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: Why is biltong-making a physical change even though it's practically impossible to turn biltong back into fresh meat?</summary>
<div class="answer">Because no new substance is formed — the meat is still made of the same proteins and fats throughout, just with the water removed. "Reversible" is a helpful general clue for spotting physical changes, but the real test is always whether a new substance formed, and here it didn't.</div>
</details>` },

      { label: 'Thursday', content: `<h2>&#128300; Practical Activity: Classify the Change</h2>
<div class="block block-dyk"><h3>&#11088; Did You Know?</h3>
<p>Mixing vinegar and baking soda produces a fizzing chemical reaction (carbon dioxide gas is the giveaway sign), while mixing sand and water is purely physical — you can separate them again afterwards by simply letting the water evaporate or filtering.</p></div>
<div class="block block-activity"><h3>&#128300; Practical Activity: Sort the Changes</h3>
<div class="what-to-do"><strong>What to do:</strong> Make a table with two columns: "Physical Change" and "Chemical Change". Sort the following into the correct column, and for each one, write a one-sentence reason: melting butter, burning a candle, tearing paper, an apple going brown after being cut, boiling water, a firework exploding, freezing juice into ice lollies, bread going mouldy. For at least one item, discuss with a partner whether you agree on which column it belongs in — some, like an apple browning, are more interesting to reason through than they first appear.</div></div>
<details class="quick-check"><summary>&#10067; Quick Check: Is an apple going brown after being cut a physical or chemical change? Why?</summary>
<div class="answer">It's a chemical change — a compound in the apple reacts with oxygen in the air (an enzyme-driven reaction) to form new brown-coloured substances. The colour change and the fact that you can't turn it back are both signs pointing to a chemical change.</div>
</details>` },

      { label: 'Friday', content: `<h2>&#128203; Summary & Key Vocabulary</h2>
<div class="block block-summary"><h3>&#128203; Week Summary</h3><ul>
<li>A physical change alters form, size, or state, but no new substance forms — usually reversible.</li>
<li>A chemical change forms a genuinely new substance with different properties — usually difficult to reverse.</li>
<li>Signs of a chemical change: colour change, gas produced, temperature change, new smell, precipitate formed, light produced.</li>
<li>Reversibility is a useful clue, but the real test of a chemical change is whether a new substance actually formed.</li>
</ul></div>
<div class="block block-mistakes"><h3>&#9888; Common Mistakes (from past exam reports)</h3>
<div class="mistake-item"><div class="wrong">&#10060; "If a change is irreversible, it must be chemical — and if it's reversible, it must be physical."</div><div class="right">&#10004; Reversibility is a useful clue, not a strict rule. Some physical changes (like biltong-drying, or scrambling an egg's texture through cooking — actually chemical) are hard to reverse in practice. Always check for a genuinely new substance first.</div></div>
<div class="mistake-item"><div class="wrong">&#10060; "Melting and boiling are chemical changes because they need heat."</div><div class="right">&#10004; Needing heat doesn't make something chemical. Melting and boiling only change the STATE of a substance (solid/liquid/gas) — the substance itself (e.g. H&#8322;O) stays exactly the same.</div></div>
<div class="mistake-item"><div class="wrong">&#10060; "A colour change always means a chemical change happened."</div><div class="right">&#10004; Not always — dissolving a coloured substance (like food colouring spreading through water) is a physical change even though the colour visibly changes. Colour change is one clue among several, not proof on its own.</div></div></div>
<div class="block block-vocab"><h3>&#128273; Key Vocabulary</h3>
<div class="vocab-term"><b>Physical change</b> — a change in form, size, or state where no new substance is formed</div>
<div class="vocab-term"><b>Chemical change</b> — a change where one or more new substances form, with different properties</div>
<div class="vocab-term"><b>Reversible</b> — a change that can be undone, returning the original substance(s)</div>
<div class="vocab-term"><b>Irreversible</b> — a change that cannot easily be undone</div>
<div class="vocab-term"><b>Precipitate</b> — a solid that forms and separates out of a liquid during a chemical reaction</div>
</div>
<details class="quick-check"><summary>&#10067; Final Check: Without looking back, what is the single real test for whether a change is chemical?</summary>
<div class="answer">Whether a genuinely new substance, with different properties from the starting materials, has been formed — not simply whether the change looks dramatic or is hard to reverse.</div>
</details>
<p style="margin-top:16px;color:#4caf50;font-weight:600;">&#9989; Ready? Head to the <strong>Assessment</strong> tab above to complete this week's quiz. You need 70% to pass and unlock the next topic.</p>` }

let currentWeek = 1;
let currentDay = 0;
let completedWeeks = new Set(JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'completedWeeks') || '[]'));

Object.keys(weekData).forEach(function(w) {
  localStorage.setItem(STORAGE_PREFIX + 'correct_' + w, JSON.stringify(weekData[w].assessment.map(function(q){ return q.correct; })));
});

function toggleTheme() {
  const isLight = document.getElementById('body').classList.toggle('light-mode');
  localStorage.setItem('cl_theme', isLight ? 'light' : 'dark');
  document.getElementById('themeBtn').innerHTML = isLight ? '&#9790; Dark' : '&#9728; Light';
}

function saveAnswer(week, q, val) {
  var k = STORAGE_PREFIX + 'answers_' + week;
  var saved = JSON.parse(localStorage.getItem(k) || '{}');
  saved['q' + q] = val;
  localStorage.setItem(k, JSON.stringify(saved));
}

function buildModuleSelector() {
  var el = document.getElementById('moduleSelector');
  el.innerHTML = '';
  for (var w = 1; w <= TOTAL_WEEKS; w++) {
    var btn = document.createElement('button');
    btn.className = 'module-btn' + (completedWeeks.has(w) ? ' completed' : '');
    btn.textContent = 'Week ' + w + (completedWeeks.has(w) ? ' \u2713' : '');
    btn.onclick = (function(week){ return function(){ selectModule(week); }; })(w);
    el.appendChild(btn);
  }
  refreshModuleButtons();
}
function refreshModuleButtons() {
  document.querySelectorAll('.module-btn').forEach(function(btn, i) { btn.classList.toggle('active', i + 1 === currentWeek); });
}

function selectModule(week) { currentWeek = week; currentDay = 0; refreshModuleButtons(); updateWeekContent(); }

function buildDayTabs() {
  var week = weekData[currentWeek];
  var el = document.getElementById('dayTabs');
  el.innerHTML = '';
  week.days.forEach(function(day, i) {
    var btn = document.createElement('button');
    btn.className = 'day-btn' + (day.label === 'Friday' ? ' friday' : '') + (i === currentDay ? ' active' : '');
    btn.textContent = day.label;
    btn.onclick = function(){ currentDay = i; buildDayTabs(); renderDayContent(); };
    el.appendChild(btn);
  });
}
function renderDayContent() {
  var day = weekData[currentWeek].days[currentDay];
  document.getElementById('lessonContent').innerHTML =
    '<div class="day-label">&#128197; ' + day.label + ' &middot; Week ' + currentWeek + '</div>' + day.content;
}

function showTab(tabName, tabBtn) {
  document.querySelectorAll('.content-section').forEach(function(s){ s.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.getElementById(tabName).classList.add('active');
  if (tabBtn) tabBtn.classList.add('active');
}

function updateVideoSection() {
  const v = weekData[currentWeek].videos;
  const CS = '<div style="position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#1a1a2e,#16213e);display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;"><div style="font-size:2.2rem;">&#127916;</div><p style="color:#fff;font-weight:700;margin-top:8px;font-size:0.85rem;">Video Coming Soon</p></div>';
  const iframe = function(id) {
    return '<iframe src="https://www.youtube.com/embed/'+id+'?rel=0&modestbranding=1&iv_load_policy=3" frameborder="0" allowfullscreen style="position:absolute;top:0;left:0;width:100%;height:100%;border-radius:10px;"></iframe>';
  };
  document.getElementById('tutorialVideo').innerHTML = (v.t && v.t !== 'PLACEHOLDER') ? iframe(v.t) : CS;
  document.getElementById('basicVideo').innerHTML = (v.b && v.b !== 'PLACEHOLDER') ? iframe(v.b) : CS;
  document.getElementById('tutorialTitle').textContent = v.tTitle;
  document.getElementById('basicTitle').textContent = v.bTitle;
  document.getElementById('weekTitle').textContent = 'Videos \u2014 Week ' + currentWeek;
}

function renderResources() {
  var week = weekData[currentWeek];
  document.getElementById('resourcesTitle').textContent = 'Resources \u2014 Week ' + currentWeek;
  var html = '<div class="resources-grid">';
  week.resources.forEach(function(r) {
    var pdfUrl = 'https://mozilla.github.io/pdf.js/web/viewer.html?file=' + BASE_URL + r.file;
    html += '<a href="'+pdfUrl+'" class="resource-card" target="_blank"><div class="resource-icon">'+r.icon+'</div><h4>'+r.title+'</h4><p>'+r.desc+'</p><span class="download-badge">View PDF</span></a>';
  });
  html += '</div>';
  document.getElementById('resourcesBody').innerHTML = html;
}

function renderAssessment() {
  var week = weekData[currentWeek];
  var html = '<h2 style="font-size:1.1rem;margin-bottom:6px;">Week ' + currentWeek + ' Assessment</h2>';
  html += '<p style="color:#888;margin-bottom:16px;font-size:0.85rem;">'+week.assessment.length+' questions. You need 70% to pass. Available from Friday.</p>';
  week.assessment.forEach(function(q, qi) {
    html += '<div class="quiz-question"><h4>Q'+(qi+1)+': '+q.question+'</h4><div class="quiz-options">';
    q.options.forEach(function(opt, oi) {
      html += '<label class="quiz-option"><input type="radio" name="w'+currentWeek+'q'+qi+'" value="'+oi+'" onchange="saveAnswer('+currentWeek+','+qi+','+oi+')"> '+opt+'</label>';
    });
    html += '</div></div>';
  });
  html += '<a href="submit_PCC_'+currentWeek+'.html" onclick="localStorage.setItem(\'cl_submit_course\',\'PCC\');localStorage.setItem(\'cl_submit_week\',\''+currentWeek+'\');" class="submit-btn">Submit Assessment</a>';

  if (week.shortAnswers && week.shortAnswers.length) {
    html += '<h3 style="margin-top:26px;margin-bottom:6px;font-size:1rem;color:#4caf50;">&#9997; Short Answer Practice</h3>';
    html += '<p style="color:#888;margin-bottom:14px;font-size:0.8rem;">Exam-style questions, marked out of the total shown. These are for practice only and don\'t affect your pass/fail score — write your answer, then reveal the model answer to check yourself.</p>';
    week.shortAnswers.forEach(function(sa, si) {
      var id = 'sa_' + currentWeek + '_' + si;
      html += '<div class="sa-practice">' +
        '<h4>Q'+(si+1)+': '+sa.question+'</h4>' +
        '<div class="sa-marks">['+sa.marks+' marks]</div>' +
        '<textarea placeholder="Type your answer here..." id="'+id+'_input"></textarea>' +
        '<div><button class="sa-reveal-btn" onclick="revealModelAnswer(\''+id+'\')">Reveal Model Answer</button></div>' +
        '<div class="sa-model-answer" id="'+id+'_answer"><strong>Model Answer:</strong> '+sa.modelAnswer+'</div>' +
        '</div>';
    });
  }

  document.getElementById('assessmentContent').innerHTML = html;
}

function revealModelAnswer(id) {
  document.getElementById(id + '_answer').classList.add('shown');
}

function updateWeekContent() {
  updateVideoSection();
  buildDayTabs();
  renderDayContent();
  renderResources();
  renderAssessment();
}

function updateProgress() {
  const done = completedWeeks.size;
  const pct = Math.round(done / TOTAL_WEEKS * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '% complete';
  document.getElementById('weeksComplete').textContent = done + '/' + TOTAL_WEEKS;
  document.getElementById('videosWatched').textContent = (done*2) + '/' + (TOTAL_WEEKS*2);
  document.getElementById('assessmentsPassed').textContent = done + '/' + TOTAL_WEEKS;
}

// ── Lightbox: tap any illustration to zoom, with a scale+fade animation ──
function openLightbox(src, caption) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightboxCaption').textContent = caption || '';
  var overlay = document.getElementById('lightboxOverlay');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox(e) {
  if (e) e.stopPropagation();
  document.getElementById('lightboxOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeLightbox();
});
document.getElementById('lessonContent').addEventListener('click', function(e) {
  if (e.target.tagName === 'IMG' && e.target.closest('.illustration')) {
    var captionEl = e.target.closest('.illustration').querySelector('.caption');
    openLightbox(e.target.src, captionEl ? captionEl.textContent : '');
  }
});

window.onload = function() {
  const isLight = localStorage.getItem('cl_theme') === 'light';
  if (isLight) { document.getElementById('body').classList.add('light-mode'); document.getElementById('themeBtn').innerHTML = '&#9790; Dark'; }
  buildModuleSelector();
  updateProgress();
  selectModule(1);
};
</script>
