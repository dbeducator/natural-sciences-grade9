<script>
const STORAGE_PREFIX = 'coachG9_FOR_';
const TOTAL_WEEKS = 2;
const COURSE_NAME = 'Forces';
const GOOGLE_SHEET_URL = 'https://script.google.com/macros/s/REPLACE_WITH_YOUR_SCRIPT_ID/exec';
const SECRET_KEY = 'CoachG9SecureKey';
const BASE_URL = 'https://dbeducator.github.io/natural-sciences-grade9/';

// ── One entry per week. Each week has 5 days (Mon-Thu teaching, Fri = assessment day). ──
const weekData = {
  1: {
    videos: { t: 'w4QFJb9a8vo', tTitle: 'Forces — Tutorial', b: '5-2NLHB4Gxg', bTitle: 'Forces — Explained Simply' },
    days: [
      { label: 'Monday', content: `<h2>&#128170; What Is a Force?</h2>
<div class="block block-objectives"><h3>&#127919; Learning Objectives</h3><ul>
<li>Define a force</li>
<li>State the unit used to measure force</li>
<li>Describe the effects a force can have on an object</li>
</ul></div>
<div class="block block-intro"><h3>&#128214; Introduction</h3>
<p>Welcome to Term 3 and a new strand: Energy and Change! Every time you push a door open, kick a ball, or simply stand still while gravity pulls you toward the ground, a force is at work. This term explores forces, motion, electricity, and energy — starting with the basics of what a force actually is.</p></div>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/Force_examples.svg" alt="Diagram showing examples of forces: lifting against gravity, and magnetic repulsion" loading="lazy"/>
<div class="caption">Examples of forces in action. Wikimedia Commons (public domain)</div>
</div>
<div class="block block-concept"><h3>&#128300; Key Concept: Force</h3>
<p>A <strong>force</strong> is a push or a pull on an object. Forces are measured in <strong>Newtons (N)</strong>, named after Sir Isaac Newton.</p>
<h4>What Can a Force Do?</h4>
<ul>
<li>Change an object's <strong>speed</strong> (speed it up or slow it down)</li>
<li>Change an object's <strong>direction</strong></li>
<li>Change an object's <strong>shape</strong> (stretch, squash, bend, or break it)</li>
</ul>
<p>A force can do more than one of these at once — kicking a ball changes both its speed and its direction in the same instant.</p></div>
<div class="block block-mnemonic"><h3>&#129504; Memory Trick</h3>
<p class="trick">A force can change S.S.D. &rarr; Speed, Shape, or Direction</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: A footballer kicks a stationary ball. Name two effects the force has on the ball.</summary>
<div class="answer">It changes the ball's speed (from stationary to moving) and its direction (it moves off in the direction it was kicked). If the kick is hard enough, it may also briefly change the ball's shape.</div>
</details>` },

      { label: 'Tuesday', content: `<h2>&#129485; Contact & Non-Contact Forces</h2>
<div class="block block-concept"><h3>&#128300; Key Concept: Two Categories of Force</h3>
<h4>Contact Forces</h4>
<p>Require the objects to be touching:</p>
<ul>
<li><strong>Friction</strong> — resists movement between two touching surfaces</li>
<li><strong>Applied force</strong> — a direct push or pull, like pushing a trolley</li>
<li><strong>Normal force</strong> — a surface pushing back on an object resting on it</li>
<li><strong>Tension</strong> — the pulling force in a stretched rope, string, or cable</li>
</ul>
<h4>Non-Contact Forces</h4>
<p>Act at a distance, with no touching required:</p>
<ul>
<li><strong>Gravitational force</strong> — attracts objects with mass towards each other</li>
<li><strong>Magnetic force</strong> — attracts or repels magnetic materials</li>
<li><strong>Electrostatic force</strong> — attracts or repels electrically charged objects</li>
</ul></div>
<div class="block block-dyk"><h3>&#11088; Did You Know?</h3>
<p>Gravity is technically acting on you right now, pulling you toward the Earth, even though nothing appears to be "touching" you to cause it — this is exactly why it's classified as a non-contact force.</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: Is the force that keeps a fridge magnet stuck to a fridge a contact or non-contact force?</summary>
<div class="answer">Non-contact — magnetic force acts at a distance, though the magnet is also physically touching the fridge in this case. The force itself doesn't require the touching to work; a magnet can attract from a short distance away too.</div>
</details>` },

      { label: 'Wednesday', content: `<h2>&#128268; Rolling vs Friction</h2>
<div class="block block-concept"><h3>&#128300; Key Concept: Friction Can Work Against You</h3>
<p>Friction is a force that resists motion between two surfaces in contact. It's essential for some things (walking, braking a car) but a real obstacle for others — carrying a heavy load across the ground means fighting friction the entire way. One of the most effective ways to reduce the effect of friction is to make an object roll instead of slide, since rolling friction is far smaller than sliding friction.</p></div>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/Hippo_water_roller_stickfigure.png" alt="Diagram of the Hippo Roller water container being rolled along the ground" loading="lazy"/>
<div class="caption">The Hippo Roller — designed to be rolled, not carried. Wikimedia Commons</div>
</div>
<div class="block block-sa"><h3>&#127487; South African Connection</h3>
<p>In 1991, South Africans Pettie Petzer and Johan Jonker invented the <strong>Hippo Roller</strong> — a 90-litre water container shaped like a barrel, with a handle attached to its axis. Instead of carrying heavy water containers on their heads (the traditional method still used by millions across rural Africa), users simply roll the Hippo Roller along the ground. This exploits exactly the physics you've just learned: rolling friction is dramatically smaller than the effort of carrying an equivalent weight, allowing one person to move five times more water with far less physical strain. Over 65,000 Hippo Rollers, manufactured in South Africa, have since been distributed to more than 50 countries.</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: Why does rolling a heavy load require less force than carrying it?</summary>
<div class="answer">Rolling friction between a round object and the ground is much smaller than the force needed to lift and carry an equivalent weight against gravity the whole way, making rolling far more efficient.</div>
</details>` },

      { label: 'Thursday', content: `<h2>&#128300; Practical Activity</h2>
<div class="block block-dyk"><h3>&#11088; Did You Know?</h3>
<p>A device called a Newton meter (or spring scale) measures force directly by how much it stretches an internal spring — the same basic principle used in old-fashioned bathroom scales.</p></div>
<div class="block block-activity"><h3>&#128300; Practical Activity: Friction on Different Surfaces</h3>
<div class="what-to-do"><strong>What to do:</strong> Using a Newton meter (or a simple spring, if unavailable) attached to a small block, measure the force needed to pull the block at a steady speed across three different surfaces: a smooth table, a carpet, and sandpaper (or similar rough surface). Record the force reading for each surface. Rank the surfaces from lowest to highest friction, and explain in your own words why a rougher surface requires more force to overcome friction.</div></div>
<details class="quick-check"><summary>&#10067; Quick Check: Which surface would you expect to need the LEAST force to slide a block across — smooth glass or rough concrete?</summary>
<div class="answer">Smooth glass — smoother surfaces produce less friction, requiring less force to keep the object moving at a steady speed.</div>
</details>` },

      { label: 'Monday', content: `<h2>&#9878;&#65039; Balanced & Unbalanced Forces</h2>
<div class="block block-objectives"><h3>&#127919; Learning Objectives</h3><ul>
<li>Distinguish between balanced and unbalanced forces</li>
<li>Define net force</li>
<li>Predict the motion of an object based on the forces acting on it</li>
</ul></div>
<div class="block block-concept"><h3>&#128300; Key Concept: Net Force</h3>
<p>When more than one force acts on an object, you need to consider the <strong>net force</strong> — the overall combined effect of all forces acting together.</p>
<h4>Balanced Forces</h4>
<p>Forces are balanced when they cancel out completely (net force = 0). An object with balanced forces acting on it stays still, or continues moving at a constant speed in a straight line — its motion does NOT change.</p>
<h4>Unbalanced Forces</h4>
<p>Forces are unbalanced when they don't cancel out (net force &ne; 0). This causes the object's motion to change — it speeds up, slows down, or changes direction.</p></div>
<div class="illustration">
<svg viewBox="0 0 300 140" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:300px;height:auto;background:#fff;border-radius:10px;padding:14px;">
<rect x="120" y="55" width="60" height="30" fill="#4caf50" rx="4"/>
<line x1="120" y1="70" x2="60" y2="70" stroke="#c62828" stroke-width="4" marker-end="url(#a1)"/>
<line x1="180" y1="70" x2="240" y2="70" stroke="#1565c0" stroke-width="4" marker-end="url(#a2)"/>
<text x="90" y="60" text-anchor="middle" font-size="10" fill="#c62828">5N</text>
<text x="210" y="60" text-anchor="middle" font-size="10" fill="#1565c0">5N</text>
<text x="150" y="110" text-anchor="middle" font-size="11" font-weight="700" fill="#222">Balanced: net force = 0, no change in motion</text>
<defs><marker id="a1" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M8,0 L0,4 L8,8 Z" fill="#c62828"/></marker><marker id="a2" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#1565c0"/></marker></defs>
</svg>
<div class="caption">Two equal, opposite forces are balanced — the box doesn't move.</div>
</div>
<div class="block block-mnemonic"><h3>&#129504; Memory Trick</h3>
<p class="trick">Balanced = "Boring" (no change) &middot; Unbalanced = "Un-still" (motion changes)</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: Two people push a heavy box from opposite sides with equal force, and it doesn't move. What is the net force?</summary>
<div class="answer">Zero. The two equal, opposite forces are balanced, so the net force is zero and the box's motion doesn't change (it stays still).</div>
</details>` },

      { label: 'Tuesday', content: `<h2>&#9878;&#65039; Weight vs Mass</h2>
<div class="block block-concept"><h3>&#128300; Key Concept: Two Commonly Confused Quantities</h3>
<h4>Mass</h4>
<p>The amount of matter in an object, measured in kilograms (kg). Mass does NOT change depending on location — your mass is the same on Earth, the Moon, or in space.</p>
<h4>Weight</h4>
<p>The FORCE of gravity acting on an object's mass, measured in Newtons (N). Weight DOES change depending on location, because gravity's strength varies.</p>
<p style="text-align:center;font-weight:700;color:#4caf50;">Weight (N) = mass (kg) &times; gravitational field strength (N/kg)</p>
<p>On Earth, gravitational field strength is approximately 9.8 N/kg (often rounded to 10 N/kg). On the Moon, it's only about 1.6 N/kg — roughly a sixth of Earth's.</p></div>
<div class="block block-dyk"><h3>&#11088; Did You Know?</h3>
<p>An astronaut with a mass of 70 kg weighs about 686 N on Earth, but only about 112 N on the Moon — nearly six times lighter — even though their mass (the amount of matter making up their body) hasn't changed at all.</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: An astronaut's mass is 80 kg on Earth. What is their mass on the Moon?</summary>
<div class="answer">Still 80 kg — mass doesn't change with location. Only their weight (the force of gravity on them) would change on the Moon.</div>
</details>` },

      { label: 'Wednesday', content: `<h2>&#128268; Factors Affecting Friction</h2>
<div class="block block-concept"><h3>&#128300; Key Concept: What Changes Friction?</h3>
<ul>
<li><strong>Surface roughness</strong> — rougher surfaces create more friction than smooth ones</li>
<li><strong>Force pressing the surfaces together</strong> — a heavier object generally experiences more friction</li>
<li><strong>Type of motion</strong> — rolling friction is much smaller than sliding friction (as you saw with the Hippo Roller last week)</li>
<li><strong>Lubrication</strong> — adding oil, grease, or water between surfaces reduces friction significantly</li>
</ul>
<h4>Friction: Useful and Unwanted</h4>
<p>Friction isn't always a problem — walking, gripping a pen, and a car's brakes all rely on friction to work at all. But friction also wastes energy as heat in machines, which is exactly why engineers use lubricants and bearings to reduce it where it isn't wanted.</p></div>
<div class="block block-dyk"><h3>&#11088; Did You Know?</h3>
<p>Ball bearings — tiny, smooth, rolling spheres — are used inside wheels and machine parts specifically to replace sliding friction with much lower rolling friction, the exact same principle behind the Hippo Roller, just applied at a much smaller mechanical scale.</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: Why do cyclists oil their bike chains regularly?</summary>
<div class="answer">Oil acts as a lubricant, reducing friction between the moving metal parts of the chain, making pedalling easier and reducing wear on the components over time.</div>
</details>` },

      { label: 'Thursday', content: `<h2>&#128300; Practical Activity</h2>
<div class="block block-dyk"><h3>&#11088; Did You Know?</h3>
<p>Without any friction at all, you wouldn't be able to walk — your shoes would simply slide across the ground with every step, unable to grip and push you forward.</p></div>
<div class="block block-activity"><h3>&#128300; Practical Activity: Draw Force Diagrams</h3>
<div class="what-to-do"><strong>What to do:</strong> For each scenario below, draw a simple force diagram (a box representing the object, with labelled arrows showing each force acting on it) and state whether the forces are balanced or unbalanced: (1) a book resting on a table, (2) a car accelerating from a standstill, (3) a skydiver falling at a constant speed (terminal velocity), (4) a ball rolling to a stop on grass. For each, explain what the net force tells you about the object's motion.</div></div>
<details class="quick-check"><summary>&#10067; Quick Check: A skydiver is falling at a constant (unchanging) speed. Are the forces on them balanced or unbalanced?</summary>
<div class="answer">Balanced — at a constant speed, the upward force of air resistance exactly equals the downward force of gravity (weight), giving a net force of zero, even though the skydiver is still moving.</div>
</details>` },

      { label: 'Friday', content: `<h2>&#128203; Summary & Key Vocabulary</h2>
<div class="block block-summary"><h3>&#128203; Week Summary</h3><ul>

<li>Mass (kg) is the amount of matter in an object and doesn't change with location; weight (N) is the force of gravity on that mass, and DOES change with location.</li>
<li>Friction depends on surface roughness, pressing force, type of motion (rolling vs sliding), and lubrication.</li>
</ul></div>
<div class="block block-mistakes"><h3>&#9888; Common Mistakes (from past exam reports)</h3>
<div class="mistake-item"><div class="wrong">&#10060; "Mass and weight are the same thing, just different units."</div><div class="right">&#10004; Mass (kg) is the amount of matter in an object and never changes. Weight (N) is the FORCE of gravity acting on that mass, and changes depending on location — they are fundamentally different quantities, not just different units for the same thing.</div></div>
<div class="mistake-item"><div class="wrong">&#10060; "An object moving at a constant speed must have unbalanced forces acting on it."</div><div class="right">&#10004; A constant speed (in a straight line) means the forces ARE balanced — net force = 0. Unbalanced forces are needed to CHANGE speed or direction, not to maintain it.</div></div></div>
<div class="block block-vocab"><h3>&#128273; Key Vocabulary</h3>

<div class="vocab-term"><b>Unbalanced forces</b> — forces that don't cancel out, causing a change in motion</div>
<div class="vocab-term"><b>Mass</b> — the amount of matter in an object, measured in kilograms (kg); doesn't change with location</div>

</div>
<details class="quick-check"><summary>&#10067; Final Check: Without looking back, does your mass or your weight change if you travel to the Moon?</summary>

  html += '<a href="submit_FOR_'+currentWeek+'.html" onclick="localStorage.setItem(\'cl_submit_course\',\'FOR\');localStorage.setItem(\'cl_submit_week\',\''+currentWeek+'\');" class="submit-btn">Submit Assessment</a>';

  if (week.shortAnswers && week.shortAnswers.length) {
    html += '<h3 style="margin-top:26px;margin-bottom:6px;font-size:1rem;color:#4caf50;">&#9997; Short Answer Practice</h3>';
    html += '<p style="color:#888;margin-bottom:14px;font-size:0.8rem;">Exam-style questions, marked out of the total shown. These are for practice only and don\'t affect your pass/fail score — write your answer, then reveal the model answer to check yourself.</p>';
    week.shortAnswers.forEach(function(sa, si) {
      var id = 'sa_' + currentWeek + '_' + si;
      html += '<div class="sa-practice">' +
        '<h4>Q'+(si+1)+': '+sa.question+'</h4>' +
        '<div class="sa-marks">['+sa.marks+' marks]</div>' +
        '<textarea placeholder="Type your answer here..." id="'+id+'_input"></textarea>' +
        '<div><button class="sa-reveal-btn" onclick="revealModelAnswer(\''+id+'\')">Reveal Model Answer</button></div>' +
        '<div class="sa-model-answer" id="'+id+'_answer"><strong>Model Answer:</strong> '+sa.modelAnswer+'</div>' +
        '</div>';
    });
  }

  document.getElementById('assessmentContent').innerHTML = html;
}

function revealModelAnswer(id) {
  document.getElementById(id + '_answer').classList.add('shown');
}

function updateWeekContent() {
  updateVideoSection();
  buildDayTabs();
  renderDayContent();
  renderResources();
  renderAssessment();
}

function updateProgress() {
  const done = completedWeeks.size;
  const pct = Math.round(done / TOTAL_WEEKS * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '% complete';
  document.getElementById('weeksComplete').textContent = done + '/' + TOTAL_WEEKS;
  document.getElementById('videosWatched').textContent = (done*2) + '/' + (TOTAL_WEEKS*2);
  document.getElementById('assessmentsPassed').textContent = done + '/' + TOTAL_WEEKS;
}

// ── Lightbox: tap any illustration to zoom, with a scale+fade animation ──
function openLightbox(src, caption) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightboxCaption').textContent = caption || '';
  var overlay = document.getElementById('lightboxOverlay');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox(e) {
  if (e) e.stopPropagation();
  document.getElementById('lightboxOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeLightbox();
});
document.getElementById('lessonContent').addEventListener('click', function(e) {
  if (e.target.tagName === 'IMG' && e.target.closest('.illustration')) {
    var captionEl = e.target.closest('.illustration').querySelector('.caption');
    openLightbox(e.target.src, captionEl ? captionEl.textContent : '');
  }
});

window.onload = function() {
  const isLight = localStorage.getItem('cl_theme') === 'light';
  if (isLight) { document.getElementById('body').classList.add('light-mode'); document.getElementById('themeBtn').innerHTML = '&#9790; Dark'; }
  buildModuleSelector();
  updateProgress();
  selectModule(1);
};
</script>
</body>
</html>
