<script>
const STORAGE_PREFIX = 'coachG9_RMA_';
const TOTAL_WEEKS = 1;
const COURSE_NAME = 'Reactions of Metals & Acids';
const GOOGLE_SHEET_URL = 'https://script.google.com/macros/s/REPLACE_WITH_YOUR_SCRIPT_ID/exec';
const SECRET_KEY = 'CoachG9SecureKey';
const BASE_URL = 'https://dbeducator.github.io/natural-sciences-grade9/';

// ── One entry per week. Each week has 5 days (Mon-Thu teaching, Fri = assessment day). ──
const weekData = {
  1: {
    videos: { t: 'ofw6oHSYGFI', tTitle: 'Reactions of Metals & Acids — Tutorial', b: 'w80k9AopRig', bTitle: 'Metals & Acids — Explained Simply' },
    days: [
      { label: 'Monday', content: `<h2>&#129354; Metals Meet Acids</h2>
<div class="block block-objectives"><h3>&#127919; Learning Objectives</h3><ul>
<li>State the general pattern for a metal + acid reaction</li>
<li>Identify this reaction as a type of displacement reaction</li>
<li>Predict the products of a simple metal + acid reaction</li>
</ul></div>
<div class="block block-intro"><h3>&#128214; Introduction</h3>
<p>Drop a strip of reactive metal into an acid, and you'll usually see fizzing, bubbling, and sometimes heat — a clear chemical reaction. This week connects two things you already know: displacement reactions from last topic, and acids from everyday life, into one of the most useful, predictable reaction patterns in chemistry.</p></div>
<div class="block block-concept"><h3>&#128300; Key Concept: The General Pattern</h3>
<p style="text-align:center;font-weight:700;color:#4caf50;">metal + acid &rarr; salt + hydrogen gas</p>
<h4>Example</h4>
<p style="text-align:center;">magnesium + hydrochloric acid &rarr; magnesium chloride + hydrogen</p>
<p style="text-align:center;font-weight:700;">Mg + 2HCl &rarr; MgCl&#8322; + H&#8322;</p>
<p>This is a <strong>displacement reaction</strong> — the metal displaces the hydrogen from the acid, taking its place to form a salt, while the displaced hydrogen escapes as a gas.</p></div>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/Zn_reaction_with_HCl.JPG" alt="Zinc metal reacting with hydrochloric acid, producing bubbles of hydrogen gas" loading="lazy"/>
<div class="caption">Zinc reacting with hydrochloric acid — the bubbles are hydrogen gas escaping the solution. Wikimedia Commons (public domain)</div>
</div>
<div class="block block-mnemonic"><h3>&#129504; Memory Trick</h3>
<p class="trick">M.A.S.H. &rarr; Metal + Acid &rarr; Salt + Hydrogen</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: What TYPE of reaction is metal + acid → salt + hydrogen?</summary>
<div class="answer">A displacement reaction — the metal displaces (takes the place of) hydrogen in the acid.</div>
</details>` },

      { label: 'Tuesday', content: `<h2>&#128168; Testing for Hydrogen Gas</h2>
<div class="block block-concept"><h3>&#128300; Key Concept: The "Pop" Test</h3>
<p>How do you actually confirm the gas produced is hydrogen? Bring a lit splint (a thin burning wooden stick) close to the mouth of the test tube. If the gas is hydrogen, it will ignite with a distinctive squeaky "pop" sound — this is the standard test used in every lab and exam for identifying hydrogen gas.</p>
<h3>Reactivity Affects Reaction Speed</h3>
<p>Not all metals react at the same rate with acid. More reactive metals (like magnesium) react vigorously, with rapid bubbling. Less reactive metals (like iron) react more slowly. Very unreactive metals (like gold, silver, and copper) don't react with dilute acids at all — this is directly connected to the reactivity series of metals you'll build on further this term.</p></div>
<div class="illustration">
<svg viewBox="0 0 280 320" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:260px;height:auto;background:#fff;border-radius:10px;padding:14px;">

<rect x="20" y="30" width="240" height="28" rx="4" fill="#c62828"/><text x="140" y="49" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Potassium — extremely vigorous</text>
<rect x="20" y="62" width="240" height="28" rx="4" fill="#d84315"/><text x="140" y="81" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Sodium — extremely vigorous</text>
<rect x="20" y="94" width="240" height="28" rx="4" fill="#ef6c00"/><text x="140" y="113" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Magnesium — vigorous</text>
<rect x="20" y="126" width="240" height="28" rx="4" fill="#f9a825"/><text x="140" y="145" text-anchor="middle" font-size="12" font-weight="700" fill="#3a2b00">Zinc — moderate</text>
<rect x="20" y="158" width="240" height="28" rx="4" fill="#fbc02d"/><text x="140" y="177" text-anchor="middle" font-size="12" font-weight="700" fill="#3a2b00">Iron — slow</text>
<rect x="20" y="190" width="240" height="28" rx="4" fill="#9e9d24"/><text x="140" y="209" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">&#8592; Hydrogen (the reference point)</text>
<rect x="20" y="222" width="240" height="28" rx="4" fill="#616161"/><text x="140" y="241" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Copper — no reaction</text>
<rect x="20" y="254" width="240" height="28" rx="4" fill="#424242"/><text x="140" y="273" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Silver — no reaction</text>
<rect x="20" y="286" width="240" height="28" rx="4" fill="#212121"/><text x="140" y="305" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Gold — no reaction</text>
</svg>
<div class="caption">The metal reactivity series — the higher a metal sits, the more vigorously it reacts with dilute acid. Metals below hydrogen don't react with acid at all.</div>
</div>
<div class="block block-dyk"><h3>&#11088; Did You Know?</h3>
<p>The "pop" sound from the hydrogen test is actually a small, safe, controlled explosion — hydrogen combusts rapidly with the oxygen in the air, which is exactly why hydrogen gas must always be handled carefully and never near an open flame in any quantity.</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: A learner tests a gas with a lit splint and hears a squeaky pop. What gas was produced?</summary>
<div class="answer">Hydrogen gas — the squeaky "pop" sound with a lit splint is the standard positive test for hydrogen.</div>
</details>` },

      { label: 'Wednesday', content: `<h2>&#129381; Which Salt Forms?</h2>
<div class="block block-concept"><h3>&#128300; Key Concept: The Acid Determines the Salt</h3>
<p>The specific salt produced depends entirely on which acid is used:</p>
<table style="width:100%;font-size:0.85rem;border-collapse:collapse;margin-top:8px;">
<tr><th style="text-align:left;padding:5px;color:#4caf50;">Acid</th><th style="text-align:left;padding:5px;color:#4caf50;">Salt Type Produced</th><th style="text-align:left;padding:5px;color:#4caf50;">Example</th></tr>
<tr><td style="padding:5px;">Hydrochloric acid (HCl)</td><td style="padding:5px;">Chloride</td><td style="padding:5px;">Zn + 2HCl &rarr; ZnCl&#8322; + H&#8322;</td></tr>
<tr><td style="padding:5px;">Sulfuric acid (H&#8322;SO&#8324;)</td><td style="padding:5px;">Sulfate</td><td style="padding:5px;">Zn + H&#8322;SO&#8324; &rarr; ZnSO&#8324; + H&#8322;</td></tr>
<tr><td style="padding:5px;">Nitric acid (HNO&#8323;)</td><td style="padding:5px;">Nitrate</td><td style="padding:5px;">Zn + 2HNO&#8323; &rarr; Zn(NO&#8323;)&#8322; + H&#8322;</td></tr>
</table></div>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/Iron_hydroxide_precipitate_in_stream.jpg" alt="Orange iron hydroxide precipitate in a stream affected by acid mine drainage" loading="lazy"/>
<div class="caption">Iron hydroxide precipitate, the tell-tale orange colour of acid mine drainage. USGS, Wikimedia Commons (public domain)</div>
</div>
<div class="block block-sa"><h3>&#127487; South African Connection</h3>
<p>Metal-acid chemistry isn't confined to the lab — it's the cause of one of South Africa's most significant environmental challenges: acid mine drainage (AMD). On the Witwatersrand goldfields, pyrite (iron sulfide) in exposed rock reacts with oxygen and water to form sulfuric acid. This acid then reacts with metals in the surrounding rock — the exact metal + acid pattern you learned on Monday — releasing dissolved iron and other metals into groundwater. When that acidic, metal-rich water reaches streams and neutralises slightly, the iron precipitates out as the orange sludge pictured above, exactly the colour you'd see downstream of affected mining areas like the West Rand. Government and mining companies continue working on treatment plants to manage this legacy of over a century of gold mining.</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: If a metal reacts with sulfuric acid, what type of salt is formed?</summary>
<div class="answer">A sulfate. Sulfuric acid always produces sulfate salts, just as hydrochloric acid produces chlorides and nitric acid produces nitrates.</div>
</details>` },

      { label: 'Thursday', content: `<h2>&#128300; Practical Activity</h2>

</div>
<div class="illustration">

</div>
<div class="block block-dyk"><h3>&#11088; Did You Know?</h3>
<p>Not every metal reacts with every acid the same way — copper, for example, does not react with dilute hydrochloric acid at all, which is exactly why copper piping is considered safe for transporting many acidic liquids.</p></div>

<details class="quick-check"><summary>&#10067; Quick Check: Why is a teacher demonstration, rather than learners handling the acid directly, the safer choice for this practical?</summary>
<div class="answer">Concentrated or even dilute acids can cause skin and eye irritation or burns, and the hydrogen gas produced is flammable — a controlled teacher demonstration with proper safety equipment reduces the risk of accidental exposure or injury.</div>

<div class="block block-summary"><h3>&#128203; Week Summary</h3><ul>

<div class="block block-mistakes"><h3>&#9888; Common Mistakes (from past exam reports)</h3>
<div class="mistake-item"><div class="wrong">&#10060; "All metals react the same way with acid."</div><div class="right">&#10004; Reactivity varies hugely — very reactive metals react vigorously, while unreactive metals like gold and copper may not react with dilute acid at all.</div></div>

let currentWeek = 1;
let currentDay = 0;
let completedWeeks = new Set(JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'completedWeeks') || '[]'));

Object.keys(weekData).forEach(function(w) {
  localStorage.setItem(STORAGE_PREFIX + 'correct_' + w, JSON.stringify(weekData[w].assessment.map(function(q){ return q.correct; })));
});

function toggleTheme() {
  const isLight = document.getElementById('body').classList.toggle('light-mode');
  localStorage.setItem('cl_theme', isLight ? 'light' : 'dark');
  document.getElementById('themeBtn').innerHTML = isLight ? '&#9790; Dark' : '&#9728; Light';
}

function saveAnswer(week, q, val) {
  var k = STORAGE_PREFIX + 'answers_' + week;
  var saved = JSON.parse(localStorage.getItem(k) || '{}');
  saved['q' + q] = val;
  localStorage.setItem(k, JSON.stringify(saved));
}

function buildModuleSelector() {
  var el = document.getElementById('moduleSelector');
  el.innerHTML = '';
  for (var w = 1; w <= TOTAL_WEEKS; w++) {
    var btn = document.createElement('button');
    btn.className = 'module-btn' + (completedWeeks.has(w) ? ' completed' : '');
    btn.textContent = 'Week ' + w + (completedWeeks.has(w) ? ' \u2713' : '');
    btn.onclick = (function(week){ return function(){ selectModule(week); }; })(w);
    el.appendChild(btn);
  }
  refreshModuleButtons();
}
function refreshModuleButtons() {
  document.querySelectorAll('.module-btn').forEach(function(btn, i) { btn.classList.toggle('active', i + 1 === currentWeek); });
}

function selectModule(week) { currentWeek = week; currentDay = 0; refreshModuleButtons(); updateWeekContent(); }

function buildDayTabs() {
  var week = weekData[currentWeek];
  var el = document.getElementById('dayTabs');
  el.innerHTML = '';
  week.days.forEach(function(day, i) {
    var btn = document.createElement('button');
    btn.className = 'day-btn' + (day.label === 'Friday' ? ' friday' : '') + (i === currentDay ? ' active' : '');
    btn.textContent = day.label;
    btn.onclick = function(){ currentDay = i; buildDayTabs(); renderDayContent(); };
    el.appendChild(btn);
  });
}
function renderDayContent() {
  var day = weekData[currentWeek].days[currentDay];
  document.getElementById('lessonContent').innerHTML =
    '<div class="day-label">&#128197; ' + day.label + ' &middot; Week ' + currentWeek + '</div>' + day.content;
}

function showTab(tabName, tabBtn) {
  document.querySelectorAll('.content-section').forEach(function(s){ s.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.getElementById(tabName).classList.add('active');
  if (tabBtn) tabBtn.classList.add('active');
}

function updateVideoSection() {
  const v = weekData[currentWeek].videos;
  const CS = '<div style="position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#1a1a2e,#16213e);display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;"><div style="font-size:2.2rem;">&#127916;</div><p style="color:#fff;font-weight:700;margin-top:8px;font-size:0.85rem;">Video Coming Soon</p></div>';
  const iframe = function(id) {
    return '<iframe src="https://www.youtube.com/embed/'+id+'?rel=0&modestbranding=1&iv_load_policy=3" frameborder="0" allowfullscreen style="position:absolute;top:0;left:0;width:100%;height:100%;border-radius:10px;"></iframe>';
  };
  document.getElementById('tutorialVideo').innerHTML = (v.t && v.t !== 'PLACEHOLDER') ? iframe(v.t) : CS;
  document.getElementById('basicVideo').innerHTML = (v.b && v.b !== 'PLACEHOLDER') ? iframe(v.b) : CS;
  document.getElementById('tutorialTitle').textContent = v.tTitle;
  document.getElementById('basicTitle').textContent = v.bTitle;
  document.getElementById('weekTitle').textContent = 'Videos \u2014 Week ' + currentWeek;
}

function renderResources() {
  var week = weekData[currentWeek];
  document.getElementById('resourcesTitle').textContent = 'Resources \u2014 Week ' + currentWeek;
  var html = '<div class="resources-grid">';
  week.resources.forEach(function(r) {
    var pdfUrl = 'https://mozilla.github.io/pdf.js/web/viewer.html?file=' + BASE_URL + r.file;
    html += '<a href="'+pdfUrl+'" class="resource-card" target="_blank"><div class="resource-icon">'+r.icon+'</div><h4>'+r.title+'</h4><p>'+r.desc+'</p><span class="download-badge">View PDF</span></a>';
  });
  html += '</div>';
  document.getElementById('resourcesBody').innerHTML = html;
}

function renderAssessment() {
  var week = weekData[currentWeek];
  var html = '<h2 style="font-size:1.1rem;margin-bottom:6px;">Week ' + currentWeek + ' Assessment</h2>';
  html += '<p style="color:#888;margin-bottom:16px;font-size:0.85rem;">'+week.assessment.length+' questions. You need 70% to pass. Available from Friday.</p>';
  week.assessment.forEach(function(q, qi) {
    html += '<div class="quiz-question"><h4>Q'+(qi+1)+': '+q.question+'</h4><div class="quiz-options">';
    q.options.forEach(function(opt, oi) {
      html += '<label class="quiz-option"><input type="radio" name="w'+currentWeek+'q'+qi+'" value="'+oi+'" onchange="saveAnswer('+currentWeek+','+qi+','+oi+')"> '+opt+'</label>';
    });
    html += '</div></div>';
  });
  html += '<a href="submit_RMA_'+currentWeek+'.html" onclick="localStorage.setItem(\'cl_submit_course\',\'RMA\');localStorage.setItem(\'cl_submit_week\',\''+currentWeek+'\');" class="submit-btn">Submit Assessment</a>';

  if (week.shortAnswers && week.shortAnswers.length) {
    html += '<h3 style="margin-top:26px;margin-bottom:6px;font-size:1rem;color:#4caf50;">&#9997; Short Answer Practice</h3>';
    html += '<p style="color:#888;margin-bottom:14px;font-size:0.8rem;">Exam-style questions, marked out of the total shown. These are for practice only and don\'t affect your pass/fail score — write your answer, then reveal the model answer to check yourself.</p>';
    week.shortAnswers.forEach(function(sa, si) {
      var id = 'sa_' + currentWeek + '_' + si;
      html += '<div class="sa-practice">' +
        '<h4>Q'+(si+1)+': '+sa.question+'</h4>' +
        '<div class="sa-marks">['+sa.marks+' marks]</div>' +
        '<textarea placeholder="Type your answer here..." id="'+id+'_input"></textarea>' +
        '<div><button class="sa-reveal-btn" onclick="revealModelAnswer(\''+id+'\')">Reveal Model Answer</button></div>' +
        '<div class="sa-model-answer" id="'+id+'_answer"><strong>Model Answer:</strong> '+sa.modelAnswer+'</div>' +
        '</div>';
    });
  }

  document.getElementById('assessmentContent').innerHTML = html;
}

function revealModelAnswer(id) {
  document.getElementById(id + '_answer').classList.add('shown');
}

function updateWeekContent() {
  updateVideoSection();
  buildDayTabs();
  renderDayContent();
  renderResources();
  renderAssessment();
}

function updateProgress() {
  const done = completedWeeks.size;
  const pct = Math.round(done / TOTAL_WEEKS * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '% complete';
  document.getElementById('weeksComplete').textContent = done + '/' + TOTAL_WEEKS;
  document.getElementById('videosWatched').textContent = (done*2) + '/' + (TOTAL_WEEKS*2);
  document.getElementById('assessmentsPassed').textContent = done + '/' + TOTAL_WEEKS;
}

// ── Lightbox: tap any illustration to zoom, with a scale+fade animation ──
function openLightbox(src, caption) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightboxCaption').textContent = caption || '';
  var overlay = document.getElementById('lightboxOverlay');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox(e) {
  if (e) e.stopPropagation();
  document.getElementById('lightboxOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeLightbox();
});
document.getElementById('lessonContent').addEventListener('click', function(e) {
  if (e.target.tagName === 'IMG' && e.target.closest('.illustration')) {
    var captionEl = e.target.closest('.illustration').querySelector('.caption');
    openLightbox(e.target.src, captionEl ? captionEl.textContent : '');
  }
});

window.onload = function() {
  const isLight = localStorage.getItem('cl_theme') === 'light';
  if (isLight) { document.getElementById('body').classList.add('light-mode'); document.getElementById('themeBtn').innerHTML = '&#9790; Dark'; }
  buildModuleSelector();
  updateProgress();
  selectModule(1);
};
</script>
