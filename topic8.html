<script>
const STORAGE_PREFIX = 'coachG9_REP_';

// ── One entry per week. Each week has 5 days (Mon-Thu teaching, Fri = assessment day). ──
const weekData = {
  1: {
    videos: { t: '2NjzlvAV1lc', tTitle: 'The Reproductive System — Tutorial', b: 'TucxiIB76bo', bTitle: 'The Reproductive System — Explained Simply' },
    days: [
      { label: 'Monday', content: `<h2>&#127793; Growth, Change & a New Life Process</h2>
<div class="block block-objectives"><h3>&#127919; Learning Objectives</h3><ul>
<li>Explain why reproduction is considered one of the life processes</li>
<li>Describe the general body changes that happen during puberty</li>
<li>Use correct, respectful scientific vocabulary for this topic</li>
</ul></div>
<div class="block block-intro"><h3>&#128214; Introduction</h3>
<p>Every living organism eventually dies — but life itself continues because organisms reproduce, passing genetic information on to a new generation. Reproduction is one of the seven life processes you'll have covered across your science education, alongside things like nutrition and excretion.</p>
<p>This week we'll look at the structures involved in human reproduction and the body changes that happen during puberty, then in Week 2 we'll cover how fertilisation actually happens and the basic stages of human development before birth. As with any part of science, we'll use correct, factual, scientific language throughout.</p></div>
<div class="block block-concept"><h3>&#128300; Key Concept: Puberty</h3>
<p><strong>Puberty</strong> is the stage of development when the body becomes sexually mature, triggered by hormones. It typically happens between about ages 9 and 16, though the exact timing varies a lot between individuals. General changes during puberty include:</p>
<ul>
<li>A growth spurt in height</li>
<li>Development of secondary sexual characteristics (physical changes controlled by hormones, distinct from the reproductive organs themselves)</li>
<li>Emotional and hormonal changes as the body adjusts</li>
</ul>
<p>These changes happen at different times and rates for different people — there is no single "normal" timeline.</p></div>
<div class="block block-dyk"><h3>&#11088; Did You Know?</h3>
<p>Puberty is controlled by the same nervous and hormonal signalling systems you studied in earlier weeks — the brain's hypothalamus signals the pituitary gland, which releases hormones that trigger the changes of puberty throughout the body.</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: Is there one single "correct" age at which puberty should start?</summary>
<div class="answer">No — puberty typically begins somewhere between ages 9 and 16, and the exact timing varies naturally and normally from person to person.</div>
</details>` },

      { label: 'Tuesday', content: `<h2>&#128300; The Male Reproductive System</h2>
<div class="illustration">
<svg viewBox="0 0 320 220" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:320px;height:auto;background:#fff;border-radius:10px;padding:10px;">
<rect x="130" y="20" width="60" height="40" rx="8" fill="#4caf50" opacity="0.15" stroke="#4caf50" stroke-width="1.5"/>
<text x="160" y="44" text-anchor="middle" font-size="11" font-weight="700" fill="#1b5e20">Bladder</text>
<path d="M160 60 L160 140" stroke="#d4a72c" stroke-width="9" stroke-linecap="round"/>

      { label: 'Monday', content: `<h2>&#129466; Gametes & Fertilisation</h2>
<div class="block block-objectives"><h3>&#127919; Learning Objectives</h3><ul>
<li>Describe the special features of sperm and egg cells</li>
<li>Explain what happens during fertilisation</li>
<li>Define a zygote</li>
</ul></div>
<div class="block block-concept"><h3>&#128300; Key Concept: Gametes</h3>
<p><strong>Gametes</strong> are sex cells — sperm in males, egg cells (ova) in females. Each is specially adapted for its role:</p>
<ul>
<li><strong>Sperm cells</strong> are tiny and have a tail (flagellum) for swimming, and a large number of mitochondria to provide the energy needed for that movement.</li>
<li><strong>Egg cells</strong> are far larger than sperm (just visible to the naked eye) and contain a store of nutrients to support the earliest stages of development if fertilisation occurs.</li>
</ul>
<h4>Fertilisation</h4>
<p>When a sperm cell successfully fuses with an egg cell, their genetic material combines to form a single new cell called a <strong>zygote</strong> — the very first cell of a new individual, containing a full set of genetic information from both parents.</p></div>
<div class="block block-mnemonic"><h3>&#129504; Memory Trick</h3>
<p class="trick">Sperm + Egg &rarr; Zygote (the "Z" is the very last step — the very first new cell)</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: Why do sperm cells need so many mitochondria?</summary>
<div class="answer">Mitochondria release energy through respiration. Sperm cells need a large energy supply to power their tail (flagellum), which they use to swim towards an egg cell.</div>
</details>` },

      { label: 'Tuesday', content: `<h2>&#128198; The Menstrual Cycle — An Overview</h2>
<div class="block block-concept"><h3>&#128300; Key Concept: A Monthly Cycle</h3>
<p>From puberty onwards, a person with ovaries typically experiences a roughly month-long (about 28-day) cycle, preparing the body for a possible pregnancy each time:</p>
<ul>
<li><strong>Ovulation</strong> — around the middle of the cycle, one mature egg is released from an ovary into a fallopian tube</li>
<li><strong>Uterine lining thickens</strong> — the lining of the uterus builds up with extra blood vessels, ready to support a fertilised egg if one implants</li>
<li><strong>Menstruation</strong> — if the egg is NOT fertilised, the thickened uterine lining is no longer needed and is shed from the body over several days, and the cycle begins again</li>
</ul>
<p>If fertilisation DOES happen, the resulting zygote travels to the uterus and can implant into the thickened lining, beginning a pregnancy — and the cycle pauses.</p></div>
<div class="block block-dyk"><h3>&#11088; Did You Know?</h3>
<p>Despite the name, the average menstrual cycle length varies quite a bit between individuals — anywhere from about 21 to 35 days is considered within a typical, healthy range.</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: What happens to the thickened uterine lining if the egg is not fertilised?</summary>
<div class="answer">It is shed from the body during menstruation, since it's no longer needed to support a pregnancy — and the cycle then starts again.</div>
</details>` },

      { label: 'Wednesday', content: `<h2>&#128118; From Zygote to Baby</h2>
<div class="block block-concept"><h3>&#128300; Key Concept: The Stages of Human Development</h3>
<ul>
<li><strong>Zygote</strong> — the single fertilised cell, formed in the fallopian tube</li>
<li><strong>Implantation</strong> — the developing ball of cells travels to the uterus and embeds itself into the thickened uterine lining, roughly a week after fertilisation</li>
<li><strong>Embryo</strong> — the developing individual during the first 8 weeks, when major organs begin to form</li>
<li><strong>Fetus</strong> — the developing individual from 8 weeks until birth, as organs continue to develop and grow</li>
<li><strong>Birth</strong> — after a full pregnancy of around 9 months (40 weeks), the baby is born</li>
</ul></div>
<div class="block block-dyk"><h3>&#11088; Did You Know?</h3>
<p>By the end of the embryonic stage (around 8 weeks), an embryo is still smaller than a grape — yet already has the very beginnings of a heart, brain, and limbs.</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: What's the key difference between how "embryo" and "fetus" are used?</summary>
<div class="answer">"Embryo" refers to the developing individual during roughly the first 8 weeks, when major organs are first forming. "Fetus" refers to the same developing individual from about 8 weeks onward, until birth.</div>
</details>` },

      { label: 'Thursday', content: `<h2>&#128203; The Human Life Cycle & Practical Activity</h2>
<div class="block block-concept"><h3>&#128300; Key Concept: Life Cycle Stages</h3>
<p>Putting everything from this topic together, a human life cycle can be summarised as a repeating sequence:</p>
<p style="text-align:center;font-weight:700;color:#4caf50;">Fertilisation &rarr; Zygote &rarr; Embryo &rarr; Fetus &rarr; Birth &rarr; Infant &rarr; Child &rarr; Adolescent (puberty) &rarr; Adult &rarr; (capable of reproducing, continuing the cycle)</p></div>
<div class="block block-activity"><h3>&#128300; Practical Activity: Life Cycle Flowchart</h3>
<div class="what-to-do"><strong>What to do:</strong> Draw your own flowchart of the human life cycle stages listed above, from fertilisation through to adulthood. For each stage, write one sentence describing what is happening at that point (you can use this week's and last week's notes). Circle the two stages where the biggest single jump in complexity happens, and be ready to explain your choice.</div></div>
<details class="quick-check"><summary>&#10067; Quick Check: Why is the human life cycle described as a "cycle" rather than just a straight line?</summary>
<div class="answer">Because once an individual reaches adulthood, they become capable of reproducing themselves, producing gametes that can go on to start the entire cycle again in a new individual.</div>
</details>` },

      { label: 'Friday', content: `<h2>&#128203; Summary & Key Vocabulary</h2>

<li>Human development stages: zygote &rarr; implantation &rarr; embryo (first 8 weeks) &rarr; fetus (8 weeks to birth) &rarr; birth.</li>
<li>The human life cycle repeats once a new individual reaches adulthood and becomes capable of reproduction.</li>
</ul></div>
<div class="block block-mistakes"><h3>&#9888; Common Mistakes (from past exam reports)</h3>

<div class="mistake-item"><div class="wrong">&#10060; "Menstruation happens because fertilisation went wrong."</div><div class="right">&#10004; Menstruation is a normal part of the monthly cycle whenever fertilisation simply did NOT occur that month — it isn't a malfunction or an error, just the shedding of a uterine lining that wasn't needed.</div></div></div>

  const iframe = function(id) {
    return '<iframe src="https://www.youtube.com/embed/'+id+'?rel=0&modestbranding=1&iv_load_policy=3" frameborder="0" allowfullscreen style="position:absolute;top:0;left:0;width:100%;height:100%;border-radius:10px;"></iframe>';
  };
  document.getElementById('tutorialVideo').innerHTML = (v.t && v.t !== 'PLACEHOLDER') ? iframe(v.t) : CS;
  document.getElementById('basicVideo').innerHTML = (v.b && v.b !== 'PLACEHOLDER') ? iframe(v.b) : CS;
  document.getElementById('tutorialTitle').textContent = v.tTitle;
  document.getElementById('basicTitle').textContent = v.bTitle;
  document.getElementById('weekTitle').textContent = 'Videos \u2014 Week ' + currentWeek;
}

function renderResources() {
  var week = weekData[currentWeek];
  document.getElementById('resourcesTitle').textContent = 'Resources \u2014 Week ' + currentWeek;
  var html = '<div class="resources-grid">';
  week.resources.forEach(function(r) {
    var pdfUrl = 'https://mozilla.github.io/pdf.js/web/viewer.html?file=' + BASE_URL + r.file;
    html += '<a href="'+pdfUrl+'" class="resource-card" target="_blank"><div class="resource-icon">'+r.icon+'</div><h4>'+r.title+'</h4><p>'+r.desc+'</p><span class="download-badge">View PDF</span></a>';
  });
  html += '</div>';
  document.getElementById('resourcesBody').innerHTML = html;
}

function renderAssessment() {
  var week = weekData[currentWeek];
  var html = '<h2 style="font-size:1.1rem;margin-bottom:6px;">Week ' + currentWeek + ' Assessment</h2>';
  html += '<p style="color:#888;margin-bottom:16px;font-size:0.85rem;">'+week.assessment.length+' questions. You need 70% to pass. Available from Friday.</p>';
  week.assessment.forEach(function(q, qi) {
    html += '<div class="quiz-question"><h4>Q'+(qi+1)+': '+q.question+'</h4><div class="quiz-options">';
    q.options.forEach(function(opt, oi) {
      html += '<label class="quiz-option"><input type="radio" name="w'+currentWeek+'q'+qi+'" value="'+oi+'" onchange="saveAnswer('+currentWeek+','+qi+','+oi+')"> '+opt+'</label>';
    });
    html += '</div></div>';
  });
  html += '<a href="submit_REP_'+currentWeek+'.html" onclick="localStorage.setItem(\'cl_submit_course\',\'REP\');localStorage.setItem(\'cl_submit_week\',\''+currentWeek+'\');" class="submit-btn">Submit Assessment</a>';

  if (week.shortAnswers && week.shortAnswers.length) {
    html += '<h3 style="margin-top:26px;margin-bottom:6px;font-size:1rem;color:#4caf50;">&#9997; Short Answer Practice</h3>';
    html += '<p style="color:#888;margin-bottom:14px;font-size:0.8rem;">Exam-style questions, marked out of the total shown. These are for practice only and don\'t affect your pass/fail score — write your answer, then reveal the model answer to check yourself.</p>';
    week.shortAnswers.forEach(function(sa, si) {
      var id = 'sa_' + currentWeek + '_' + si;
      html += '<div class="sa-practice">' +
        '<h4>Q'+(si+1)+': '+sa.question+'</h4>' +
        '<div class="sa-marks">['+sa.marks+' marks]</div>' +
        '<textarea placeholder="Type your answer here..." id="'+id+'_input"></textarea>' +
        '<div><button class="sa-reveal-btn" onclick="revealModelAnswer(\''+id+'\')">Reveal Model Answer</button></div>' +
        '<div class="sa-model-answer" id="'+id+'_answer"><strong>Model Answer:</strong> '+sa.modelAnswer+'</div>' +
        '</div>';
    });
  }

  document.getElementById('assessmentContent').innerHTML = html;
}

function revealModelAnswer(id) {
  document.getElementById(id + '_answer').classList.add('shown');
}

function updateWeekContent() {
  updateVideoSection();
  buildDayTabs();
  renderDayContent();
  renderResources();
  renderAssessment();
}

function updateProgress() {
  const done = completedWeeks.size;
  const pct = Math.round(done / TOTAL_WEEKS * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '% complete';
  document.getElementById('weeksComplete').textContent = done + '/' + TOTAL_WEEKS;
  document.getElementById('videosWatched').textContent = (done*2) + '/' + (TOTAL_WEEKS*2);
  document.getElementById('assessmentsPassed').textContent = done + '/' + TOTAL_WEEKS;
}

// ── Lightbox: tap any illustration to zoom, with a scale+fade animation ──
function openLightbox(src, caption) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightboxCaption').textContent = caption || '';
  var overlay = document.getElementById('lightboxOverlay');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox(e) {
  if (e) e.stopPropagation();
  document.getElementById('lightboxOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeLightbox();
});
document.getElementById('lessonContent').addEventListener('click', function(e) {
  if (e.target.tagName === 'IMG' && e.target.closest('.illustration')) {
    var captionEl = e.target.closest('.illustration').querySelector('.caption');
    openLightbox(e.target.src, captionEl ? captionEl.textContent : '');
  }
});

window.onload = function() {
  const isLight = localStorage.getItem('cl_theme') === 'light';
  if (isLight) { document.getElementById('body').classList.add('light-mode'); document.getElementById('themeBtn').innerHTML = '&#9790; Dark'; }
  buildModuleSelector();
  updateProgress();
  selectModule(1);
};
</script>
</body>
</html>
