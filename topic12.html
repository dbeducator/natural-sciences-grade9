<script>
const STORAGE_PREFIX = 'coachG9_CRE_';
const TOTAL_WEEKS = 2;
const COURSE_NAME = 'Chemical Reactions & Equations';
const GOOGLE_SHEET_URL = 'https://script.google.com/macros/s/REPLACE_WITH_YOUR_SCRIPT_ID/exec';
const SECRET_KEY = 'CoachG9SecureKey';
const BASE_URL = 'https://dbeducator.github.io/natural-sciences-grade9/';

// ── One entry per week. Each week has 5 days (Mon-Thu teaching, Fri = assessment day). ──
const weekData = {
  1: {
    videos: { t: 'kY1Qeju6JKI', tTitle: 'Chemical Reactions & Equations — Tutorial', b: 'VYTnJPMNX5Q', bTitle: 'Chemical Equations — Explained Simply' },
    days: [
      { label: 'Monday', content: `<h2>&#9878;&#65039; Describing a Reaction</h2>
<div class="block block-objectives"><h3>&#127919; Learning Objectives</h3><ul>
<li>Identify reactants and products in a chemical reaction</li>
<li>Write a simple word equation</li>
<li>Explain what a word equation communicates</li>
</ul></div>
<div class="block block-intro"><h3>&#128214; Introduction</h3>
<p>Back in our Physical and Chemical Change topic, you learned to spot the SIGNS that a chemical change has happened. Now we'll learn the language chemists actually use to describe exactly what happened: chemical equations. Every equation tells a precise, information-dense story — what you started with, what you ended with, and (once balanced) exactly how much of each.</p></div>
<div class="block block-concept"><h3>&#128300; Key Concept: Reactants, Products & Word Equations</h3>
<ul>
<li><strong>Reactants</strong> — the substances you start with, before the reaction</li>
<li><strong>Products</strong> — the new substances formed by the reaction</li>
</ul>
<p>A <strong>word equation</strong> writes this out in full words, with an arrow showing the direction of change:</p>
<p style="text-align:center;font-weight:700;color:#4caf50;">reactant(s) &rarr; product(s)</p>
<h4>Example</h4>
<p style="text-align:center;font-weight:700;">magnesium + oxygen &rarr; magnesium oxide</p>
<p>This tells us magnesium and oxygen (the reactants) combine to form magnesium oxide (the product) — but notice it says nothing yet about HOW MUCH of each. That's what symbolic equations will add later this week.</p></div>
<div class="block block-mnemonic"><h3>&#129504; Memory Trick</h3>
<p class="trick">The arrow (&rarr;) means "produces" or "yields" — always read left to right, reactants first</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: In "iron + sulfur &rarr; iron sulfide", which are the reactants and which is the product?</summary>
<div class="answer">Reactants: iron and sulfur (written before the arrow). Product: iron sulfide (written after the arrow).</div>
</details>` },

      { label: 'Tuesday', content: `<h2>&#128290; From Words to Symbols</h2>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/Methane-combustion.svg" alt="Balanced chemical equation for the combustion of methane" loading="lazy"/>
<div class="caption">A balanced symbolic equation for the combustion of methane. Wikimedia Commons (CC BY-SA 4.0)</div>
</div>
<div class="block block-concept"><h3>&#128300; Key Concept: Symbolic Equations</h3>
<p>A <strong>symbolic equation</strong> replaces full words with chemical formulae — far faster to write, and (once balanced) far more precise, since it shows the exact ratio of atoms and molecules involved.</p>
<h4>Example</h4>
<p style="text-align:center;">Word: magnesium + oxygen &rarr; magnesium oxide</p>
<p style="text-align:center;font-weight:700;color:#4caf50;">Symbolic: 2Mg + O&#8322; &rarr; 2MgO</p>
<p>Small numbers written BEFORE a formula (like the "2" before Mg and MgO) are called <strong>coefficients</strong> — they show how many units of that substance are involved. Small numbers written AFTER an element, slightly below the line (like the "2" in O&#8322;), are <strong>subscripts</strong> — they're a fixed part of that substance's formula and must never be changed when balancing.</p></div>
<div class="block block-dyk"><h3>&#11088; Did You Know?</h3>
<p>Oxygen, hydrogen, nitrogen, fluorine, chlorine, bromine, and iodine are always written as pairs (O&#8322;, H&#8322;, N&#8322;, etc.) when uncombined, because these elements naturally exist as two-atom molecules in nature, not single free atoms.</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: In "2H&#8322;O", what does the "2" in front mean, and what does the "2" in H&#8322; mean?</summary>
<div class="answer">The "2" in front (the coefficient) means there are 2 whole water molecules. The "2" in H&#8322; (the subscript) means each water molecule contains 2 hydrogen atoms — it's a fixed part of water's formula and can't be changed.</div>
</details>` },

      { label: 'Wednesday', content: `<h2>&#9878;&#65039; Conservation of Mass & Balancing</h2>
<div class="block block-concept"><h3>&#128300; Key Concept: Matter Isn't Created or Destroyed</h3>
<p>The <strong>law of conservation of mass</strong> states that matter can't be created or destroyed in a chemical reaction — only rearranged. This means the total mass of the reactants must always equal the total mass of the products, and a correctly written equation must have the SAME number of each type of atom on both sides.</p>
<p>To <strong>balance</strong> an equation, you add coefficients (never change subscripts!) until the atom counts match on both sides.</p>
<h4>Worked Example</h4>
<p>Unbalanced: H&#8322; + O&#8322; &rarr; H&#8322;O (2 H atoms and 2 O atoms on the left; 2 H atoms but only 1 O atom on the right — unbalanced!)</p>
<p>Balanced: 2H&#8322; + O&#8322; &rarr; 2H&#8322;O (now 4 H and 2 O on both sides)</p></div>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/Ferreira%27s_Gold_Mine_in_1886.jpg" alt="Ferreira's Gold Mine, Witwatersrand, 1886" loading="lazy"/>
<div class="caption">Ferreira's Gold Mine, Witwatersrand, 1886 — the year South Africa's gold rush began. Wikimedia Commons (public domain)</div>
</div>
<div class="block block-sa"><h3>&#127487; South African Connection</h3>
<p>Since gold was discovered on the Witwatersrand in 1886, South African mines have relied on a precisely balanced chemical equation to extract gold from ore. The gold cyanidation process uses this reaction: <strong>4Au + 8NaCN + O&#8322; + 2H&#8322;O &rarr; 4NaAu(CN)&#8322; + 4NaOH</strong>. Every coefficient in that equation matters commercially — mining chemists rely on the exact balanced ratios to calculate precisely how much cyanide solution and oxygen a refinery needs to process a given quantity of ore, making balancing equations a genuinely million-Rand skill in South African industry.</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: Why must an equation be balanced, not just written with correct formulae?</summary>
<div class="answer">Because of the law of conservation of mass — atoms can't appear or disappear during a reaction, so the same number of each type of atom must be present on both sides of the equation.</div>
</details>` },

      { label: 'Thursday', content: `<h2>&#128300; Practical Activity</h2>
<div class="block block-dyk"><h3>&#11088; Did You Know?</h3>
<p>If you could weigh a sealed container before and after a reaction happens inside it (so no gas escapes), the mass would be exactly identical — a directly testable demonstration of the law of conservation of mass.</p></div>
<div class="block block-activity"><h3>&#128300; Practical Activity: Balance the Equations</h3>
<div class="what-to-do"><strong>What to do:</strong> Balance each of these equations by adding coefficients only (never change a subscript): (1) N&#8322; + H&#8322; &rarr; NH&#8323; (2) Fe + O&#8322; &rarr; Fe&#8322;O&#8323; (3) Na + Cl&#8322; &rarr; NaCl (4) C&#8323;H&#8328; + O&#8322; &rarr; CO&#8322; + H&#8322;O. For each one, count the atoms of each element on both sides before and after balancing, to prove to yourself that the equation is now genuinely balanced.</div></div>
<details class="quick-check"><summary>&#10067; Quick Check: A learner balances Na + Cl&#8322; &rarr; NaCl by changing it to Na + Cl&#8322; &rarr; NaCl&#8322;. What's wrong with this approach?</summary>
<div class="answer">Changing the subscript changes the substance itself — NaCl2 isn't the same compound as NaCl (table salt), and doesn't even exist under normal conditions. Balancing must only ever be done by adding coefficients in front of formulae, never by altering subscripts.</div>
</details>` },

      { label: 'Friday', content: `<h2>&#128203; Summary & Key Vocabulary</h2>
<div class="block block-summary"><h3>&#128203; Week Summary</h3><ul>
<li>Word equations show reactants &rarr; products in full words; symbolic equations use chemical formulae.</li>
<li>Coefficients (in front) show quantity and can be changed; subscripts (within a formula) are fixed and must never be changed.</li>
<li>The law of conservation of mass requires a balanced equation to have equal atoms of each element on both sides.</li>
</ul></div>
<div class="block block-mistakes"><h3>&#9888; Common Mistakes (from past exam reports)</h3>
<div class="mistake-item"><div class="wrong">&#10060; "You can balance an equation by changing a subscript."</div><div class="right">&#10004; NEVER change a subscript — that changes the substance's identity entirely. Only add or change COEFFICIENTS in front of formulae.</div></div>
<div class="mistake-item"><div class="wrong">&#10060; "Reactants and products can appear in any order around the arrow."</div><div class="right">&#10004; Reactants always go BEFORE the arrow, products always AFTER — the arrow shows the direction the reaction proceeds.</div></div></div>
<div class="block block-vocab"><h3>&#128273; Key Vocabulary</h3>
<div class="vocab-term"><b>Reactant</b> — a starting substance in a chemical reaction</div>
<div class="vocab-term"><b>Product</b> — a substance formed by a chemical reaction</div>
<div class="vocab-term"><b>Coefficient</b> — a number in front of a formula showing quantity; can be changed when balancing</div>
<div class="vocab-term"><b>Subscript</b> — a number within a formula; fixed, must never be changed when balancing</div>
<div class="vocab-term"><b>Law of conservation of mass</b> — matter cannot be created or destroyed in a chemical reaction</div>
</div>
<details class="quick-check"><summary>&#10067; Final Check: Without looking back, what's the one thing you must NEVER change when balancing an equation?</summary>
<div class="answer">A subscript. Only coefficients (the numbers in front of formulae) can be added or changed when balancing.</div>
</details>
<p style="margin-top:16px;color:#4caf50;font-weight:600;">&#9989; Ready? Head to the <strong>Assessment</strong> tab above to complete this week's quiz. You need 70% to pass and unlock next week.</p>` }

      { label: 'Monday', content: `<h2>&#129309; Synthesis Reactions</h2>
<div class="block block-objectives"><h3>&#127919; Learning Objectives</h3><ul>
<li>Define a synthesis (combination) reaction</li>
<li>Identify synthesis reactions from an equation</li>
<li>Give examples of synthesis reactions</li>
</ul></div>
<div class="block block-concept"><h3>&#128300; Key Concept: A + B &rarr; AB</h3>
<p>A <strong>synthesis reaction</strong> (also called a combination reaction) is when two or more simple substances combine to form one more complex product.</p>
<p style="text-align:center;font-weight:700;color:#4caf50;">A + B &rarr; AB</p>
<h4>Examples</h4>
<ul>
<li>2Mg + O&#8322; &rarr; 2MgO (magnesium burning)</li>
<li>2H&#8322; + O&#8322; &rarr; 2H&#8322;O (hydrogen burning)</li>
<li>N&#8322; + 3H&#8322; &rarr; 2NH&#8323; (industrial ammonia production)</li>
</ul></div>
<div class="block block-mnemonic"><h3>&#129504; Memory Trick</h3>
<p class="trick">SYNTHesis SYNthesises (combines) things together — fewer products than reactants</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: Is 2Na + Cl2 → 2NaCl a synthesis reaction? Why?</summary>
<div class="answer">Yes — two simpler reactants (sodium and chlorine) combine to form one more complex product (sodium chloride), matching the A + B &rarr; AB pattern.</div>
</details>` },

      { label: 'Tuesday', content: `<h2>&#128165; Decomposition & Combustion</h2>
<div class="block block-concept"><h3>&#128300; Key Concept: AB &rarr; A + B</h3>
<p>A <strong>decomposition reaction</strong> is the reverse pattern to synthesis: one complex reactant breaks down into two or more simpler products, often needing heat, light, or electricity to happen.</p>
<p style="text-align:center;font-weight:700;color:#4caf50;">AB &rarr; A + B</p>
<h4>Example</h4>
<p>2H&#8322;O&#8322; &rarr; 2H&#8322;O + O&#8322; (hydrogen peroxide decomposing into water and oxygen)</p>
<h3>Combustion Reactions</h3>
<p>A <strong>combustion reaction</strong> is when a substance (usually containing carbon and hydrogen) reacts rapidly with oxygen, releasing heat and light, and typically producing carbon dioxide and water.</p>
<p>CH&#8324; + 2O&#8322; &rarr; CO&#8322; + 2H&#8322;O (methane burning — the equation you saw diagrammed earlier this week)</p></div>
<div class="block block-dyk"><h3>&#11088; Did You Know?</h3>
<p>Combustion reactions are technically a special category of synthesis and decomposition happening together — bonds within the fuel break apart (decomposition) while new bonds form with oxygen (synthesis) — but they're distinctive and useful enough to be classified as their own type.</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: Is 2H2O2 → 2H2O + O2 a synthesis or decomposition reaction?</summary>
<div class="answer">Decomposition — one reactant (hydrogen peroxide) breaks down into two simpler products (water and oxygen), matching the AB &rarr; A + B pattern.</div>
</details>` },

      { label: 'Wednesday', content: `<h2>&#128260; Displacement Reactions</h2>
<div class="block block-concept"><h3>&#128300; Key Concept: Swapping Places</h3>
<p>In a <strong>displacement reaction</strong>, a more reactive element takes the place of a less reactive element within a compound.</p>
<p style="text-align:center;font-weight:700;color:#4caf50;">A + BC &rarr; AC + B</p>
<h4>Example</h4>
<p>Fe + CuSO&#8324; &rarr; FeSO&#8324; + Cu</p>
<p>Iron is more reactive than copper, so it displaces (pushes out) copper from copper sulfate solution — you can actually watch this happen, as a layer of reddish copper metal forms while the blue solution fades.</p></div>
<div class="block block-sa"><h3>&#127487; South African Connection</h3>
<p>Displacement reactions like this aren't just a classroom curiosity — they're the basis of extracting many metals from their ores in South African industry. Iron ore itself is chemically reduced (a type of displacement) in blast furnaces, where carbon displaces iron from iron oxide: 2Fe&#8322;O&#8323; + 3C &rarr; 4Fe + 3CO&#8322;. This exact reaction underlies South Africa's steel industry, centred historically around Vanderbijlpark and Newcastle.</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: In Fe + CuSO4 → FeSO4 + Cu, which element got displaced, and by what?</summary>
<div class="answer">Copper was displaced (pushed out of the compound) by iron, since iron is more reactive than copper.</div>
</details>` },

      { label: 'Thursday', content: `<h2>&#128300; Practical Activity</h2>
<div class="block block-dyk"><h3>&#11088; Did You Know?</h3>
<p>The reactivity series — a ranked list of how reactive different metals are — is exactly what lets chemists predict, before ever mixing anything, whether a displacement reaction will actually happen: a metal will only displace another metal that's lower down the list.</p></div>
<div class="block block-activity"><h3>&#128300; Practical Activity: Classify the Reaction Type</h3>
<div class="what-to-do"><strong>What to do:</strong> For each equation below, identify whether it's a synthesis, decomposition, combustion, or displacement reaction, and explain your reasoning: (1) 2KClO&#8323; &rarr; 2KCl + 3O&#8322; (2) C&#8323;H&#8328; + 5O&#8322; &rarr; 3CO&#8322; + 4H&#8322;O (3) Zn + 2HCl &rarr; ZnCl&#8322; + H&#8322; (4) 4Fe + 3O&#8322; &rarr; 2Fe&#8322;O&#8323;. For each, describe the general pattern (A+B&rarr;AB, AB&rarr;A+B, or A+BC&rarr;AC+B) that led to your classification.</div></div>
<details class="quick-check"><summary>&#10067; Quick Check: Zn + 2HCl → ZnCl2 + H2 — what type of reaction is this?</summary>
<div class="answer">Displacement — zinc (more reactive) displaces hydrogen from hydrochloric acid, matching the A + BC &rarr; AC + B pattern.</div>
</details>` },

      { label: 'Friday', content: `<h2>&#128203; Summary & Key Vocabulary</h2>
<div class="block block-summary"><h3>&#128203; Week Summary</h3><ul>
<li>Synthesis (A + B &rarr; AB): simple substances combine into one product.</li>
<li>Decomposition (AB &rarr; A + B): one substance breaks down into simpler products.</li>
<li>Combustion: a substance reacts rapidly with oxygen, releasing heat and light.</li>
<li>Displacement (A + BC &rarr; AC + B): a more reactive element takes the place of a less reactive one in a compound.</li>
</ul></div>
<div class="block block-mistakes"><h3>&#9888; Common Mistakes (from past exam reports)</h3>
<div class="mistake-item"><div class="wrong">&#10060; "All reactions that produce heat are combustion reactions."</div><div class="right">&#10004; Many reactions release heat without being combustion — combustion specifically involves a substance reacting rapidly WITH OXYGEN. Check what's actually reacting, not just whether heat is released.</div></div>
<div class="mistake-item"><div class="wrong">&#10060; "Any element can displace any other element from a compound."</div><div class="right">&#10004; Displacement only happens if the free element is MORE reactive than the element already in the compound — reactivity order matters.</div></div></div>
<div class="block block-vocab"><h3>&#128273; Key Vocabulary</h3>
<div class="vocab-term"><b>Synthesis reaction</b> — simple substances combining to form one more complex product (A + B &rarr; AB)</div>
<div class="vocab-term"><b>Decomposition reaction</b> — one substance breaking down into simpler products (AB &rarr; A + B)</div>
<div class="vocab-term"><b>Combustion reaction</b> — a substance reacting rapidly with oxygen, releasing heat and light</div>
<div class="vocab-term"><b>Displacement reaction</b> — a more reactive element replacing a less reactive one in a compound</div>
</div>
<details class="quick-check"><summary>&#10067; Final Check: Without looking back, what's the general pattern for a displacement reaction?</summary>
<div class="answer">A + BC &rarr; AC + B — a free element (A) displaces a less reactive element (B) from a compound (BC), forming a new compound (AC) and releasing the displaced element (B). If you got this, you're ready for the quiz!</div>
</details>
<p style="margin-top:16px;color:#4caf50;font-weight:600;">&#9989; Ready? Head to the <strong>Assessment</strong> tab above to complete this week's quiz. You need 70% to pass and unlock the next topic.</p>` }

}

    html += '</div></div>';
  });
  html += '<a href="submit_CRE_'+currentWeek+'.html" onclick="localStorage.setItem(\'cl_submit_course\',\'CRE\');localStorage.setItem(\'cl_submit_week\',\''+currentWeek+'\');" class="submit-btn">Submit Assessment</a>';

  if (week.shortAnswers && week.shortAnswers.length) {
    html += '<h3 style="margin-top:26px;margin-bottom:6px;font-size:1rem;color:#4caf50;">&#9997; Short Answer Practice</h3>';
    html += '<p style="color:#888;margin-bottom:14px;font-size:0.8rem;">Exam-style questions, marked out of the total shown. These are for practice only and don\'t affect your pass/fail score — write your answer, then reveal the model answer to check yourself.</p>';
    week.shortAnswers.forEach(function(sa, si) {
      var id = 'sa_' + currentWeek + '_' + si;
      html += '<div class="sa-practice">' +
        '<h4>Q'+(si+1)+': '+sa.question+'</h4>' +
        '<div class="sa-marks">['+sa.marks+' marks]</div>' +
        '<textarea placeholder="Type your answer here..." id="'+id+'_input"></textarea>' +
        '<div><button class="sa-reveal-btn" onclick="revealModelAnswer(\''+id+'\')">Reveal Model Answer</button></div>' +
        '<div class="sa-model-answer" id="'+id+'_answer"><strong>Model Answer:</strong> '+sa.modelAnswer+'</div>' +
        '</div>';
    });
  }

  document.getElementById('assessmentContent').innerHTML = html;
}

function revealModelAnswer(id) {
  document.getElementById(id + '_answer').classList.add('shown');
}

function updateWeekContent() {
  updateVideoSection();
  buildDayTabs();
  renderDayContent();
  renderResources();
  renderAssessment();
}

function updateProgress() {
  const done = completedWeeks.size;
  const pct = Math.round(done / TOTAL_WEEKS * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '% complete';
  document.getElementById('weeksComplete').textContent = done + '/' + TOTAL_WEEKS;
  document.getElementById('videosWatched').textContent = (done*2) + '/' + (TOTAL_WEEKS*2);
  document.getElementById('assessmentsPassed').textContent = done + '/' + TOTAL_WEEKS;
}

// ── Lightbox: tap any illustration to zoom, with a scale+fade animation ──
function openLightbox(src, caption) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightboxCaption').textContent = caption || '';
  var overlay = document.getElementById('lightboxOverlay');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox(e) {
  if (e) e.stopPropagation();
  document.getElementById('lightboxOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeLightbox();
});
document.getElementById('lessonContent').addEventListener('click', function(e) {
  if (e.target.tagName === 'IMG' && e.target.closest('.illustration')) {
    var captionEl = e.target.closest('.illustration').querySelector('.caption');
    openLightbox(e.target.src, captionEl ? captionEl.textContent : '');
  }
});

window.onload = function() {
  const isLight = localStorage.getItem('cl_theme') === 'light';
  if (isLight) { document.getElementById('body').classList.add('light-mode'); document.getElementById('themeBtn').innerHTML = '&#9790; Dark'; }
  buildModuleSelector();
  updateProgress();
  selectModule(1);
};
</script>
</body>
</html>
