<script>
const STORAGE_PREFIX = 'coachG9_CEL_';
const TOTAL_WEEKS = 1;
const COURSE_NAME = 'Cells as the Basic Unit of Life';
const GOOGLE_SHEET_URL = 'https://script.google.com/macros/s/REPLACE_WITH_YOUR_SCRIPT_ID/exec';
const SECRET_KEY = 'CoachG9SecureKey';
const BASE_URL = 'https://dbeducator.github.io/natural-sciences-grade9/';

// ── One entry per week. Each week has 5 days (Mon-Thu teaching, Fri = assessment day). ──
const weekData = {
  1: {
    videos: { t: 'zcqAD8DBBYU', tTitle: 'Cells — Tutorial', b: '8IlzKri08kk', bTitle: 'Cells — Explained Simply' },
    days: [
      { label: 'Monday', content: `<h2>&#128300; Cells as the Basic Unit of Life</h2>
<div class="block block-objectives"><h3>&#127919; Learning Objectives</h3><ul>
<li>Explain why the cell is called the "basic unit of life"</li>
<li>State the three key ideas of the cell theory</li>
<li>Describe how the cell was discovered</li>
<li>Use correct scientific vocabulary when describing cells</li>
</ul></div>
<div class="block block-intro"><h3>&#128214; Introduction</h3>
<p>Look at your hand, a leaf, a mushroom, or a drop of pond water under a microscope and you'll find the same thing: <strong>cells</strong>. Every living thing on Earth — from the smallest bacterium to the largest whale — is built from cells. Some organisms are just a single cell (unicellular), like bacteria and yeast. Others, like you, are made of trillions of cells working together (multicellular).</p>
<p>This week we'll discover what makes a cell "alive", what's inside one, how it compares between plants and animals, and how cells are organised into the tissues, organs and systems that keep you functioning.</p></div>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/RobertHookeMicrographia1665.jpg" alt="Robert Hooke's 1665 drawing of cork cells" loading="lazy"/>
<div class="caption">Robert Hooke's original 1665 drawing of cork cells, from Micrographia — Wikimedia Commons (public domain)</div>
</div>
<div class="block block-concept"><h3>&#128300; Key Concept: How the Cell Was Discovered</h3>
<p>In 1665, English scientist Robert Hooke examined a thin slice of cork under one of the earliest microscopes. He saw tiny box-shaped compartments, which reminded him of the small bare rooms — "cells" — that monks lived in. He named them cells, and the name has stuck for 360 years.</p></div>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/Portrait_of_a_Mathematician_1680c.jpg" alt="Portrait believed to be of Robert Hooke, c.1680" loading="lazy"/>
<div class="caption">A c.1680 portrait believed to depict Robert Hooke — Wikimedia Commons (public domain)</div>
</div>
<div class="block block-concept"><h4>The Cell Theory</h4>
<ul>
<li>All living things are made of one or more cells</li>
<li>The cell is the basic unit of structure and function in all living things — everything a living thing does happens at the cellular level</li>
<li>All cells come from pre-existing cells (cells divide to make new cells — they don't appear from nothing)</li>
</ul></div>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/Compound_Microscope.JPG" alt="A modern compound light microscope" loading="lazy"/>
<div class="caption">A modern compound light microscope — the descendant of Hooke's original design — Wikimedia Commons</div>
</div>
<div class="block block-mnemonic"><h3>&#129504; Memory Trick</h3>
<p>Remember the cell theory with <strong>"M.U.C."</strong>:</p>
<p class="trick">Made of cells &middot; Unit of life &middot; Comes from cells</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: Why couldn't anyone study cells before the 1600s?</summary>
<div class="answer">Cells are far too small to see with the naked eye. It wasn't until microscopes were invented and improved in the 1600s that scientists like Hooke could magnify specimens enough to observe individual cells for the first time.</div>
</details>` },

      { label: 'Tuesday', content: `<h2>&#129516; Animal Cell Structures</h2>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/Animal_cell_structure_en.svg" alt="Labelled diagram of an animal cell" loading="lazy"/>
<div class="caption">Animal cell structure — LadyofHats, Wikimedia Commons (public domain)</div>
</div>
<div class="block block-concept"><h3>&#128300; Key Organelles in an Animal Cell</h3>
<h4>Cell Membrane</h4>
<p>A thin, flexible layer surrounding the cell. It controls what substances enter and leave — letting in nutrients and oxygen, and letting out waste products. Think of it as a security gate that checks everything going in or out.</p>
<h4>Cytoplasm</h4>
<p>The jelly-like substance filling the cell, where most of the chemical reactions of life take place and where organelles are suspended.</p>
<h4>Nucleus</h4>
<p>The "control centre" of the cell. It contains DNA (genetic material) and directs all of the cell's activities, including growth and reproduction.</p>
<h4>Mitochondria</h4>
<p>Often called the "powerhouse of the cell" — this is where aerobic respiration takes place, releasing the energy (ATP) the cell needs to function.</p>
<p style="margin-top:8px;">Animal cells do <strong>not</strong> have a cell wall, chloroplasts, or a large permanent vacuole — those belong to plant cells only.</p></div>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/Redbloodcells.jpg" alt="Micrograph of human red blood cells" loading="lazy"/>
<div class="caption">Red blood cells (erythrocytes) — a highly specialised animal cell with no nucleus, giving it more room to carry oxygen. NIH, Wikimedia Commons (public domain)</div>
</div>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/Blausen_0871_Neuron.png" alt="Labelled diagram of a neuron (nerve cell)" loading="lazy"/>
<div class="caption">A neuron — another highly specialised animal cell, built to carry electrical signals over long distances. Blausen Medical, Wikimedia Commons (CC BY 3.0)</div>
</div>
<div class="block block-analogy"><h3>&#127961; Analogy: The Cell as a City</h3>
<ul>
<li><strong>Nucleus</strong> = City Hall — makes the decisions and holds the master plans (DNA)</li>
<li><strong>Mitochondria</strong> = Power Station — generates the energy the whole city runs on</li>
<li><strong>Cell membrane</strong> = City Walls with Gates — controls who and what comes in or out</li>
<li><strong>Cytoplasm</strong> = Streets and Open Spaces — where everything happens and moves around</li>
</ul></div>
<details class="quick-check"><summary>&#10067; Quick Check: A cell needs to make more energy urgently. Which organelle does the extra work?</summary>
<div class="answer">The mitochondria — they are the site of aerobic respiration, which releases energy from glucose for the cell to use.</div>
</details>` },

      { label: 'Wednesday', content: `<h2>&#127807; Plant Cell Structures</h2>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/Plant_cell_structure-en.svg" alt="Labelled diagram of a plant cell" loading="lazy"/>
<div class="caption">Plant cell structure — LadyofHats, Wikimedia Commons (public domain)</div>
</div>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/Onion_skin_cells_under_a_microscope.jpg" alt="Onion epidermis cells viewed under a microscope, showing cell walls and nuclei" loading="lazy"/>
<div class="caption">Real onion epidermis cells under a microscope — you'll see this exact structure in Thursday's practical activity. Wikimedia Commons</div>
</div>
<div class="block block-concept"><h3>&#128300; Extra Structures in Plant Cells</h3>
<h4>Cell Wall</h4>
<p>A rigid layer made of cellulose surrounding the cell membrane. It gives the cell a fixed shape and support, and protects it from bursting.</p>
<h4>Chloroplasts</h4>
<p>Contain the green pigment chlorophyll, which absorbs light energy — this is the site of photosynthesis.</p>
<h4>Large Permanent Vacuole</h4>
<p>A large, fluid-filled sac storing water and cell sap. When full, it pushes outward against the cell wall, keeping the cell firm (turgid) — this is what keeps plant stems and leaves standing upright.</p>
<h3 style="margin-top:16px;">&#128203; Animal vs Plant Cells</h3>
<table style="width:100%;font-size:0.85rem;border-collapse:collapse;margin-top:8px;">
<tr><th style="text-align:left;padding:5px;color:#4caf50;">Feature</th><th style="text-align:left;padding:5px;color:#4caf50;">Animal Cell</th><th style="text-align:left;padding:5px;color:#4caf50;">Plant Cell</th></tr>
<tr><td style="padding:5px;">Cell wall</td><td style="padding:5px;">No</td><td style="padding:5px;">Yes (cellulose)</td></tr>
<tr><td style="padding:5px;">Chloroplasts</td><td style="padding:5px;">No</td><td style="padding:5px;">Yes</td></tr>
<tr><td style="padding:5px;">Vacuole</td><td style="padding:5px;">Small, temporary</td><td style="padding:5px;">Large, permanent</td></tr>
<tr><td style="padding:5px;">Shape</td><td style="padding:5px;">Irregular, rounded</td><td style="padding:5px;">Fixed, box-like</td></tr>
</table></div>
<div class="block block-mnemonic"><h3>&#129504; Memory Trick</h3>
<p>Remember what plant cells have that animal cells don't with <strong>"W.C.V."</strong>:</p>
<p class="trick">Wall &middot; Chloroplast &middot; Vacuole (large)</p></div>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/A_Protea_cynaroides_King_Protea_Fynbos_South_Africa_3.JPG" alt="King Protea flower in Cape fynbos, South Africa" loading="lazy"/>
<div class="caption">King Protea in Cape fynbos — Wikimedia Commons</div>
</div>
<div class="block block-sa"><h3>&#127487; South African Connection</h3>
<p>South Africa's <strong>Cape Floral Kingdom</strong> — the smallest of the world's six floral kingdoms, but one of the most biodiverse places on Earth — is a living showcase of plant cell adaptation. Fynbos plants like the King Protea (South Africa's national flower) have thick, leathery cell walls that reduce water loss in the nutrient-poor, fire-prone soils of the Cape. Their specially adapted cells allow them to survive conditions that would kill many other plants.</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: A wilted plant is given water and becomes firm again within an hour. What's happening inside its cells?</summary>
<div class="answer">Water is entering the large permanent vacuole in each cell, making it swell and push outward against the rigid cell wall. This makes the cells — and therefore the whole plant — turgid (firm) again.</div>
</details>` },

      { label: 'Thursday', content: `<h2>&#128269; Levels of Organisation & Practical Activity</h2>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/101_Levels_of_Org_in_Body.jpg" alt="Diagram showing levels of organisation from cell to organism" loading="lazy"/>
<div class="caption">Levels of organisation, from cell to organism — OpenStax, Wikimedia Commons (CC BY 4.0)</div>
</div>
<div class="block block-concept"><h3>&#128300; From Cell to Organism</h3>
<p>In multicellular organisms, cells don't work alone — they're organised into increasingly complex levels:</p>
<ul>
<li><strong>Cell</strong> &rarr; the basic unit of life</li>
<li><strong>Tissue</strong> &rarr; a group of similar cells doing the same job (e.g. muscle tissue)</li>
<li><strong>Organ</strong> &rarr; a group of different tissues working together (e.g. the heart)</li>
<li><strong>Organ system</strong> &rarr; a group of organs working together (e.g. the circulatory system)</li>
<li><strong>Organism</strong> &rarr; the whole living thing, made of all its systems working together</li>
</ul></div>
<div class="block block-analogy"><h3>&#127961; Analogy: Building a School</h3>
<p>Think of a <strong>cell</strong> as a single brick. Many similar bricks form a <strong>wall</strong> (tissue). Several walls, a roof and windows form a <strong>classroom</strong> (organ). Many classrooms working together form the <strong>school</strong> (organ system). And the whole school, with all its departments running together, is the <strong>organism</strong>.</p></div>
<div class="block block-dyk"><h3>&#11088; Did You Know?</h3>
<p>A single human body is made up of an estimated 37 trillion cells — all descended from a single fertilised egg cell through repeated cell division.</p></div>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/Old_light_microscope.jpg" alt="A light microscope set up for classroom use" loading="lazy"/>
<div class="caption">A light microscope, ready for today's practical activity — Wikimedia Commons</div>
</div>
<div class="block block-activity"><h3>&#128300; Practical Activity</h3>
<div class="what-to-do"><strong>What to do:</strong> Using an onion (or any available leaf), peel off a thin, transparent layer from the inner surface. Place it on a slide with a drop of water, add a drop of iodine solution to stain it, and observe under a microscope (or a strong magnifying glass if no microscope is available). Draw what you see and label the cell wall, cytoplasm, and nucleus.</div></div>
<details class="quick-check"><summary>&#10067; Quick Check: Put these in order from simplest to most complex — Organ, Cell, Organ System, Tissue.</summary>
<div class="answer">Cell &rarr; Tissue &rarr; Organ &rarr; Organ System. (The organism sits above all of these as the complete living thing.)</div>
</details>` },

      { label: 'Friday', content: `<h2>&#128203; Summary & Key Vocabulary</h2>
<div class="block block-summary"><h3>&#128203; Week Summary</h3><ul>
<li>The cell theory: all living things are made of cells; the cell is the basic unit of structure and function; all cells come from existing cells.</li>
<li>Animal cells have a cell membrane, cytoplasm, nucleus and mitochondria — but no cell wall, chloroplasts, or large permanent vacuole.</li>
<li>Plant cells have everything animal cells have, plus a cell wall, chloroplasts, and a large permanent vacuole.</li>
<li>Levels of organisation: Cell &rarr; Tissue &rarr; Organ &rarr; Organ System &rarr; Organism.</li>
</ul></div>
<div class="block block-mistakes"><h3>&#9888; Common Mistakes (from past exam reports)</h3>
<div class="mistake-item"><div class="wrong">&#10060; "Plant cells have a cell wall INSTEAD OF a cell membrane."</div><div class="right">&#10004; Plant cells have BOTH — the cell wall is an extra outer layer surrounding the cell membrane, not a replacement for it.</div></div>
<div class="mistake-item"><div class="wrong">&#10060; "Turgid means the same as rigid."</div><div class="right">&#10004; Turgid specifically describes a plant cell swollen with water pressing against its cell wall — it's the cause of the cell being firm, not a synonym for "hard".</div></div>
<div class="mistake-item"><div class="wrong">&#10060; "Only plant cells respire; animal cells only 'breathe'."</div><div class="right">&#10004; ALL cells — plant and animal — contain mitochondria and carry out respiration to release energy.</div></div></div>
<div class="block block-vocab"><h3>&#128273; Key Vocabulary</h3>
<div class="vocab-term"><b>Cell</b> — the basic structural and functional unit of all living things</div>
<div class="vocab-term"><b>Nucleus</b> — the organelle that contains DNA and controls the cell's activities</div>
<div class="vocab-term"><b>Mitochondria</b> — organelle where aerobic respiration releases energy for the cell</div>
<div class="vocab-term"><b>Chloroplast</b> — plant organelle containing chlorophyll, site of photosynthesis</div>
<div class="vocab-term"><b>Turgid</b> — firm and swollen, describing a plant cell full of water</div>
<div class="vocab-term"><b>Tissue</b> — a group of similar cells performing the same function</div>
</div>
<details class="quick-check"><summary>&#10067; Final Check: Without looking back, can you name 3 things a plant cell has that an animal cell doesn't?</summary>
<div class="answer">Cell wall, chloroplasts, and a large permanent vacuole. If you got all three without looking, you're ready for the quiz!</div>
</details>
<p style="margin-top:16px;color:#4caf50;font-weight:600;">&#9989; Ready? Head to the <strong>Assessment</strong> tab above to complete this week's quiz. You need 70% to pass and unlock next week.</p>` }
    ],

let currentWeek = 1;
let currentDay = 0;
let completedWeeks = new Set(JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'completedWeeks') || '[]'));

Object.keys(weekData).forEach(function(w) {
  localStorage.setItem(STORAGE_PREFIX + 'correct_' + w, JSON.stringify(weekData[w].assessment.map(function(q){ return q.correct; })));
});

function toggleTheme() {
  const isLight = document.getElementById('body').classList.toggle('light-mode');
  localStorage.setItem('cl_theme', isLight ? 'light' : 'dark');
  document.getElementById('themeBtn').innerHTML = isLight ? '&#9790; Dark' : '&#9728; Light';
}

function saveAnswer(week, q, val) {
  var k = STORAGE_PREFIX + 'answers_' + week;
  var saved = JSON.parse(localStorage.getItem(k) || '{}');
  saved['q' + q] = val;
  localStorage.setItem(k, JSON.stringify(saved));
}

function buildModuleSelector() {
  var el = document.getElementById('moduleSelector');
  el.innerHTML = '';
  for (var w = 1; w <= TOTAL_WEEKS; w++) {
    var btn = document.createElement('button');
    btn.className = 'module-btn' + (completedWeeks.has(w) ? ' completed' : '');
    btn.textContent = 'Week ' + w + (completedWeeks.has(w) ? ' \u2713' : '');
    btn.onclick = (function(week){ return function(){ selectModule(week); }; })(w);
    el.appendChild(btn);
  }
  refreshModuleButtons();
}
function refreshModuleButtons() {
  document.querySelectorAll('.module-btn').forEach(function(btn, i) { btn.classList.toggle('active', i + 1 === currentWeek); });
}

function selectModule(week) { currentWeek = week; currentDay = 0; refreshModuleButtons(); updateWeekContent(); }

function buildDayTabs() {
  var week = weekData[currentWeek];
  var el = document.getElementById('dayTabs');
  el.innerHTML = '';
  week.days.forEach(function(day, i) {
    var btn = document.createElement('button');
    btn.className = 'day-btn' + (day.label === 'Friday' ? ' friday' : '') + (i === currentDay ? ' active' : '');
    btn.textContent = day.label;
    btn.onclick = function(){ currentDay = i; buildDayTabs(); renderDayContent(); };
    el.appendChild(btn);
  });
}
function renderDayContent() {
  var day = weekData[currentWeek].days[currentDay];
  document.getElementById('lessonContent').innerHTML =
    '<div class="day-label">&#128197; ' + day.label + ' &middot; Week ' + currentWeek + '</div>' + day.content;
}

function showTab(tabName, tabBtn) {
  document.querySelectorAll('.content-section').forEach(function(s){ s.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.getElementById(tabName).classList.add('active');
  if (tabBtn) tabBtn.classList.add('active');
}

function updateVideoSection() {
  const v = weekData[currentWeek].videos;
  const CS = '<div style="position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#1a1a2e,#16213e);display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;"><div style="font-size:2.2rem;">&#127916;</div><p style="color:#fff;font-weight:700;margin-top:8px;font-size:0.85rem;">Video Coming Soon</p></div>';
  const iframe = function(id) {
    return '<iframe src="https://www.youtube.com/embed/'+id+'?rel=0&modestbranding=1&iv_load_policy=3" frameborder="0" allowfullscreen style="position:absolute;top:0;left:0;width:100%;height:100%;border-radius:10px;"></iframe>';
  };
  document.getElementById('tutorialVideo').innerHTML = (v.t && v.t !== 'PLACEHOLDER') ? iframe(v.t) : CS;
  document.getElementById('basicVideo').innerHTML = (v.b && v.b !== 'PLACEHOLDER') ? iframe(v.b) : CS;
  document.getElementById('tutorialTitle').textContent = v.tTitle;
  document.getElementById('basicTitle').textContent = v.bTitle;
  document.getElementById('weekTitle').textContent = 'Videos \u2014 Week ' + currentWeek;
}

function renderResources() {
  var week = weekData[currentWeek];
  document.getElementById('resourcesTitle').textContent = 'Resources \u2014 Week ' + currentWeek;
  var html = '<div class="resources-grid">';
  week.resources.forEach(function(r) {
    var pdfUrl = 'https://mozilla.github.io/pdf.js/web/viewer.html?file=' + BASE_URL + r.file;
    html += '<a href="'+pdfUrl+'" class="resource-card" target="_blank"><div class="resource-icon">'+r.icon+'</div><h4>'+r.title+'</h4><p>'+r.desc+'</p><span class="download-badge">View PDF</span></a>';
  });
  html += '</div>';
  document.getElementById('resourcesBody').innerHTML = html;
}

function renderAssessment() {
  var week = weekData[currentWeek];
  var html = '<h2 style="font-size:1.1rem;margin-bottom:6px;">Week ' + currentWeek + ' Assessment</h2>';
  html += '<p style="color:#888;margin-bottom:16px;font-size:0.85rem;">'+week.assessment.length+' questions. You need 70% to pass. Available from Friday.</p>';
  week.assessment.forEach(function(q, qi) {
    html += '<div class="quiz-question"><h4>Q'+(qi+1)+': '+q.question+'</h4><div class="quiz-options">';
    q.options.forEach(function(opt, oi) {
      html += '<label class="quiz-option"><input type="radio" name="w'+currentWeek+'q'+qi+'" value="'+oi+'" onchange="saveAnswer('+currentWeek+','+qi+','+oi+')"> '+opt+'</label>';
    });
    html += '</div></div>';
  });
  html += '<a href="submit_CEL_'+currentWeek+'.html" onclick="localStorage.setItem(\'cl_submit_course\',\'CEL\');localStorage.setItem(\'cl_submit_week\',\''+currentWeek+'\');" class="submit-btn">Submit Assessment</a>';

  if (week.shortAnswers && week.shortAnswers.length) {
    html += '<h3 style="margin-top:26px;margin-bottom:6px;font-size:1rem;color:#4caf50;">&#9997; Short Answer Practice</h3>';
    html += '<p style="color:#888;margin-bottom:14px;font-size:0.8rem;">Exam-style questions, marked out of the total shown. These are for practice only and don\'t affect your pass/fail score — write your answer, then reveal the model answer to check yourself.</p>';
    week.shortAnswers.forEach(function(sa, si) {
      var id = 'sa_' + currentWeek + '_' + si;
      html += '<div class="sa-practice">' +
        '<h4>Q'+(si+1)+': '+sa.question+'</h4>' +
        '<div class="sa-marks">['+sa.marks+' marks]</div>' +
        '<textarea placeholder="Type your answer here..." id="'+id+'_input"></textarea>' +
        '<div><button class="sa-reveal-btn" onclick="revealModelAnswer(\''+id+'\')">Reveal Model Answer</button></div>' +
        '<div class="sa-model-answer" id="'+id+'_answer"><strong>Model Answer:</strong> '+sa.modelAnswer+'</div>' +
        '</div>';
    });
  }

  document.getElementById('assessmentContent').innerHTML = html;
}

function revealModelAnswer(id) {
  document.getElementById(id + '_answer').classList.add('shown');
}

function updateWeekContent() {
  updateVideoSection();
  buildDayTabs();
  renderDayContent();
  renderResources();
  renderAssessment();
}

function updateProgress() {
  const done = completedWeeks.size;
  const pct = Math.round(done / TOTAL_WEEKS * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '% complete';
  document.getElementById('weeksComplete').textContent = done + '/' + TOTAL_WEEKS;
  document.getElementById('videosWatched').textContent = (done*2) + '/' + (TOTAL_WEEKS*2);
  document.getElementById('assessmentsPassed').textContent = done + '/' + TOTAL_WEEKS;
