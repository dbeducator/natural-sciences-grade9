<script>
const STORAGE_PREFIX = 'coachG9_ABN_';
const TOTAL_WEEKS = 2;
const COURSE_NAME = 'Acids, Bases and Neutralisation';
const GOOGLE_SHEET_URL = 'https://script.google.com/macros/s/REPLACE_WITH_YOUR_SCRIPT_ID/exec';
const SECRET_KEY = 'CoachG9SecureKey';
const BASE_URL = 'https://dbeducator.github.io/natural-sciences-grade9/';

// ── One entry per week. Each week has 5 days (Mon-Thu teaching, Fri = assessment day). ──
const weekData = {
  1: {
    videos: { t: 'n9wUdgxCLMQ', tTitle: 'Acids, Bases and Neutralisation — Tutorial', b: 'RmnT9jwX4gQ', bTitle: 'Acids & Bases — Explained Simply' },
    days: [
      { label: 'Monday', content: `<h2>&#129371; Properties of Acids</h2>
<div class="block block-objectives"><h3>&#127919; Learning Objectives</h3><ul>
<li>List the properties of acids</li>
<li>Explain how litmus paper identifies an acid</li>
<li>Give everyday examples of acids</li>
</ul></div>
<div class="block block-intro"><h3>&#128214; Introduction</h3>
<p>You've already met acids reacting with metals. This week we zoom out to the bigger picture: what actually makes something an acid, what makes something the opposite (a base), and how you can neutralise one with the other — a reaction with everyday uses from soothing a bee sting to treating heartburn.</p></div>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/Blue_and_red_litmus_paper.JPG" alt="Blue and red litmus paper strips used to test acidity" loading="lazy"/>
<div class="caption">Litmus paper — the classic test for acids and bases. Wikimedia Commons (CC BY-SA 3.0)</div>
</div>
<div class="block block-concept"><h3>&#128300; Key Concept: Properties of Acids</h3>
<ul>
<li>Taste sour (never taste unknown substances in a lab!)</li>
<li>Turn blue litmus paper RED</li>
<li>Have a pH below 7</li>
<li>React with reactive metals to form a salt and hydrogen gas</li>
<li>React with carbonates to produce carbon dioxide gas</li>
</ul>
<h4>Everyday Acids</h4>
<p>Lemon juice (citric acid), vinegar (acetic acid), stomach acid (hydrochloric acid), and fizzy drinks (carbonic and phosphoric acid) are all acids you encounter regularly.</p></div>
<div class="block block-mnemonic"><h3>&#129504; Memory Trick</h3>
<p class="trick">Acid + blue litmus = RED &rarr; "Acid is Angry, turns litmus RED"</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: A learner dips blue litmus paper into a clear liquid and it turns red. What can they conclude?</summary>
<div class="answer">The liquid is acidic — blue litmus paper turning red is the standard indicator that a substance is an acid.</div>
</details>` },

      { label: 'Tuesday', content: `<h2>&#129371; Properties of Bases</h2>
<div class="block block-concept"><h3>&#128300; Key Concept: Properties of Bases (Alkalis)</h3>
<p>A <strong>base</strong> is the chemical opposite of an acid. A base that dissolves in water is specifically called an <strong>alkali</strong>.</p>
<ul>
<li>Taste bitter (never taste unknown substances in a lab!)</li>
<li>Feel slippery or soapy to the touch</li>
<li>Turn red litmus paper BLUE</li>
<li>Have a pH above 7</li>
<li>Neutralise acids to form a salt and water</li>
</ul>
<h4>Everyday Bases</h4>
<p>Soap, toothpaste, baking soda, oven cleaner, and antacid tablets are all bases (or contain them) that you encounter regularly.</p></div>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/Universalindikator_pH-Skala.svg" alt="Universal indicator colour scale showing pH values from 0 to 14" loading="lazy"/>
<div class="caption">Universal indicator colours across the full pH scale. Wikimedia Commons</div>
</div>
<div class="block block-dyk"><h3>&#11088; Did You Know?</h3>
<p>The slippery feeling of soap on your skin is actually a real chemical reaction — bases react with the natural oils on your skin, which is exactly the same reaction (saponification) used to manufacture soap in the first place.</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: Why do bases feel slippery on skin?</summary>
<div class="answer">Bases react with the natural oils on your skin, producing a soap-like, slippery substance — the same chemistry used to make soap.</div>
</details>` },

      { label: 'Wednesday', content: `<h2>&#128202; The pH Scale</h2>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/PH_Scale_Foods_He.png" alt="pH scale from 0 to 14 with everyday food and household examples" loading="lazy"/>
<div class="caption">The pH scale, with everyday substances shown at their approximate pH. Wikimedia Commons</div>
</div>
<div class="block block-concept"><h3>&#128300; Key Concept: Measuring Acidity Precisely</h3>
<p>The <strong>pH scale</strong> runs from 0 to 14, giving a precise number instead of just "acid" or "base":</p>
<ul>
<li><strong>pH 0&ndash;6:</strong> acidic (lower number = more strongly acidic)</li>
<li><strong>pH 7:</strong> neutral (pure water)</li>
<li><strong>pH 8&ndash;14:</strong> basic/alkaline (higher number = more strongly basic)</li>
</ul>
<h4>Indicators</h4>
<p>Litmus only tells you acid or base. A <strong>universal indicator</strong> goes further, turning a whole range of colours (red through green to purple) to show roughly WHERE on the 0&ndash;14 scale a substance sits, not just which side.</p></div>
<div class="block block-mnemonic"><h3>&#129504; Memory Trick</h3>
<p class="trick">7 is exactly in the middle of 0&ndash;14 &rarr; 7 is neutral, not "average" of everything else</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: What is the key advantage of universal indicator over plain litmus paper?</summary>
<div class="answer">Universal indicator shows roughly WHERE on the 0&ndash;14 pH scale a substance sits (through a range of colours), while litmus only tells you whether something is an acid or a base, with no sense of strength.</div>
</details>` },

      { label: 'Thursday', content: `<h2>&#129380; Practical Activity: Natural Indicators</h2>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/Red_cabbage_changing_colors.jpg" alt="Red cabbage juice indicator showing a range of colours from red to blue-green across different pH solutions" loading="lazy"/>
<div class="caption">Red cabbage juice acting as a natural pH indicator — red/pink for acids, blue-green for bases. Wikimedia Commons</div>
</div>
<div class="block block-dyk"><h3>&#11088; Did You Know?</h3>
<p>Red cabbage owes its colour-changing ability to pigments called anthocyanins — the same family of pigments that colour blueberries, red grapes, and poinsettia leaves, all of which can also work as rough, natural pH indicators.</p></div>
<div class="block block-activity"><h3>&#128300; Practical Activity: Make a Red Cabbage Indicator</h3>
<div class="what-to-do"><strong>What to do:</strong> With adult supervision, chop red cabbage leaves and boil them in water for about 10 minutes, then strain out the leaves — the remaining purple liquid is your indicator. Pour a small amount into several clear cups. Add a different household liquid to each (lemon juice, vinegar, soapy water, a dissolved antacid tablet, tap water) and record the colour change. Rank your results from most acidic to most basic based on the colours you observe, comparing to the red (acid) &rarr; purple (neutral) &rarr; blue-green (base) pattern.</div></div>
<details class="quick-check"><summary>&#10067; Quick Check: If red cabbage indicator turns bright pink when added to a mystery liquid, is that liquid likely acidic or basic?</summary>
<div class="answer">Acidic — red cabbage indicator turns red/pink in acidic solutions, and shifts towards blue-green in basic ones.</div>
</details>` },

<div class="mistake-item"><div class="wrong">&#10060; "pH 7 means 'medium strength' acid or base."</div><div class="right">&#10004; pH 7 means NEUTRAL — neither acidic nor basic. It's not a weak version of either; it's the dividing line between them.</div></div>
<div class="mistake-item"><div class="wrong">&#10060; "You can safely taste an unknown substance to check if it's an acid."</div><div class="right">&#10004; NEVER taste unknown chemicals — always use litmus paper, universal indicator, or another safe test instead.</div></div></div>

    days: [
      { label: 'Monday', content: `<h2>&#9878;&#65039; Neutralisation</h2>
<div class="block block-objectives"><h3>&#127919; Learning Objectives</h3><ul>
<li>State the general pattern for a neutralisation reaction</li>
<li>Explain what happens to pH during neutralisation</li>
<li>Predict the products of a simple acid + base reaction</li>
</ul></div>
<div class="block block-concept"><h3>&#128300; Key Concept: Acid + Base &rarr; Salt + Water</h3>
<p style="text-align:center;font-weight:700;color:#4caf50;">acid + base &rarr; salt + water</p>
<h4>Example</h4>
<p style="text-align:center;">hydrochloric acid + sodium hydroxide &rarr; sodium chloride + water</p>
<p style="text-align:center;font-weight:700;">HCl + NaOH &rarr; NaCl + H&#8322;O</p>
<p>This is called <strong>neutralisation</strong> because the acid and base cancel out each other's properties — the pH of the mixture moves towards 7 (neutral) as they react.</p></div>
<div class="illustration">
<svg viewBox="0 0 300 150" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:300px;height:auto;background:#fff;border-radius:10px;padding:14px;">
<text x="150" y="18" text-anchor="middle" font-size="12" font-weight="700" fill="#222">pH Moves Toward Neutral</text>
<line x1="30" y1="70" x2="270" y2="70" stroke="#ccc" stroke-width="2"/>
<circle cx="60" cy="70" r="8" fill="#c62828"/><text x="60" y="95" text-anchor="middle" font-size="10" fill="#222">Acid (low pH)</text>
<circle cx="150" cy="70" r="8" fill="#4caf50"/><text x="150" y="95" text-anchor="middle" font-size="10" fill="#222">Neutral (pH 7)</text>
<circle cx="240" cy="70" r="8" fill="#1565c0"/><text x="240" y="95" text-anchor="middle" font-size="10" fill="#222">Base (high pH)</text>
<path d="M60 70 Q100 40 150 70" stroke="#e0a100" stroke-width="2" fill="none" marker-end="url(#arrow3)"/>
<path d="M240 70 Q200 40 150 70" stroke="#e0a100" stroke-width="2" fill="none" marker-end="url(#arrow3)"/>
<defs><marker id="arrow3" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#e0a100"/></marker></defs>
<text x="150" y="130" text-anchor="middle" font-size="10" fill="#666">Adding base to acid (or acid to base) pulls pH toward 7</text>
</svg>
<div class="caption">Neutralisation moves the pH of a mixture toward 7, from either direction.</div>
</div>
<div class="block block-mnemonic"><h3>&#129504; Memory Trick</h3>
<p class="trick">A.B.S.W. &rarr; Acid + Base &rarr; Salt + Water</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: What are the two products of any acid + base neutralisation reaction?</summary>
<div class="answer">A salt and water.</div>
</details>` },

      { label: 'Tuesday', content: `<h2>&#128138; Neutralisation in Everyday Life</h2>
<div class="block block-concept"><h3>&#128300; Key Concept: Real-World Neutralisation</h3>
<ul>
<li><strong>Heartburn/indigestion:</strong> antacid tablets contain a base (often calcium carbonate or magnesium hydroxide) that neutralises excess stomach acid</li>
<li><strong>Toothpaste:</strong> most toothpaste is slightly basic, neutralising the acids produced by mouth bacteria that would otherwise damage tooth enamel</li>
<li><strong>Bee stings:</strong> bee venom is acidic — a mild base like bicarbonate of soda paste can help neutralise it</li>
<li><strong>Wasp stings:</strong> wasp venom is basic (alkaline) — a mild acid like vinegar can help neutralise it</li>
</ul></div>
<div class="block block-dyk"><h3>&#11088; Did You Know?</h3>
<p>Bee and wasp stings are neutralised with OPPOSITE remedies precisely because their venoms sit on opposite sides of the pH scale — a genuinely practical, memorable application of the acid-base chemistry you're learning this week.</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: Why might vinegar help with a wasp sting but not a bee sting?</summary>
<div class="answer">Wasp venom is basic (alkaline), so an acid like vinegar can help neutralise it. Bee venom is acidic, so it would need a base (like bicarbonate of soda) instead — using vinegar on a bee sting wouldn't neutralise it.</div>
</details>` },

      { label: 'Wednesday', content: `<h2>&#127805; Treating Acidic Soil</h2>
<div class="illustration">
<img src="https://commons.wikimedia.org/wiki/Special:FilePath/Maize_on_acid_soil_1%262_weed_effect.jpg" alt="Maize crop showing the effect of growing in acidic soil, South Africa" loading="lazy"/>
<div class="caption">Maize affected by acidic soil — a real South African agricultural photo. Wikimedia Commons</div>
</div>
<div class="block block-sa"><h3>&#127487; South African Connection</h3>
<p>South African soils, especially in high-rainfall summer-cropping regions, naturally become acidic over time — rain leaches away basic minerals, and fertilisers used for crops like maize can add to the problem. Just like an antacid tablet neutralising stomach acid, South African farmers spread <strong>agricultural lime</strong> (calcium carbonate) across acidic fields to neutralise the soil back towards a pH where maize, wheat, and other staple crops grow best (roughly pH 6.5). This directly connects to the acid mine drainage you learned about last topic — lime neutralisation is also the standard treatment method used at South African mine water treatment plants, applying exactly this week's chemistry (acid + base &rarr; salt + water) at an industrial and agricultural scale across the country.</p></div>
<details class="quick-check"><summary>&#10067; Quick Check: Why do South African farmers add lime to acidic soil?</summary>
<div class="answer">Lime is a base, so it neutralises the excess acidity in the soil, raising the pH closer to the range where crops grow best — the same acid + base &rarr; salt + water chemistry used everywhere else in this topic.</div>
</details>` },

      { label: 'Thursday', content: `<h2>&#128300; Practical Activity</h2>
<div class="block block-dyk"><h3>&#11088; Did You Know?</h3>
<p>Chemists use a precise technique called titration to find EXACTLY how much acid is needed to neutralise a given amount of base (or vice versa) — the same basic idea behind the practical you're about to do, just measured far more precisely with lab equipment.</p></div>
<div class="block block-activity"><h3>&#128300; Practical Activity: Neutralise It</h3>
<div class="what-to-do"><strong>What to do:</strong> Add a few drops of red cabbage indicator (or universal indicator, if available) to a small cup of vinegar — it should turn reddish-pink, confirming it's acidic. Slowly add small pinches of baking soda (a mild base) one at a time, stirring after each addition, and watch the colour change. Stop as soon as the mixture turns as close to purple (neutral) as you can get it. Record how many pinches it took, and write the word equation for the reaction that occurred.</div></div>
<details class="quick-check"><summary>&#10067; Quick Check: In this practical, what would it mean if you added too much baking soda?</summary>
<div class="answer">The mixture would overshoot neutral and become basic (the indicator would shift toward blue-green), since you'd have added more base than needed to neutralise the acid present.</div>
</details>` },

    html += '</div></div>';
  });
  html += '<a href="submit_ABN_'+currentWeek+'.html" onclick="localStorage.setItem(\'cl_submit_course\',\'ABN\');localStorage.setItem(\'cl_submit_week\',\''+currentWeek+'\');" class="submit-btn">Submit Assessment</a>';

  if (week.shortAnswers && week.shortAnswers.length) {
    html += '<h3 style="margin-top:26px;margin-bottom:6px;font-size:1rem;color:#4caf50;">&#9997; Short Answer Practice</h3>';
    html += '<p style="color:#888;margin-bottom:14px;font-size:0.8rem;">Exam-style questions, marked out of the total shown. These are for practice only and don\'t affect your pass/fail score — write your answer, then reveal the model answer to check yourself.</p>';
    week.shortAnswers.forEach(function(sa, si) {
      var id = 'sa_' + currentWeek + '_' + si;
      html += '<div class="sa-practice">' +
        '<h4>Q'+(si+1)+': '+sa.question+'</h4>' +
        '<div class="sa-marks">['+sa.marks+' marks]</div>' +
        '<textarea placeholder="Type your answer here..." id="'+id+'_input"></textarea>' +
        '<div><button class="sa-reveal-btn" onclick="revealModelAnswer(\''+id+'\')">Reveal Model Answer</button></div>' +
        '<div class="sa-model-answer" id="'+id+'_answer"><strong>Model Answer:</strong> '+sa.modelAnswer+'</div>' +
        '</div>';
    });
  }

  document.getElementById('assessmentContent').innerHTML = html;
}

function revealModelAnswer(id) {
  document.getElementById(id + '_answer').classList.add('shown');
}

function updateWeekContent() {
  updateVideoSection();
  buildDayTabs();
  renderDayContent();
  renderResources();
  renderAssessment();
}

function updateProgress() {
  const done = completedWeeks.size;
  const pct = Math.round(done / TOTAL_WEEKS * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '% complete';
  document.getElementById('weeksComplete').textContent = done + '/' + TOTAL_WEEKS;
  document.getElementById('videosWatched').textContent = (done*2) + '/' + (TOTAL_WEEKS*2);
  document.getElementById('assessmentsPassed').textContent = done + '/' + TOTAL_WEEKS;
}

// ── Lightbox: tap any illustration to zoom, with a scale+fade animation ──
function openLightbox(src, caption) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightboxCaption').textContent = caption || '';
  var overlay = document.getElementById('lightboxOverlay');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox(e) {
  if (e) e.stopPropagation();
  document.getElementById('lightboxOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeLightbox();
});
document.getElementById('lessonContent').addEventListener('click', function(e) {
  if (e.target.tagName === 'IMG' && e.target.closest('.illustration')) {
    var captionEl = e.target.closest('.illustration').querySelector('.caption');
    openLightbox(e.target.src, captionEl ? captionEl.textContent : '');
  }
});

window.onload = function() {
  const isLight = localStorage.getItem('cl_theme') === 'light';
  if (isLight) { document.getElementById('body').classList.add('light-mode'); document.getElementById('themeBtn').innerHTML = '&#9790; Dark'; }
  buildModuleSelector();
  updateProgress();
  selectModule(1);
};
</script>
</body>
</html>
